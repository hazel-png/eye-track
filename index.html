<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Hand Tracker - Anti-Warp Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
        #vr-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #fff; z-index: 2000;
        }
        .btn { background: #1a73e8; color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="vr-ui"><button class="btn" id="start-btn">START STABLE VR</button></div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        let isCalibrated = false, calibCount = 0, maxZ = 0;
        let lastZ = 0; // 急激な変化抑制用

        const CONFIG = {
            spread: 1.8, vertical: 1.8,
            zBase: -0.25,
            smoothing: 0.2, // 0.1〜0.3 (低いほど安定、高いほどキビキビ)
            radius: 0.012
        };

        const fingers = [];
        const _v = new THREE.Vector3();

        async function init() {
            document.getElementById('vr-ui').style.display = 'none';
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // 軽量化ポリゴン
            const fGeo = new THREE.SphereGeometry(CONFIG.radius, 8, 4);
            const fMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });

            world = new CANNON.World();
            world.solver.iterations = 5;

            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fGeo, fMat);
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(CONFIG.radius));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.06), new THREE.MeshStandardMaterial({ color: 0xff00ff }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.1 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.03, 0.03, 0.03)));
            cubeBody.position.set(0, 1.1, -0.4);
            world.addBody(cubeBody);

            const video = document.getElementById('input_video');
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                
                // 【重要】手首の角度に左右されない奥行き計算
                // 手のひらの4点（5, 9, 13, 17番）の平均値を使用
                const palmZ = (landmarks[5].z + landmarks[9].z + landmarks[13].z + landmarks[17].z) / 4;
                const xrCamera = renderer.xr.getCamera(camera);

                if (!isCalibrated && renderer.xr.isPresenting) {
                    calibCount++;
                    maxZ = Math.max(maxZ, Math.abs(palmZ));
                    if (calibCount > 60) {
                        isCalibrated = true;
                        cubeMesh.visible = true;
                    }
                    return;
                }

                if (isCalibrated) {
                    const depthScale = 0.85 / maxZ;
                    
                    // 急激なZ変化（ワープ）を抑制する簡易フィルタ
                    let currentZ = -palmZ * depthScale;
                    if (lastZ === 0) lastZ = currentZ;
                    currentZ = lastZ + (currentZ - lastZ) * CONFIG.smoothing;
                    lastZ = currentZ;

                    landmarks.forEach((point, i) => {
                        const f = fingers[i];
                        // X, Yの位置を現在の安定化したZに同期させる
                        const pCorr = 1.0 - (point.z * 0.4); 
                        _v.set(
                            (point.x - 0.5) * CONFIG.spread * pCorr,
                            -(point.y - 0.5) * CONFIG.vertical * pCorr,
                            currentZ + (point.z - palmZ) * depthScale + CONFIG.zBase
                        );
                        
                        _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        
                        // 最終的な平滑化
                        f.body.position.lerp(new CANNON.Vec3(_v.x, _v.y, _v.z), CONFIG.smoothing, f.body.position);
                        f.mesh.position.copy(f.body.position);
                    });
                }
            });

            new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 640, height: 480
            }).start();

            renderer.setAnimationLoop(() => {
                if (isCalibrated) {
                    world.step(1/60);
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }
        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
