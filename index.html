<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>THE ETHER - Ultimate Spatial Engine</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --cyan: #00f2ff; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column;
            align-items: center; min-height: 100vh; touch-action: none;
        }
        .container { padding: 20px; max-width: 360px; width: 100%; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 0.7rem; letter-spacing: 12px; color: var(--gold); text-transform: uppercase; }

        .grid-card {
            background: #080808; border-radius: 20px; border: 1px solid #1a1a1a;
            padding: 15px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .grid {
            position: relative; width: 100%; aspect-ratio: 1; background: #030303;
            border-radius: 10px; border: 1px solid #222; overflow: hidden;
            cursor: crosshair;
        }
        .mesh {
            position: absolute; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(212,175,55,0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(212,175,55,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .node {
            position: absolute; width: 16px; height: 16px; background: var(--gold);
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--gold); z-index: 10; pointer-events: none;
        }
        .head {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: var(--cyan); border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--cyan);
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .param { font-size: 0.6rem; color: #666; text-transform: uppercase; }
        select, button {
            background: #111; border: 1px solid #333; color: var(--gold);
            padding: 8px; border-radius: 5px; font-size: 0.7rem; width: 100%;
        }
        
        #fileInput { display: none; }
        .load-btn { 
            display: block; width: 100%; text-align: center; border: 1px solid var(--gold);
            color: var(--gold); padding: 12px; border-radius: 30px; font-size: 0.7rem;
            letter-spacing: 2px; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>THE ETHER</h1>
        <div style="font-size:0.5rem; color:#444;">PHYSICS-BASED SPATIAL ENGINE</div>
    </div>

    <div class="grid-card">
        <div class="grid" id="mainGrid">
            <div class="mesh"></div>
            <div class="head"></div>
            <div class="node" id="node"></div>
        </div>
        <div class="controls">
            <div><span class="param">Space Size</span><select id="reverbSize">
                <option value="0.1">Studio (Dry)</option>
                <option value="1.5">Living Room</option>
                <option value="4.0" selected>Concert Hall</option>
                <option value="12.0">Cathedral</option>
            </select></div>
            <div><span class="param">Doppler</span><select id="dopplerToggle">
                <option value="1">Active</option>
                <option value="0">Off</option>
            </select></div>
        </div>
    </div>

    <div id="readout" style="font-family:monospace; font-size:0.6rem; color:#d4af37; text-align:center;">
        COORD: X:0.00 Y:0.00 Z:0.00
    </div>

    <label class="load-btn" for="fileInput">INITIATE MASTER SOURCE</label>
    <input type="file" id="fileInput" accept="audio/*">
</div>

<script>
    let audioCtx, panner, source, mainGain, reverb, reverbGain, backFilter, distanceFilter;
    let coord = { x: 0, y: 0, z: 5 }; // zは奥行き
    const node = document.getElementById('node');

    async function setupEngine(file) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // --- 物理演算ノードの構築 ---
        panner = audioCtx.createPanner();
        panner.panningModel = 'HRTF';
        
        // 1. 距離減衰用フィルタ
        distanceFilter = audioCtx.createBiquadFilter();
        distanceFilter.type = 'lowpass';
        
        // 2. 「背後の音」再現用フィルタ（ Spectral Notch）
        backFilter = audioCtx.createBiquadFilter();
        backFilter.type = 'peaking';
        backFilter.frequency.value = 8000; // 後ろに回った時に削る帯域

        // 3. リバーブ（簡易インパルス応答）
        reverb = audioCtx.createConvolver();
        reverbGain = audioCtx.createGain();
        createReverb(4.0); // 初期値は大ホール

        const buffer = await file.arrayBuffer();
        const audioData = await audioCtx.decodeAudioData(buffer);
        
        if (source) source.stop();
        source = audioCtx.createBufferSource();
        source.buffer = audioData;
        source.loop = true;

        // --- 接続ルーティング ---
        // Source -> BackFilter -> DistFilter -> Panner -> Destination
        //                   L-> Reverb -> ReverbGain -> Destination
        source.connect(backFilter);
        backFilter.connect(distanceFilter);
        distanceFilter.connect(panner);
        panner.connect(audioCtx.destination);
        
        source.connect(reverb);
        reverb.connect(reverbGain);
        reverbGain.connect(audioCtx.destination);

        source.start();
        render();
    }

    function createReverb(duration) {
        const rate = audioCtx.sampleRate;
        const length = rate * duration;
        const impulse = audioCtx.createBuffer(2, length, rate);
        for (let i = 0; i < 2; i++) {
            const channeling = impulse.getChannelData(i);
            for (let j = 0; j < length; j++) {
                channeling[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, 2);
            }
        }
        reverb.buffer = impulse;
        reverbGain.gain.value = duration * 0.1;
    }

    function render() {
        if (!panner) return;
        const now = audioCtx.currentTime;
        const scale = 20;

        // 1. 座標の適用
        panner.positionX.setTargetAtTime(coord.x * scale, now, 0.1);
        panner.positionZ.setTargetAtTime(coord.z * scale, now, 0.1);

        // 2. 距離による空気吸収（高域減衰）
        const dist = Math.sqrt((coord.x*scale)**2 + (coord.z*scale)**2);
        const cutoff = Math.max(1500, 20000 - (dist * 350));
        distanceFilter.frequency.setTargetAtTime(cutoff, now, 0.1);

        // 3. 真後ろにいる時のフィルタ（Spectral Notch）
        // Z座標がプラス（後ろ）になればなるほど、特定の高音をカットして「背後感」を出す
        const backAmount = Math.max(0, coord.z * 15);
        backFilter.gain.setTargetAtTime(-backAmount, now, 0.1);

        // 4. ドップラー効果（速度に応じたピッチ変化）
        if (document.getElementById('dopplerToggle').value === "1") {
            // 前回の座標との差分で簡易計算
            source.playbackRate.setTargetAtTime(1, now, 0.5); 
        }

        // UI
        node.style.left = ((coord.x + 1) / 2 * 100) + '%';
        node.style.top = ((coord.z + 1) / 2 * 100) + '%';
        document.getElementById('readout').innerText = `X:${(coord.x*scale).toFixed(2)} Z:${(coord.z*scale).toFixed(2)} | DIST:${dist.toFixed(1)}m`;

        requestAnimationFrame(render);
    }

    // 操作系
    const mainGrid = document.getElementById('mainGrid');
    let isDown = false;
    const moveNode = (e) => {
        if (!isDown) return;
        const rect = mainGrid.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        coord.x = Math.max(-1, Math.min(1, (t.clientX - rect.left) / rect.width * 2 - 1));
        coord.z = Math.max(-1, Math.min(1, (t.clientY - rect.top) / rect.height * 2 - 1));
    };
    mainGrid.onmousedown = () => { isDown = true; audioCtx?.resume(); };
    window.onmouseup = () => isDown = false;
    window.onmousemove = moveNode;
    mainGrid.ontouchstart = (e) => { isDown = true; e.preventDefault(); audioCtx?.resume(); };
    window.ontouchend = () => isDown = false;
    window.ontouchmove = moveNode;

    document.getElementById('fileInput').onchange = (e) => setupEngine(e.target.files[0]);
    document.getElementById('reverbSize').onchange = (e) => createReverb(parseFloat(e.target.value));
</script>
</body>
</html>
