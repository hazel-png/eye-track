<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motion Spatial Audio</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: sans-serif; display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100vh;
            overflow: hidden; touch-action: none;
        }
        .info { font-size: 0.8rem; color: #666; margin-bottom: 20px; text-align: center; }
        /* 巨大な操作ボタン */
        #motionBtn {
            width: 250px; height: 250px; border-radius: 50%;
            background: radial-gradient(circle, #1a1a1a, #000);
            border: 2px solid var(--gold); color: var(--gold);
            font-size: 1.2rem; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s; -webkit-user-select: none;
        }
        #motionBtn:active {
            transform: scale(0.95); background: var(--gold); color: black;
            box-shadow: 0 0 50px var(--gold);
        }
        .status { margin-top: 30px; font-family: monospace; font-size: 0.7rem; color: var(--gold); }
        #fileInput { margin-bottom: 20px; color: #888; }
    </style>
</head>
<body>

    <div class="info">1. 音声を選択<br>2. ボタンを押し続けながらスマホを動かす</div>
    <input type="file" id="fileInput" accept="audio/*">
    
    <div id="motionBtn">PUSH & MOVE</div>

    <div class="status" id="status">SENSOR: WAIT...</div>

<script>
    let audioCtx, panner, source;
    const motionBtn = document.getElementById('motionBtn');
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');

    let isTracking = false;

    // ファイル読み込み
    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        panner = audioCtx.createPanner();
        panner.panningModel = 'HRTF';

        const arrayBuffer = await file.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

        source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.loop = true;
        source.connect(panner);
        panner.connect(audioCtx.destination);
        
        source.start();
        status.innerText = "READY: PUSH THE BUTTON";

        // iOSのためのセンサー許可リクエスト
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission();
        }
    };

    // センサーイベント
    window.addEventListener('deviceorientation', (event) => {
        if (!isTracking || !panner) return;

        // alpha: 方角(0-360), beta: 前後傾き(-180-180), gamma: 左右傾き(-90-90)
        const x = Math.sin(event.gamma * Math.PI / 180) * 10;
        const y = Math.sin(event.beta * Math.PI / 180) * 10;
        const z = Math.cos(event.alpha * Math.PI / 180) * 10;

        // リアルタイムに音の位置をスマホの傾きに同期
        panner.positionX.setTargetAtTime(x, audioCtx.currentTime, 0.1);
        panner.positionY.setTargetAtTime(y, audioCtx.currentTime, 0.1);
        panner.positionZ.setTargetAtTime(z, audioCtx.currentTime, 0.1);

        status.innerHTML = `X: ${x.toFixed(1)}<br>Y: ${y.toFixed(1)}<br>Z: ${z.toFixed(1)}`;
    });

    // ボタンを押している間だけトラッキング有効
    const startTracking = () => {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        isTracking = true;
    };
    const stopTracking = () => {
        isTracking = false;
        if (panner) {
            // 指を離すと正面に戻る演出
            panner.positionX.setTargetAtTime(0, audioCtx.currentTime, 0.5);
            panner.positionY.setTargetAtTime(0, audioCtx.currentTime, 0.5);
            panner.positionZ.setTargetAtTime(-5, audioCtx.currentTime, 0.5);
        }
    };

    motionBtn.addEventListener('mousedown', startTracking);
    motionBtn.addEventListener('mouseup', stopTracking);
    motionBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startTracking(); });
    motionBtn.addEventListener('touchend', stopTracking);

</script>
</body>
</html>
