<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>High-Precision Spatial Lab</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --grid: rgba(212, 175, 55, 0.1); --grid-bold: rgba(212, 175, 55, 0.25); }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', sans-serif; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh;
            touch-action: none; padding: 20px;
        }
        .title { font-size: 0.7rem; letter-spacing: 5px; color: var(--gold); margin-bottom: 20px; opacity: 0.8; }
        
        /* グリッドコンテナ */
        .grid-container {
            position: relative; width: 300px;
            background: #0a0a0a; border: 1px solid var(--grid-bold);
            border-radius: 8px; margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
            overflow: hidden;
        }

        /* グリッド線（背景） */
        .grid-mesh {
            position: absolute; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .axis-bold {
            position: absolute; background: var(--grid-bold);
        }

        .label {
            position: absolute; font-size: 0.55rem; color: #777; font-weight: bold; letter-spacing: 2px; pointer-events: none;
        }

        .head {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: #444; border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 2; border: 1px solid #666;
        }

        .source-node {
            position: absolute; width: 20px; height: 20px;
            background: var(--gold); border-radius: 50%;
            transform: translate(-50%, -50%); cursor: pointer;
            box-shadow: 0 0 15px var(--gold); z-index: 10;
            transition: transform 0.1s ease;
        }
        .source-node:active { transform: translate(-50%, -50%) scale(1.2); }

        .status-panel { font-family: monospace; font-size: 0.7rem; color: var(--gold); margin-bottom: 15px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; }
        input[type="file"] { margin-bottom: 20px; color: #888; font-size: 0.7rem; border: 1px solid #333; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="title">3D COORDINATE SYNC</div>

<input type="file" id="fileInput" accept="audio/*">

<div class="status-panel" id="status">X: 0.00 | Y: 0.00 | Z: 0.00</div>

<div class="grid-container" id="gridXZ" style="height: 300px;">
    <div class="grid-mesh"></div>
    <div class="axis-bold" style="width: 100%; height: 1px; top: 50%;"></div>
    <div class="axis-bold" style="height: 100%; width: 1px; left: 50%;"></div>
    <div class="label" style="top: 8px; left: 50%; transform: translateX(-50%);">FRONT (-Z)</div>
    <div class="label" style="bottom: 8px; left: 50%; transform: translateX(-50%);">BACK (+Z)</div>
    <div class="label" style="left: 8px; top: 50%; transform: translateY(-50%);">LEFT (-X)</div>
    <div class="label" style="right: 8px; top: 50%; transform: translateY(-50%);">RIGHT (+X)</div>
    <div class="head"></div>
    <div class="source-node" id="nodeXZ" style="top: 50%; left: 50%;"></div>
</div>

<div class="grid-container" id="gridXY" style="height: 160px;">
    <div class="grid-mesh"></div>
    <div class="axis-bold" style="width: 100%; height: 1px; top: 50%;"></div>
    <div class="axis-bold" style="height: 100%; width: 1px; left: 50%;"></div>
    <div class="label" style="top: 8px; left: 50%; transform: translateX(-50%);">TOP (+Y)</div>
    <div class="label" style="bottom: 8px; left: 50%; transform: translateX(-50%);">BOTTOM (-Y)</div>
    <div class="label" style="left: 8px; top: 50%; transform: translateY(-50%);">LEFT</div>
    <div class="label" style="right: 8px; top: 50%; transform: translateY(-50%);">RIGHT</div>
    <div class="head"></div>
    <div class="source-node" id="nodeXY" style="top: 50%; left: 50%;"></div>
</div>

<script>
    let audioCtx, panner, source;
    // 内部座標 (-1.0 to 1.0)
    let coord = { x: 0, y: 0, z: 0 };

    const nodeXZ = document.getElementById('nodeXZ');
    const nodeXY = document.getElementById('nodeXY');
    const status = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');

    // 左右の同期を含む描画更新
    function updateUI() {
        // XZグリッドの更新
        nodeXZ.style.left = ((coord.x + 1) / 2 * 100) + '%';
        nodeXZ.style.top = ((coord.z + 1) / 2 * 100) + '%';
        
        // XYグリッドの更新（Xを同期）
        nodeXY.style.left = ((coord.x + 1) / 2 * 100) + '%';
        nodeXY.style.top = ((-coord.y + 1) / 2 * 100) + '%';

        if (panner) {
            const scale = 20; // 空間の広さ
            panner.positionX.setTargetAtTime(coord.x * scale, audioCtx.currentTime, 0.05);
            panner.positionY.setTargetAtTime(coord.y * scale, audioCtx.currentTime, 0.05);
            panner.positionZ.setTargetAtTime(coord.z * scale, audioCtx.currentTime, 0.05);
            status.innerText = `X: ${(coord.x*scale).toFixed(2)} | Y: ${(coord.y*scale).toFixed(2)} | Z: ${(coord.z*scale).toFixed(2)}`;
        }
    }

    // ドラッグ処理
    function setupInput(grid, callback) {
        let isDragging = false;
        const process = (e) => {
            if (!isDragging) return;
            const rect = grid.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            let x = (touch.clientX - rect.left) / rect.width;
            let y = (touch.clientY - rect.top) / rect.height;
            callback(Math.max(0, Math.min(1, x)) * 2 - 1, Math.max(0, Math.min(1, y)) * 2 - 1);
            updateUI();
        };
        grid.addEventListener('mousedown', () => { isDragging = true; if(audioCtx) audioCtx.resume(); });
        grid.addEventListener('touchstart', (e) => { isDragging = true; e.preventDefault(); if(audioCtx) audioCtx.resume(); });
        window.addEventListener('mousemove', process);
        window.addEventListener('touchmove', process);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);
    }

    // XZ面: 左右(X)と前後(Z)
    setupInput(document.getElementById('gridXZ'), (nx, nz) => {
        coord.x = nx;
        coord.z = nz;
    });

    // XY面: 左右(X)と上下(Y) ※ここでXが同期される
    setupInput(document.getElementById('gridXY'), (nx, ny) => {
        coord.x = nx;
        coord.y = -ny; // Y軸は上がプラス
    });

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            panner = audioCtx.createPanner();
            panner.panningModel = 'HRTF';
        }
        const buffer = await file.arrayBuffer();
        const audioData = await audioCtx.decodeAudioData(buffer);
        if (source) source.stop();
        source = audioCtx.createBufferSource();
        source.buffer = audioData;
        source.loop = true;
        source.connect(panner).connect(audioCtx.destination);
        source.start();
        updateUI();
    };
</script>
</body>
</html>
