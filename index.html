<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR - Light Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
        #overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #fff; z-index: 2000; }
        .btn { background: #4285F4; color: white; border: none; padding: 20px 40px; border-radius: 8px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="overlay"><button class="btn" id="start-btn">軽量モードで開始</button></div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        const CONFIG = { scale: 1.1, deskH: 1.5, fingerR: 0.015 };
        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const fingers = [];
        const _v = new THREE.Vector3();

        async function init() {
            document.getElementById('overlay').remove();

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 50);
            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true }); // antialiasをOFF
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);

            // Objects
            const desk = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.6), new THREE.MeshStandardMaterial({ color: 0xdddddd }));
            desk.position.set(0, CONFIG.deskH, -0.3);
            scene.add(desk);
            const deskBody = new CANNON.Body({ mass: 0 });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.6, 0.025, 0.3)));
            deskBody.position.copy(desk.position);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.2 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, CONFIG.deskH + 0.3, -0.3);
            world.addBody(cubeBody);

            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(CONFIG.fingerR, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0 });
                body.addShape(new CANNON.Sphere(CONFIG.fingerR));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            // --- AI Models (Lightweight Config) ---
            const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5 });
            
            const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6 }); // Complexity 0

            faceMesh.onResults((res) => {
                if (res.multiFaceLandmarks?.[0]) {
                    const n = res.multiFaceLandmarks[0][1];
                    camera.position.lerp(_v.set((n.x - 0.5) * CONFIG.scale, -(n.y - 0.5) * CONFIG.scale + CONFIG.deskH, -n.z * CONFIG.scale), 0.2);
                }
            });

            hands.onResults((res) => {
                if (!res.multiHandLandmarks?.[0]) return;
                res.multiHandLandmarks[0].forEach((p, i) => {
                    _v.set((p.x - 0.5) * CONFIG.scale, -(p.y - 0.5) * CONFIG.scale + CONFIG.deskH, -p.z * CONFIG.scale - 0.2);
                    fingers[i].body.position.copy(_v);
                    fingers[i].mesh.position.copy(_v);
                });
            });

            const video = document.getElementById('input_video');
            const cam = new Camera(video, {
                onFrame: async () => {
                    // 負荷分散のため、1フレームごとに顔と手を交互に処理する簡易ハック
                    if (Date.now() % 2 === 0) await hands.send({ image: video });
                    else await faceMesh.send({ image: video });
                },
                width: 640, height: 480 // 低解像度化
            });
            cam.start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').onclick = init;
    </script>
</body>
</html>
