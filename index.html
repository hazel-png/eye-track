<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spatial Studio - Google Style Calibration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #f8f9fa; font-family: 'Roboto', 'Segoe UI', sans-serif; }
        video { display: none; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.95); z-index: 2000; transition: opacity 0.5s;
        }
        .card {
            background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px;
        }
        h1 { font-size: 24px; color: #202124; margin: 0 0 16px; font-weight: 400; }
        p { color: #5f6368; line-height: 1.6; margin-bottom: 32px; }
        .btn {
            background: #1a73e8; color: white; border: none; padding: 12px 24px;
            border-radius: 100px; font-size: 16px; cursor: pointer; transition: background 0.2s;
        }
        .btn:hover { background: #1765cc; }
        
        /* Calibration Guide Visual */
        #calibration-guide {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border: 4px dashed #1a73e8;
            border-radius: 50%; display: none; z-index: 1500;
            justify-content: center; align-items: center; pointer-events: none;
        }
        #progress-ring {
            position: absolute; width: 120px; height: 120px;
            border-radius: 50%; border: 6px solid transparent;
            border-top-color: #1a73e8; animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="card">
            <h1>空間のセットアップ</h1>
            <p>あなたの腕の長さに合わせて、操作感を最適化します。準備ができたら開始してください。</p>
            <button class="btn" id="start-init">セットアップを開始</button>
        </div>
    </div>
    
    <div id="calibration-guide">
        <div id="progress-ring"></div>
        <div style="color: #1a73e8; font-size: 12px; text-align: center;">ここに合わせて<br>3秒キープ</div>
    </div>

    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        let isCalibrated = false;
        let calibrationCount = 0;
        let tempZDepth = 0;

        const SCALE_CONFIG = {
            handSpread: 1.4, handVertical: 1.4, handDepth: 2.5, zOffset: -0.3, fingerRadius: 0.012
        };

        const fingers = [];
        const _v = new THREE.Vector3();
        const dt = 1/60;

        async function init() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('calibration-guide').style.display = 'flex';

            // --- Three.js Engine ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // --- Physics ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const handMat = new CANNON.Material("handMat");
            const objectMat = new CANNON.Material("objectMat");
            world.addContactMaterial(new CANNON.ContactMaterial(handMat, objectMat, { friction: 1.0, restitution: 0.1 }));

            // Scene Assets
            const deskMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.6), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            deskMesh.position.set(0, 1.0, -0.4);
            scene.add(deskMesh);
            const deskBody = new CANNON.Body({ mass: 0, material: objectMat });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.6, 0.025, 0.3)));
            deskBody.position.copy(deskMesh.position);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.2, material: objectMat, linearDamping: 0.5, angularDamping: 0.5 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.04, 0.04, 0.04)));
            cubeBody.position.set(0, 1.3, -0.4);
            world.addBody(cubeBody);

            // Google Lime Green Fingers
            const fingerGeo = new THREE.SphereGeometry(SCALE_CONFIG.fingerRadius, 16, 16);
            const fingerMat = new THREE.MeshStandardMaterial({ color: 0xccff00, emissive: 0xccff00, emissiveIntensity: 0.4 });
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fingerGeo, fingerMat);
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, material: handMat, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(SCALE_CONFIG.fingerRadius));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(1, 2, 1);
            scene.add(sun);

            // --- Hand Tracking & Auto-Calibration ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) {
                    document.getElementById('progress-ring').style.display = 'none';
                    calibrationCount = 0;
                    return;
                }

                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0];

                if (!isCalibrated) {
                    // キャリブレーションガイドの位置（画面中央）に手があるかチェック
                    const inTarget = Math.abs(wrist.x - 0.5) < 0.15 && Math.abs(wrist.y - 0.5) < 0.15;
                    
                    if (inTarget) {
                        document.getElementById('progress-ring').style.display = 'block';
                        calibrationCount++;
                        tempZDepth += wrist.z;

                        if (calibrationCount > 90) { // 約3秒間
                            const avgZ = tempZDepth / calibrationCount;
                            SCALE_CONFIG.handDepth = (1.0 / Math.abs(avgZ)) * 0.7;
                            SCALE_CONFIG.zOffset = -0.3;
                            isCalibrated = true;
                            document.getElementById('calibration-guide').style.display = 'none';
                        }
                    } else {
                        document.getElementById('progress-ring').style.display = 'none';
                        calibrationCount = 0;
                        tempZDepth = 0;
                    }
                    return;
                }

                // 実行フェーズ
                const xrCamera = renderer.xr.getCamera(camera);
                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    _v.set(
                        (point.x - 0.5) * SCALE_CONFIG.handSpread, 
                        -(point.y - 0.5) * SCALE_CONFIG.handVertical, 
                        -point.z * SCALE_CONFIG.handDepth + SCALE_CONFIG.zOffset
                    );
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    
                    const nextPos = new CANNON.Vec3(_v.x, _v.y, _v.z);
                    f.body.velocity.set((nextPos.x - f.body.position.x)/dt, (nextPos.y - f.body.position.y)/dt, (nextPos.z - f.body.position.z)/dt);
                    f.body.position.copy(nextPos);
                    f.mesh.position.copy(f.body.position);
                });
            });

            const video = document.getElementById('input_video');
            new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            }).start();

            renderer.setAnimationLoop(() => {
                world.step(dt);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-init').addEventListener('click', init);
    </script>
</body>
</html>
