<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebXR Spatial - Haptic Calibration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #000; z-index: 2000; color: white;
        }
        .ios-btn {
            background: #007AFF; color: white; border: none; padding: 20px 40px;
            border-radius: 20px; font-size: 20px; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <button class="ios-btn" id="start-btn">VRを起動して装着</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        let calibSphere, isCalibrating = false, calibComplete = false;
        let maxReachZ = 0.2;
        const fingers = [];
        const dt = 1/60;

        // 振動関数（ブラウザ/デバイスの互換性考慮）
        function vibrate(ms) {
            if (navigator.vibrate) navigator.vibrate(ms);
        }

        async function init() {
            document.getElementById('overlay').remove();

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);

            // --- VR内キャリブレーション用ボタン (球体) ---
            const sphereGeo = new THREE.SphereGeometry(0.08, 32, 32);
            const sphereMat = new THREE.MeshStandardMaterial({ 
                color: 0x007AFF, transparent: true, opacity: 0.6, roughness: 0 
            });
            calibSphere = new THREE.Mesh(sphereGeo, sphereMat);
            calibSphere.position.set(0, 1.2, -0.4); // 目の前に浮かせる
            scene.add(calibSphere);

            // --- 物理オブジェクト ---
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            cubeMesh.visible = false; // キャリブ完了まで隠す
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.5 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, 1.5, -0.6);
            world.addBody(cubeBody);

            scene.add(new THREE.AmbientLight(0xffffff, 1));

            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.012), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(0.012));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            // --- MediaPipe ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

            let currentRawZ = 0;
            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                const xrCamera = renderer.xr.getCamera(camera);
                currentRawZ = landmarks[0].z;

                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    // キャリブレーション前は生データを少し強調、後はmaxReachZで補正
                    const zScale = calibComplete ? (point.z / maxReachZ) * 1.5 : point.z * 4;
                    const _v = new THREE.Vector3((point.x - 0.5) * 1.8, -(point.y - 0.5) * 1.8, -zScale - 0.5);
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    
                    f.body.position.copy(_v);
                    f.mesh.position.copy(f.body.position);
                });

                // キャリブレーション判定 (人差し指の先端 index_finger_tip = 8)
                if (!calibComplete && !isCalibrating) {
                    const tip = fingers[8].body.position;
                    const dist = tip.distanceTo(calibSphere.position);
                    if (dist < 0.1) {
                        startVRCalibration();
                    }
                }
            });

            const video = document.getElementById('input_video');
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cameraUtils.start();

            renderer.setAnimationLoop(() => {
                world.step(dt);
                if (calibComplete) {
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }

        function startVRCalibration() {
            isCalibrating = true;
            vibrate(10); // 接触時のクリック感
            calibSphere.material.color.set(0xff3b30); // iOS的な赤に変更
            
            let count = 3;
            const timer = setInterval(() => {
                vibrate(5); // カウントダウンの鼓動
                count--;
                if (count <= 0) {
                    clearInterval(timer);
                    maxReachZ = Math.abs(fingers[0].body.position.z - camera.position.z); // 距離を記録
                    maxReachZ = Math.max(0.1, Math.abs(currentRawZ));
                    
                    calibComplete = true;
                    calibSphere.visible = false;
                    cubeMesh.visible = true;
                    vibrate([50, 30, 50]); // 完了の「タタンッ」という振動
                }
            }, 1000);
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
