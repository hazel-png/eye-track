<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simple VR Hand Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
        #vr-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #fff; z-index: 2000;
        }
        .btn { background: #1a73e8; color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 20px; }
    </style>
</head>
<body>
    <div id="vr-ui"><button class="btn" id="start-btn">START VR</button></div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, calibRing;
        let isCalibrated = false, calibCount = 0, maxReach = 0.1;
        const fingers = [];

        async function init() {
            document.getElementById('vr-ui').style.display = 'none';

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // キャリブレーション用リング
            calibRing = new THREE.Mesh(
                new THREE.TorusGeometry(0.05, 0.002, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0x1a73e8 })
            );
            calibRing.position.set(0, 1.2, -0.5);
            scene.add(calibRing);

            // 指の関節（21個の球体）
            const geo = new THREE.SphereGeometry(0.01, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            for (let i = 0; i < 21; i++) {
                const s = new THREE.Mesh(geo, mat);
                scene.add(s);
                fingers.push(s);
            }

            const video = document.getElementById('input_video');
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                const xrCamera = renderer.xr.getCamera(camera);

                // キャリブレーション：腕をピンと伸ばした状態を計測
                if (!isCalibrated && renderer.xr.isPresenting) {
                    calibCount++;
                    maxReach = Math.max(maxReach, Math.abs(landmarks[0].z));
                    if (calibCount > 60) {
                        isCalibrated = true;
                        calibRing.visible = false;
                    }
                    return;
                }

                // 指の描画
                const depthScale = 0.8 / maxReach; // リーチを約80cmに正規化
                landmarks.forEach((pt, i) => {
                    const vec = new THREE.Vector3(
                        (pt.x - 0.5) * 1.5,
                        -(pt.y - 0.5) * 1.5,
                        -pt.z * depthScale - 0.2 // 少し手前にオフセット
                    );
                    vec.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    fingers[i].position.copy(vec);
                });
            });

            // 外カメラ(environment)を使用
            const cam = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cam.start();

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
