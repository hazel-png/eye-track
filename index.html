<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Acoustic Master: Cathedral</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --grid: rgba(212, 175, 55, 0.1); --cyan: #00f2ff; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column;
            align-items: center; min-height: 100vh; touch-action: none; padding: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 0.7rem; letter-spacing: 8px; color: var(--gold); text-transform: uppercase; margin: 0; }
        
        .console {
            display: flex; flex-direction: column; gap: 15px; padding: 25px;
            background: linear-gradient(145deg, #0f0f0f, #050505);
            border-radius: 30px; border: 1px solid #1a1a1a; box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .grid-container {
            position: relative; width: 300px; background: #020202;
            border: 1px solid #222; border-radius: 12px; overflow: hidden;
        }

        .mesh {
            position: absolute; width: 100%; height: 100%;
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .node {
            position: absolute; width: 12px; height: 12px; background: var(--gold);
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--gold); z-index: 10;
        }

        .head-core {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            background: var(--cyan); border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--cyan);
        }

        .readout { font-family: monospace; font-size: 0.6rem; color: var(--gold); display: flex; justify-content: space-between; }
        
        .upload-btn {
            background: var(--gold); color: black; border: none; padding: 12px;
            border-radius: 8px; font-size: 0.7rem; font-weight: bold; cursor: pointer; text-align: center;
        }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>Convolver Reverb Engine</h1>
</div>

<div class="console">
    <div class="readout">
        <span id="pos-x">X: 0.00</span>
        <span id="pos-z">Z: 0.00</span>
        <span id="reverb-mix">REVERB: 100%</span>
    </div>

    <div class="grid-container" id="gridXZ" style="height: 300px;">
        <div class="mesh"></div>
        <div class="head-core"></div>
        <div class="node" id="nodeXZ" style="top:50%; left:50%;"></div>
    </div>

    <div class="grid-container" id="gridXY" style="height: 100px;">
        <div class="mesh"></div>
        <div class="head-core"></div>
        <div class="node" id="nodeXY" style="top:50%; left:50%;"></div>
    </div>

    <label class="upload-btn" for="fileInput">SELECT AUDIO SOURCE</label>
    <input type="file" id="fileInput" accept="audio/*">
</div>

<script>
    let audioCtx, panner, source, filter, convolver, wetGain, dryGain;
    let coord = { x: 0, y: 0, z: 0 };

    // 数式で「大聖堂の響き」のインパルス応答を生成する関数
    function createImpulseResponse(duration, decay) {
        const sampleRate = audioCtx.sampleRate;
        const length = sampleRate * duration;
        const impulse = audioCtx.createBuffer(2, length, sampleRate);
        for (let i = 0; i < 2; i++) {
            const channelData = impulse.getChannelData(i);
            for (let j = 0; j < length; j++) {
                // 指数関数的に減衰するホワイトノイズ
                channelData[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, decay);
            }
        }
        return impulse;
    }

    async function initAudio(file) {
        if (audioCtx) audioCtx.close();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Panner (HRTF)
        panner = audioCtx.createPanner();
        panner.panningModel = 'HRTF';

        // Reverb (Convolver)
        convolver = audioCtx.createConvolver();
        convolver.buffer = createImpulseResponse(4.0, 6.0); // 4秒の長い残響

        // Mix Control
        dryGain = audioCtx.createGain();
        wetGain = audioCtx.createGain();
        dryGain.gain.value = 0.6; // 直接音
        wetGain.gain.value = 0.5; // 残響音（ここを上げるとリバーブが深くなる）

        const buffer = await file.arrayBuffer();
        const audioData = await audioCtx.decodeAudioData(buffer);
        
        source = audioCtx.createBufferSource();
        source.buffer = audioData;
        source.loop = true;

        // 接続
        // Source -> Panner -> Destination (Direct)
        // Source -> Panner -> Convolver -> WetGain -> Destination (Reverb)
        source.connect(panner);
        panner.connect(dryGain);
        dryGain.connect(audioCtx.destination);

        panner.connect(convolver);
        convolver.connect(wetGain);
        wetGain.connect(audioCtx.destination);
        
        source.start();
        update();
    }

    function update() {
        if (!panner) return;
        const scale = 30;
        const now = audioCtx.currentTime;
        panner.positionX.setTargetAtTime(coord.x * scale, now, 0.1);
        panner.positionY.setTargetAtTime(coord.y * scale, now, 0.1);
        panner.positionZ.setTargetAtTime(coord.z * scale, now, 0.1);

        nodeXZ.style.left = ((coord.x + 1) / 2 * 100) + '%';
        nodeXZ.style.top = ((coord.z + 1) / 2 * 100) + '%';
        nodeXY.style.left = ((coord.x + 1) / 2 * 100) + '%';
        nodeXY.style.top = ((-coord.y + 1) / 2 * 100) + '%';

        document.getElementById('pos-x').innerText = `X: ${(coord.x * scale).toFixed(1)}`;
        document.getElementById('pos-z').innerText = `Z: ${(coord.z * scale).toFixed(1)}`;
    }

    function handleDrag(grid, type) {
        let isDown = false;
        const move = (e) => {
            if(!isDown) return;
            const rect = grid.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            const nx = (touch.clientX - rect.left) / rect.width * 2 - 1;
            const ny = (touch.clientY - rect.top) / rect.height * 2 - 1;
            coord.x = Math.max(-1, Math.min(1, nx));
            if(type === 'XZ') coord.z = Math.max(-1, Math.min(1, ny));
            else coord.y = -Math.max(-1, Math.min(1, ny));
            update();
        };
        grid.addEventListener('mousedown', () => { isDown = true; audioCtx?.resume(); });
        window.addEventListener('mouseup', () => isDown = false);
        window.addEventListener('mousemove', move);
        grid.addEventListener('touchstart', (e) => { isDown = true; e.preventDefault(); audioCtx?.resume(); });
        window.addEventListener('touchend', () => isDown = false);
        window.addEventListener('touchmove', move);
    }

    handleDrag(document.getElementById('gridXZ'), 'XZ');
    handleDrag(document.getElementById('gridXY'), 'XY');
    document.getElementById('fileInput').onchange = (e) => initAudio(e.target.files[0]);
</script>
</body>
</html>
