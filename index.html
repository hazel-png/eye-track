<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spatial Studio - iOS Style</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        :root {
            --ios-blue: #007AFF;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* iOS-style Start Screen */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            z-index: 2000;
            color: white;
            text-align: center;
        }

        .ios-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 80%;
            max-width: 320px;
        }

        h1 { font-weight: 600; font-size: 24px; margin-bottom: 10px; }
        p { font-size: 14px; opacity: 0.7; margin-bottom: 30px; line-height: 1.5; }

        .ios-btn {
            background: var(--ios-blue);
            color: white;
            border: none;
            padding: 16px 0;
            width: 100%;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }

        .ios-btn:active {
            transform: scale(0.96);
            filter: brightness(1.1);
        }

        #input_video { display: none; }

        /* AR/VR Overlay UI */
        #status-bar {
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none;
            z-index: 1000;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <div class="ios-card">
            <h1>Spatial Studio</h1>
            <p>ブラウザで体験する次世代の<br>ハンドトラッキングVR</p>
            <button class="ios-btn" id="start-btn">Start Session</button>
        </div>
    </div>
    
    <div id="status-bar">Tracking Active</div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        const SCALE_CONFIG = {
            handSpread: 1.8,    
            handVertical: 1.8,  
            handDepth: 4.5,     
            zOffset: -0.7,      
            fingerRadius: 0.015,
            lerpFactor: 0.4     // 滑らかさ係数 (0~1)
        };

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const fingers = [];
        const _v = new THREE.Vector3();
        const dt = 1/60;

        async function init() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('status-bar').style.display = 'block';

            // --- Three.js Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // iOS-style VR Button
            const vrButton = VRButton.createButton(renderer);
            vrButton.style.background = "rgba(255,255,255,0.1)";
            vrButton.style.backdropFilter = "blur(10px)";
            vrButton.style.borderRadius = "14px";
            vrButton.style.border = "1px solid rgba(255,255,255,0.2)";
            vrButton.style.bottom = "40px";
            document.body.appendChild(vrButton);

            // --- Physics Setup ---
            world = new CANNON.World();
            world.gravity.set(0, -9.82, 0);
            
            // Materials
            const handMat = new CANNON.Material("hand");
            const boxMat = new CANNON.Material("box");
            world.addContactMaterial(new CANNON.ContactMaterial(handMat, boxMat, { 
                friction: 0.4, restitution: 0.3 
            }));

            // Table
            const tableMesh = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 0.05, 1), 
                new THREE.MeshStandardMaterial({ color: 0x222222 })
            );
            tableMesh.position.set(0, 0.9, -0.6);
            scene.add(tableMesh);

            const tableBody = new CANNON.Body({ mass: 0 });
            tableBody.addShape(new CANNON.Box(new CANNON.Vec3(0.75, 0.025, 0.5)));
            tableBody.position.copy(tableMesh.position);
            world.addBody(tableBody);

            // Cube (Target)
            cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.1, 0.1), 
                new THREE.MeshStandardMaterial({ color: 0x007AFF, roughness: 0.2 })
            );
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.2, material: boxMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, 1.2, -0.6);
            world.addBody(cubeBody);

            // Fingers
            const fingerGeo = new THREE.SphereGeometry(SCALE_CONFIG.fingerRadius, 16, 16);
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fingerGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, material: handMat, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(SCALE_CONFIG.fingerRadius));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(1, 2, 1);
            scene.add(light);

            // --- MediaPipe Setup ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const xrCamera = renderer.xr.getCamera(camera);
                const landmarks = results.multiHandLandmarks[0];

                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    
                    // Super Reach Logic with Smoothing
                    const targetX = (point.x - 0.5) * SCALE_CONFIG.handSpread;
                    const targetY = -(point.y - 0.5) * SCALE_CONFIG.handVertical;
                    const targetZ = -point.z * SCALE_CONFIG.handDepth + SCALE_CONFIG.zOffset;

                    _v.set(targetX, targetY, targetZ);
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    
                    // Smooth Transition (Lerp)
                    f.body.position.x += (_v.x - f.body.position.x) * SCALE_CONFIG.lerpFactor;
                    f.body.position.y += (_v.y - f.body.position.y) * SCALE_CONFIG.lerpFactor;
                    f.body.position.z += (_v.z - f.body.position.z) * SCALE_CONFIG.lerpFactor;
                    
                    f.mesh.position.copy(f.body.position);
                });
            });

            const video = document.getElementById('input_video');
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cameraUtils.start();

            // Render Loop
            renderer.setAnimationLoop(() => {
                world.step(dt);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
