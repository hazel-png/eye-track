<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Physics Desk</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --ios-bg: rgba(25, 25, 25, 0.7); --ios-accent: #0A84FF; }
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        video { display: none; }
        #ios-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1c1c1e 0%, #000 100%);
            z-index: 2000; color: white; transition: opacity 0.5s;
        }
        .glass-card {
            background: var(--ios-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 30px; padding: 40px; width: 80%; max-width: 320px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .start-btn {
            background: var(--ios-accent); color: white; border: none; padding: 15px 40px;
            border-radius: 25px; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        #VRButton { border-radius: 20px !important; background: var(--ios-bg) !important; bottom: 40px !important; }
    </style>
</head>
<body>
    <div id="ios-ui">
        <div class="glass-card">
            <h1>Spatial Desk</h1>
            <p>目の前の机の上にオブジェクトを用意しました。<br>背面カメラでAR体験を開始します。</p>
            <button class="start-btn" id="start-btn">開始する</button>
        </div>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const tipMeshes = [], tipBodies = [];

        async function init() {
            document.getElementById('ios-ui').style.opacity = '0';
            setTimeout(() => document.getElementById('ios-ui').style.display = 'none', 500);

            // --- Three.js Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(1, 5, 1);
            scene.add(light);

            // --- Cannon.js World ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);

            // --- 机 (Desk) の作成 ---
            const deskHeight = 0.8; // 机の高さ
            const deskWidth = 1.2;
            const deskDepth = 0.6;

            // 視覚的な机
            const deskGeo = new THREE.BoxGeometry(deskWidth, 0.05, deskDepth);
            const deskMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
            const deskMesh = new THREE.Mesh(deskGeo, deskMat);
            deskMesh.position.set(0, deskHeight, -0.5); // プレイヤーの目の前
            scene.add(deskMesh);

            // 机の脚（iPhone Store風の細い脚）
            const legGeo = new THREE.CylinderGeometry(0.02, 0.02, deskHeight);
            const legPositions = [
                [deskWidth/2.2, deskHeight/2, -0.5 + deskDepth/2.2],
                [-deskWidth/2.2, deskHeight/2, -0.5 + deskDepth/2.2],
                [deskWidth/2.2, deskHeight/2, -0.5 - deskDepth/2.2],
                [-deskWidth/2.2, deskHeight/2, -0.5 - deskDepth/2.2]
            ];
            legPositions.forEach(pos => {
                const leg = new THREE.Mesh(legGeo, deskMat);
                leg.position.set(...pos);
                scene.add(leg);
            });

            // 物理的な机（上面のみ）
            const deskBody = new CANNON.Body({ mass: 0 });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(deskWidth/2, 0.025, deskDepth/2)));
            deskBody.position.set(0, deskHeight, -0.5);
            world.addBody(deskBody);

            // --- ターゲット (Cube) ---
            cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.15, 0.15, 0.15), 
                new THREE.MeshStandardMaterial({ color: 0x0A84FF, metalness: 0.3, roughness: 0.2 })
            );
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.3 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.075, 0.075, 0.075)));
            cubeBody.position.set(0, deskHeight + 0.3, -0.5); // 机の少し上に配置
            world.addBody(cubeBody);

            // --- ハンドトラッキング用関節 ---
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.015), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                tipMeshes.push(mesh);
                const body = new CANNON.Body({ mass: 0 });
                body.addShape(new CANNON.Sphere(0.015));
                world.addBody(body);
                tipBodies.push(body);
            }

            // --- MediaPipe Hand Tracking (背面カメラ) ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    const xrCamera = renderer.xr.getCamera(camera);
                    lm.forEach((point, i) => {
                        // 手の位置をカメラの向き・位置に合わせてマッピング
                        const v = new THREE.Vector3(
                            (point.x - 0.5) * 1.5, 
                            -(point.y - 0.5) * 1.5, 
                            -point.z * 1.2 - 0.3 // Z軸をより手前に調整
                        ).applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        tipBodies[i].position.copy(v);
                        tipMeshes[i].position.copy(v);
                    });
                }
            });

            const videoElement = document.getElementById('input_video');
            const cameraStream = new Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                facingMode: "environment",
                width: 1280, height: 720
            });
            cameraStream.start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(init).catch(console.error);
            } else {
                init();
            }
        });
    </script>
</body>
</html>
