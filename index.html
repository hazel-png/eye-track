<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spatial Studio Ultra</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Roboto', sans-serif; }
        video { display: none; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #ffffff 0%, #f0f0f0 100%); z-index: 2000;
        }
        .btn {
            background: #1a73e8; color: white; border: none; padding: 24px 48px;
            border-radius: 100px; font-size: 22px; font-weight: 500; cursor: pointer;
            box-shadow: 0 8px 24px rgba(26,115,232,0.3); transition: all 0.3s ease;
        }
        .btn:active { transform: scale(0.95); box-shadow: 0 4px 12px rgba(26,115,232,0.2); }
    </style>
</head>
<body>
    <div id="overlay">
        <button class="btn" id="start-btn">VR体験を開始</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, deskGroup;
        let calibRing, isCalibrated = false;
        let calibCount = 0, accumZ = 0;

        const CONFIG = {
            handSpread: 1.6,
            handVertical: 1.6,
            handDepth: 4.5, // キャリブレーションで動的に上書き
            zOffset: -0.25,
            smoothing: 0.15, // 指数移動平均の重み (0-1, 小さいほど滑らか)
            targetZ: -0.6    // キャリブレーションターゲットの物理距離
        };

        const fingers = [];
        const dt = 1/60;
        const _tempV = new THREE.Vector3();

        async function init() {
            document.getElementById('overlay').remove();

            // --- Engine Setup ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // --- Physics ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            world.solver.iterations = 10;
            const handMat = new CANNON.Material("hand");
            const objMat = new CANNON.Material("obj");
            world.addContactMaterial(new CANNON.ContactMaterial(handMat, objMat, { friction: 0.4, restitution: 0.1 }));

            // --- Calibration Ring ---
            calibRing = new THREE.Group();
            const ringMain = new THREE.Mesh(
                new THREE.TorusGeometry(0.12, 0.006, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0x4285F4, transparent: true, opacity: 0.8 })
            );
            calibRing.add(ringMain);
            calibRing.position.set(0, 1.3, CONFIG.targetZ);
            scene.add(calibRing);

            // --- Stage Assets ---
            deskGroup = new THREE.Group();
            const deskBase = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.05, 0.6),
                new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 })
            );
            deskBase.position.set(0, 0.9, -0.5);
            deskBase.receiveShadow = true;
            deskGroup.add(deskBase);
            scene.add(deskGroup);
            deskGroup.visible = false;

            const deskBody = new CANNON.Body({ mass: 0, material: objMat });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.6, 0.025, 0.3)));
            deskBody.position.copy(deskBase.position);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.08, 0.08, 0.08),
                new THREE.MeshStandardMaterial({ color: 0x1a73e8, metalness: 0.1, roughness: 0.2 })
            );
            cubeMesh.castShadow = true;
            scene.add(cubeMesh);
            cubeMesh.visible = false;

            cubeBody = new CANNON.Body({ mass: 0.2, material: objMat, linearDamping: 0.3, angularDamping: 0.3 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.04, 0.04, 0.04)));
            cubeBody.position.set(0, 1.2, -0.5);
            world.addBody(cubeBody);

            // --- Pro-Visual Hands ---
            const fingerGeo = new THREE.SphereGeometry(0.014, 24, 24);
            const fingerMat = new THREE.MeshStandardMaterial({ 
                color: 0x39ff14, emissive: 0x39ff14, emissiveIntensity: 0.5, roughness: 0 
            });
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fingerGeo, fingerMat);
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, material: handMat, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(0.014));
                world.addBody(body);
                fingers.push({ mesh, body, lastPos: new THREE.Vector3() });
            }

            // --- Lighting ---
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const spot = new THREE.SpotLight(0xffffff, 0.8);
            spot.position.set(0, 3, 1);
            spot.castShadow = true;
            scene.add(spot);

            // --- Hand Tracking Logic ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75, minTrackingConfidence: 0.75 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) {
                    if(!isCalibrated) {
                        calibRing.scale.setScalar(1 + Math.sin(Date.now() * 0.004) * 0.05);
                        calibCount = 0;
                    }
                    return;
                }

                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0];
                const xrCamera = renderer.xr.getCamera(camera);

                // Calibration Logic
                if (!isCalibrated && renderer.xr.isPresenting) {
                    const inTarget = Math.abs(wrist.x - 0.5) < 0.18 && Math.abs(wrist.y - 0.5) < 0.18;
                    if (inTarget) {
                        calibCount++;
                        accumZ += Math.abs(wrist.z);
                        const p = calibCount / 60;
                        ringMain.material.color.lerpColors(new THREE.Color(0x4285F4), new THREE.Color(0x39ff14), 0.1);
                        calibRing.scale.setScalar(1 - p * 0.3);
                        calibRing.rotation.z += 0.1;

                        if (calibCount > 60) {
                            CONFIG.handDepth = Math.abs(CONFIG.targetZ) / (accumZ / calibCount || 0.1);
                            isCalibrated = true;
                            // Cinema transition
                            calibRing.visible = false;
                            deskGroup.visible = true;
                            cubeMesh.visible = true;
                        }
                    } else {
                        calibCount = 0; accumZ = 0;
                        ringMain.material.color.set(0x4285F4);
                    }
                }

                // High-End Position Mapping with EMA Smoothing
                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    _tempV.set(
                        (point.x - 0.5) * CONFIG.handSpread,
                        -(point.y - 0.5) * CONFIG.handVertical,
                        -point.z * CONFIG.handDepth + CONFIG.zOffset
                    );
                    _tempV.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);

                    // Smoothing filter
                    f.lastPos.lerp(_tempV, CONFIG.smoothing);
                    
                    f.body.position.set(f.lastPos.x, f.lastPos.y, f.lastPos.z);
                    f.mesh.position.copy(f.lastPos);
                });
            });

            const video = document.getElementById('input_video');
            new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            }).start();

            renderer.setAnimationLoop(() => {
                if (isCalibrated) {
                    world.step(dt);
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                    
                    // アニメーション効果: 机が少し揺れるのを防ぐ
                    if(cubeBody.position.y < 0.8) cubeBody.position.y = 0.95;
                }
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
