<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Pro Hand Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>body { margin: 0; overflow: hidden; background: #000; } video { display: none; }</style>
</head>
<body>
    <div id="vr-ui" style="position:fixed; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#fff; z-index:2000;">
        <button id="start-btn" style="background:#1a73e8; color:white; border:none; padding:20px 40px; border-radius:50px; font-size:20px; cursor:pointer;">ENTER ULTRA VR</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeBody, cubeMesh;
        let isCalibrated = false, calibCount = 0, reachLimit = 0;
        const fingers = [];
        const smoothedPoints = Array.from({ length: 21 }, () => new THREE.Vector3());
        
        // 指数平滑化フィルタの係数（小さいほどヌルヌル、大きいほど爆速反応）
        const LERP_FACTOR = 0.35; 

        async function init() {
            document.getElementById('vr-ui').style.display = 'none';
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // UI
            const instr = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.2), new THREE.MeshBasicMaterial({ 
                map: createTextTex("MAX EXTEND & HOLD"), transparent: true 
            }));
            instr.position.set(0, 1.2, -0.6);
            scene.add(instr);

            // Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);

            // Objects
            const desk = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.6), new THREE.MeshStandardMaterial({color:0x222222}));
            desk.position.set(0, 0.8, -0.5);
            scene.add(desk);
            
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.06), new THREE.MeshStandardMaterial({color:0x4285F4}));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.1, shape: new CANNON.Box(new CANNON.Vec3(0.03, 0.03, 0.03)) });
            cubeBody.position.set(0, 1.1, -0.5);
            world.addBody(cubeBody);

            // High-precision Spheres
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.012, 16, 16), new THREE.MeshStandardMaterial({color: 0x00ff00}));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC, shape: new CANNON.Sphere(0.012) });
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 1));

            const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

            hands.onResults((res) => {
                if (!res.multiHandLandmarks?.length) return;
                const landmarks = res.multiHandLandmarks[0];
                const xrCamera = renderer.xr.getCamera(camera);

                // 1. キャリブレーション（腕の長さを物理限界として取得）
                if (!isCalibrated && renderer.xr.isPresenting) {
                    const wrist = landmarks[0];
                    if (Math.abs(wrist.x - 0.5) < 0.2) {
                        calibCount++;
                        reachLimit = Math.max(reachLimit, Math.abs(wrist.z));
                        if (calibCount > 60) {
                            isCalibrated = true;
                            instr.visible = false;
                        }
                    }
                }

                // 2. 高精度トラッキングロジック
                landmarks.forEach((pt, i) => {
                    // 基本の3D変換
                    const targetPos = new THREE.Vector3(
                        (pt.x - 0.5) * 1.8, 
                        -(pt.y - 0.5) * 1.8, 
                        -pt.z * (0.8 / (reachLimit || 0.15)) - 0.2
                    );

                    // フィルタリング（ジッタ除去）
                    smoothedPoints[i].lerp(targetPos, LERP_FACTOR);

                    // VR空間のカメラ位置へ同期
                    const finalPos = smoothedPoints[i].clone().applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    
                    fingers[i].body.position.set(finalPos.x, finalPos.y, finalPos.z);
                    fingers[i].mesh.position.copy(fingers[i].body.position);
                });
            });

            const video = document.getElementById('input_video');
            new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            }).start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        function createTextTex(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.font = 'bold 40px Arial'; ctx.fillStyle = '#00ff00'; ctx.textAlign = 'center';
            ctx.fillText(text, 256, 80);
            return new THREE.CanvasTexture(canvas);
        }

        document.getElementById('start-btn').onclick = init;
    </script>
</body>
</html>
