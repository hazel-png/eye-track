<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial View Engine | Dual Tracking</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #container { position: absolute; inset: 0; }
        #hud { 
            position: absolute; top: 20px; left: 20px; color: #00f2ff; 
            background: rgba(0, 5, 20, 0.8); padding: 15px; border-left: 4px solid #00f2ff;
            pointer-events: none; z-index: 100; font-size: 11px; line-height: 1.6;
        }
        .val { color: #fff; float: right; margin-left: 20px; }
        #webcam { display: none; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="font-weight: bold; margin-bottom: 5px;">ENGINE STATUS: <span id="status">INIT</span></div>
        <hr border="0" style="border-top:1px solid #004455; margin: 10px 0;">
        <div>POS-X (Move) <span id="pos-x" class="val">0.0</span></div>
        <div>POS-Y (Move) <span id="pos-y" class="val">0.0</span></div>
        <div>YAW   (Turn) <span id="rot-y" class="val">0.0</span></div>
        <div>PITCH (Tilt) <span id="rot-x" class="val">0.0</span></div>
    </div>
    <div id="container"></div>
    <video id="webcam" autoplay playsinline></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let scene, camera, renderer, faceLandmarker;
        const video = document.getElementById('webcam');
        
        // トラッキング値（現在値とターゲット）
        let state = {
            pos: new THREE.Vector3(0, 0, 15),
            rot: new THREE.Euler(0, 0, 0),
            targetPos: new THREE.Vector3(0, 0, 15),
            targetRot: new THREE.Euler(0, 0, 0)
        };

        async function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x00050a, 0.02);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            // --- 空間構築 ---
            const grid = new THREE.GridHelper(200, 50, 0x00f2ff, 0x001122);
            grid.position.y = -5;
            scene.add(grid);

            // オブジェクトの散布
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            for (let i = 0; i < 60; i++) {
                const material = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set((Math.random()-0.5)*50, (Math.random()-0.5)*30, (Math.random()-0.5)*50);
                scene.add(cube);
            }

            await setupTracking();
            animate();
        }

        async function setupTracking() {
            try {
                const res = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(res, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO", numFaces: 1
                });

                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('status').innerText = "STABLE";
                    predict();
                };
            } catch (e) {
                document.getElementById('status').innerText = "ERROR";
            }
        }

        function predict() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const lm = results.faceLandmarks[0];

                    // 1. 顔の中心（位置移動用）
                    const headX = (lm[234].x + lm[454].x) / 2;
                    const headY = (lm[234].y + lm[454].y) / 2;
                    const faceWidth = Math.abs(lm[454].x - lm[234].x);

                    // --- 位置 (Position) の計算 ---
                    state.targetPos.x = (0.5 - headX) * 25; // 左右移動
                    state.targetPos.y = (0.5 - headY) * 15; // 上下移動
                    state.targetPos.z = (0.15 / faceWidth) * 12 + 5; // 奥行き

                    // --- 傾き (Rotation) の計算 ---
                    // 鼻(1)と中心のズレから向きを判定
                    const yaw = (lm[1].x - headX) * 5; 
                    const pitch = (lm[1].y - headY) * 4;

                    state.targetRot.y = yaw;
                    state.targetRot.x = -pitch;

                    // HUD更新
                    document.getElementById('pos-x').innerText = state.targetPos.x.toFixed(1);
                    document.getElementById('pos-y').innerText = state.targetPos.y.toFixed(1);
                    document.getElementById('rot-y').innerText = yaw.toFixed(2);
                    document.getElementById('rot-x').innerText = pitch.toFixed(2);
                }
            }
            requestAnimationFrame(predict);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 滑らかな補間 (Lerp)
            state.pos.lerp(state.targetPos, 0.1);
            
            // 回転の補間
            camera.position.copy(state.pos);
            camera.rotation.x += (state.targetRot.x - camera.rotation.x) * 0.1;
            camera.rotation.y += (state.targetRot.y - camera.rotation.y) * 0.1;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
