<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Spatial Studio - Natural Reach</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        video { display: none; }
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: white; z-index: 2000;
        }
        .btn {
            background: #4285F4; color: white; border: none; padding: 15px 30px;
            border-radius: 8px; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <button class="btn" id="start-btn">Start Life-Size Mode</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        // --- Configuration for Real Scale & Reach ---
        const SCALE_CONFIG = {
            handSpread: 1.4,    // Wider movement range
            handVertical: 1.4,  // Higher/Lower movement range
            handDepth: 2.8,     // Increased sensitivity for longer reach
            zOffset: -0.4,      // Starting distance (prevents hand from being behind camera)
            fingerRadius: 0.012
        };

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const fingers = [];
        const _v = new THREE.Vector3();
        const dt = 1/60;

        async function init() {
            document.getElementById('start-overlay').remove();

            // Scene Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // Physics World
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            
            const handMat = new CANNON.Material("handMat");
            const objectMat = new CANNON.Material("objectMat");
            const contactMat = new CANNON.ContactMaterial(handMat, objectMat, {
                friction: 1.0,
                restitution: 0.0,
                contactEquationStiffness: 1e7,
                contactEquationRelaxation: 3
            });
            world.addContactMaterial(contactMat);

            // --- Layout Settings ---
            const DESK_Z = -0.3; // Placed at a comfortable reaching distance
            const DESK_Y = 1.0;   

            // Desk
            const deskMesh = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.05, 0.5), new THREE.MeshStandardMaterial({ color: 0xeeeeee }));
            deskMesh.position.set(0, DESK_Y, DESK_Z);
            scene.add(deskMesh);

            const deskBody = new CANNON.Body({ mass: 0, material: objectMat });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.025, 0.25)));
            deskBody.position.copy(deskMesh.position);
            world.addBody(deskBody);

            // Cube
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ 
                mass: 0.1, 
                material: objectMat,
                linearDamping: 0.5,
                angularDamping: 0.5 
            });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.04, 0.04, 0.04)));
            cubeBody.position.set(0, DESK_Y + 0.2, DESK_Z);
            world.addBody(cubeBody);

            // Fingers
            const fingerGeo = new THREE.SphereGeometry(SCALE_CONFIG.fingerRadius, 16, 16);
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fingerGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 }));
                scene.add(mesh);
                const body = new CANNON.Body({ 
                    mass: 0, 
                    material: handMat,
                    collisionFilterGroup: 2,
                    collisionFilterMask: 1 
                });
                body.addShape(new CANNON.Sphere(SCALE_CONFIG.fingerRadius));
                body.type = CANNON.Body.KINEMATIC; 
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            // Hand Tracking
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ 
                maxNumHands: 1, 
                modelComplexity: 1, 
                minDetectionConfidence: 0.8, 
                minTrackingConfidence: 0.8 
            });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const xrCamera = renderer.xr.getCamera(camera);
                const landmarks = results.multiHandLandmarks[0];

                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    
                    // Improved coordinate mapping for long reach
                    _v.set(
                        (point.x - 0.5) * SCALE_CONFIG.handSpread, 
                        -(point.y - 0.5) * SCALE_CONFIG.handVertical, 
                        -point.z * SCALE_CONFIG.handDepth + SCALE_CONFIG.zOffset
                    );
                    
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    
                    const nextPos = new CANNON.Vec3(_v.x, _v.y, _v.z);
                    
                    // Velocity calculation for physics interaction
                    f.body.velocity.set(
                        (nextPos.x - f.body.position.x) / dt,
                        (nextPos.y - f.body.position.y) / dt,
                        (nextPos.z - f.body.position.z) / dt
                    );
                    f.body.position.copy(nextPos);
                    f.mesh.position.copy(f.body.position);
                });
            });

            const video = document.getElementById('input_video');
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cameraUtils.start();

            // Animation Loop
            renderer.setAnimationLoop(() => {
                world.step(dt);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
