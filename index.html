<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Spatial Engine</title>
    <style>
        :root { --accent: #00f2ff; --bg: #020205; }
        body { margin: 0; background: var(--bg); color: var(--accent); font-family: monospace; overflow: hidden; }
        #container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        #overlay { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .panel { background: rgba(10, 10, 25, 0.9); border: 1px solid var(--accent); padding: 10px; pointer-events: auto; font-size: 12px; }
        .ui-bottom { display: flex; justify-content: center; gap: 15px; pointer-events: auto; padding-bottom: 20px; }
        .btn { cursor: pointer; padding: 15px 30px; background: none; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; transition: 0.2s; }
        .btn:hover:not(:disabled) { background: var(--accent); color: #000; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; color: #555; }
        #log { color: #ff00f2; margin-top: 5px; font-size: 10px; }
        #webcam { display: none; }
    </style>
</head>
<body>

    <div id="container"></div>
    <video id="webcam" autoplay playsinline></video>

    <div id="overlay">
        <div class="panel">
            <div>SYSTEM STATUS</div>
            <div id="log">WAITING FOR USER...</div>
            <div id="track-info" style="margin-top:10px; color:#fff;"></div>
        </div>

        <div class="ui-bottom">
            <label class="btn">
                1. SELECT AUDIO
                <input type="file" id="fileInput" accept="audio/*" style="display:none;">
            </label>
            <button id="playBtn" class="btn" disabled>2. START ENGINE</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let scene, camera, renderer, audio, listener, headGroup, coreMesh, faceLandmarker;
        const video = document.getElementById('webcam');
        const log = document.getElementById('log');
        const playBtn = document.getElementById('playBtn');

        function updateLog(msg) { log.innerText = msg; console.log(msg); }

        async function init() {
            updateLog("INITIALIZING THREE.JS...");
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(100, 40, 0x00f2ff, 0x020210));

            headGroup = new THREE.Group();
            listener = new THREE.AudioListener();
            headGroup.add(listener);
            scene.add(headGroup);

            coreMesh = new THREE.Mesh(
                new THREE.IcosahedronGeometry(2, 1),
                new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true })
            );
            coreMesh.position.set(0, 0, -10);
            scene.add(coreMesh);

            audio = new THREE.PositionalAudio(listener);
            audio.panner.panningModel = 'HRTF'; 
            coreMesh.add(audio);

            await setupTracking();
            animate();
        }

        async function setupTracking() {
            updateLog("LOADING AI MODEL...");
            try {
                const res = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(res, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO", numFaces: 1
                });

                updateLog("REQUESTING CAMERA...");
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    updateLog("READY: SELECT AUDIO FILE");
                    predict();
                };
            } catch (e) {
                updateLog("ERROR: " + e.message);
            }
        }

        function predict() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const lm = results.faceLandmarks[0];
                    const targetX = (0.5 - ((lm[234].x + lm[454].x) / 2)) * 40;
                    const targetYaw = (lm[1].x - ((lm[234].x + lm[454].x) / 2)) * 10;
                    
                    headGroup.position.x += (targetX - headGroup.position.x) * 0.2;
                    headGroup.rotation.y += (targetYaw - headGroup.rotation.y) * 0.2;
                    
                    document.getElementById('track-info').innerText = `X: ${targetX.toFixed(2)} | YAW: ${targetYaw.toFixed(2)}`;
                }
            }
            requestAnimationFrame(predict);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (audio.isPlaying) {
                coreMesh.rotation.y += 0.01;
                coreMesh.scale.setScalar(1 + Math.sin(Date.now() * 0.005) * 0.2);
            }
            renderer.render(scene, camera);
        }

        // --- ファイル読み込みの修正 ---
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            updateLog("LOADING AUDIO...");
            const arrayBuffer = await file.arrayBuffer();
            
            listener.context.decodeAudioData(arrayBuffer, (buffer) => {
                audio.setBuffer(buffer);
                audio.setLoop(true);
                playBtn.disabled = false; // ここでボタンを有効化
                updateLog("AUDIO LOADED. PRESS START.");
            }, (err) => {
                updateLog("DECODE ERROR: " + err);
            });
        });

        playBtn.addEventListener('click', () => {
            if (listener.context.state === 'suspended') {
                listener.context.resume();
            }
            
            if (audio.isPlaying) {
                audio.pause();
                playBtn.innerText = "RESUME ENGINE";
                updateLog("PAUSED");
            } else {
                audio.play();
                playBtn.innerText = "PAUSE ENGINE";
                updateLog("ENGINE RUNNING...");
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
