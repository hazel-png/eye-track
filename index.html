<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial View Engine | Perspective Focus</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #container { position: absolute; inset: 0; }
        #status { 
            position: absolute; top: 20px; left: 20px; color: #00f2ff; 
            background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #00f2ff;
            pointer-events: none; z-index: 100; font-size: 12px;
        }
        #webcam { display: none; }
    </style>
</head>
<body>

    <div id="status">INITIALIZING AI...</div>
    <div id="container"></div>
    <video id="webcam" autoplay playsinline></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let scene, camera, renderer, faceLandmarker;
        const video = document.getElementById('webcam');
        const status = document.getElementById('status');

        // スムージング用変数
        let targetPos = new THREE.Vector3(0, 0, 15);
        let currentPos = new THREE.Vector3(0, 0, 15);

        async function init() {
            // --- Scene Setup ---
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 50);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            // --- 視覚的要素（奥行きを感じさせるための配置） ---
            // 1. 床と天井のグリッド
            const gridTop = new THREE.GridHelper(100, 20, 0x00f2ff, 0x002233);
            gridTop.position.y = 10;
            scene.add(gridTop);

            const gridBottom = new THREE.GridHelper(100, 20, 0x00f2ff, 0x002233);
            gridBottom.position.y = -10;
            scene.add(gridBottom);

            // 2. 空間に浮かぶ構造体
            for (let i = 0; i < 50; i++) {
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 40 - 10
                );
                scene.add(cube);
            }

            // 3. 遠くの光（パーティクル）
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for (let i = 0; i < 1000; i++) {
                starCoords.push((Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
            scene.add(new THREE.Points(starGeo, starMat));

            await setupTracking();
            animate();
        }

        async function setupTracking() {
            try {
                const res = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(res, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO", numFaces: 1
                });

                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    status.innerText = "TRACKING ACTIVE - MOVE YOUR HEAD";
                    predict();
                };
            } catch (e) {
                status.innerText = "ERROR: " + e.message;
            }
        }

        function predict() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const lm = results.faceLandmarks[0];

                    // 顔の中心座標 (0.0 - 1.0)
                    const centerX = (lm[234].x + lm[454].x) / 2;
                    const centerY = (lm[234].y + lm[454].y) / 2;
                    const faceWidth = Math.abs(lm[454].x - lm[234].x);

                    // --- カメラ座標の計算 (Window Effect) ---
                    // 頭を右に動かす(centerXが小さくなる)と、カメラは右に移動する
                    targetPos.x = (0.5 - centerX) * 30; 
                    targetPos.y = (0.5 - centerY) * 20;
                    // 顔の大きさで前後移動 (Z軸)
                    targetPos.z = (0.15 / faceWidth) * 10 + 5;
                }
            }
            requestAnimationFrame(predict);
        }

        function animate() {
            requestAnimationFrame(animate);

            // イージング（滑らかな追従）
            currentPos.lerp(targetPos, 0.1);
            
            camera.position.copy(currentPos);
            
            // 常に中心（0,0,0）を見つめることで、覗き込み効果を出す
            camera.lookAt(0, 0, -5);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
