<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spatial Hands - Fixed Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); z-index: 2000; transition: opacity 0.5s;
        }
        .ios-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; text-align: center; color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .start-btn {
            background: #fff; color: #000; border: none; padding: 15px 40px;
            border-radius: 30px; font-size: 18px; font-weight: 600; cursor: pointer;
        }
        #input_video { display: none; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="ios-card">
            <h1>Spatial Anywhere</h1>
            <p>カメラの前で手をかざしてください</p>
            <button class="start-btn" id="start-btn">開始する</button>
        </div>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, ringMesh;
        let isHandActive = false, calibComplete = false;
        let maxReachZ = 0.15;
        let stayTimer = 0;
        const fingers = [];

        async function init() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').remove(), 500);

            // --- Three.js Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // --- Physics Setup ---
            world = new CANNON.World();
            world.gravity.set(0, -2.0, 0); // 物理挙動を見やすくするため少し低重力

            // キャリブレーション用リング
            ringMesh = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32),
                new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0, side: THREE.DoubleSide })
            );
            scene.add(ringMesh);

            // 物理キューブ
            const boxSize = 0.1;
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(boxSize, boxSize, boxSize), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            cubeMesh.visible = false;
            scene.add(cubeMesh);

            cubeBody = new CANNON.Body({ mass: 1 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(boxSize/2, boxSize/2, boxSize/2)));
            cubeBody.position.set(0, 1.2, -0.3);
            world.addBody(cubeBody);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 2, 1);
            scene.add(light);

            // --- Hand Joints (21 Spheres) ---
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.012), 
                    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 })
                );
                scene.add(mesh);

                const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(0.012));
                world.addBody(body);
                
                fingers.push({ mesh, body });
            }

            // --- MediaPipe Hands ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ 
                maxNumHands: 1, 
                modelComplexity: 1, 
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7 
            });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                    isHandActive = false;
                    stayTimer = 0;
                    ringMesh.material.opacity = 0;
                    fingers.forEach(f => f.mesh.material.opacity = 0);
                    return;
                }

                isHandActive = true;
                const landmarks = results.multiHandLandmarks[0];
                const xrCamera = renderer.xr.isPresenting ? renderer.xr.getCamera(camera) : camera;

                // 21個の関節それぞれを更新
                landmarks.forEach((point, i) => {
                    fingers[i].mesh.material.opacity = 0.8;
                    
                    // 座標変換: カメラ映像(0~1)を3D空間(-1.2~1.2程度)へ
                    // point.z をスケールに利用
                    const zScale = calibComplete ? (Math.abs(point.z) / maxReachZ) * 0.5 : Math.abs(point.z) * 2.0;
                    
                    const posX = (point.x - 0.5) * -2.0; // 鏡合わせにするため反転
                    const posY = (point.y - 0.5) * -1.5 + 1.0; // 少し上にオフセット
                    const posZ = -zScale - 0.2;

                    // XRのカメラ姿勢に合わせる
                    const targetPos = new THREE.Vector3(posX, posY, posZ);
                    targetPos.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);

                    // CANNON.js の position を直接更新
                    fingers[i].body.position.set(targetPos.x, targetPos.y, targetPos.z);
                    fingers[i].mesh.position.copy(fingers[i].body.position);
                });

                // キャリブレーション
                if (!calibComplete) {
                    stayTimer++;
                    const wristPos = fingers[0].mesh.position;
                    ringMesh.position.set(wristPos.x, wristPos.y, wristPos.z);
                    ringMesh.lookAt(xrCamera.position);
                    ringMesh.material.opacity = Math.min(stayTimer / 60, 0.8);

                    if (stayTimer > 60) {
                        maxReachZ = Math.abs(landmarks[0].z);
                        calibComplete = true;
                        ringMesh.visible = false;
                        cubeMesh.visible = true;
                        if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                    }
                }
            });

            const video = document.getElementById('input_video');
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                width: 1280, height: 720
            });
            cameraUtils.start();

            // --- Animation Loop ---
            renderer.setAnimationLoop(() => {
                world.step(1/60);
                
                if (calibComplete) {
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            init();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
