<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Native WebXR Physics VR - High Stability</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r150/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
    </style>
</head>
<body>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        let isCalibrated = false, calibCount = 0, referenceZ = 0;
        let lastSmoothZ = 0;

        const tipMeshes = [], tipBodies = [];
        const CONFIG = {
            spread: 1.8, vertical: 1.5,
            zOffset: -0.3,
            smoothing: 0.25, // 0.1(安定)〜0.5(高速)
            radius: 0.015
        };

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; 
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 5, 1);
            scene.add(light);

            // Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const pMat = new CANNON.Material({ friction: 1.0 });

            // Ground
            const groundBody = new CANNON.Body({ mass: 0, material: pMat });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);

            // Cube
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0x00ffaa }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.1, material: pMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, 1.2, -0.4);
            world.addBody(cubeBody);

            // 21 Joint Spheres (Low Poly)
            const jGeo = new THREE.SphereGeometry(CONFIG.radius, 8, 4);
            for (let i = 0; i < 21; i++) {
                const m = new THREE.Mesh(jGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(m);
                tipMeshes.push(m);
                const b = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                b.addShape(new CANNON.Sphere(CONFIG.radius));
                world.addBody(b);
                tipBodies.push(b);
            }

            // MediaPipe Hands Setup
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ 
                maxNumHands: 1, 
                modelComplexity: 0, // 軽量
                minDetectionConfidence: 0.7, 
                minTrackingConfidence: 0.7 
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    const xrCamera = renderer.xr.getCamera(camera);

                    // 手のひら中央（9番、5番、17番の平均）で深度を算出
                    const palmAvgZ = (lm[5].z + lm[9].z + lm[17].z) / 3;

                    if (!isCalibrated && renderer.xr.isPresenting) {
                        calibCount++;
                        referenceZ = Math.max(referenceZ, Math.abs(palmAvgZ));
                        if (calibCount > 50) isCalibrated = true;
                        return;
                    }

                    if (isCalibrated) {
                        const depthScale = 0.8 / referenceZ; // 腕の長さを約80cmにマッピング
                        
                        // Z軸のスムージング（ワープ防止）
                        let targetZ = -palmAvgZ * depthScale;
                        if (lastSmoothZ === 0) lastSmoothZ = targetZ;
                        lastSmoothZ += (targetZ - lastSmoothZ) * CONFIG.smoothing;

                        lm.forEach((point, i) => {
                            // 遠近歪み補正
                            const pCorr = 1.0 - (point.z * 0.4);
                            
                            const v = new THREE.Vector3(
                                (point.x - 0.5) * CONFIG.spread * pCorr, 
                                -(point.y - 0.5) * CONFIG.vertical * pCorr, 
                                lastSmoothZ + (point.z - palmAvgZ) * depthScale + CONFIG.zOffset
                            ).applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                            
                            tipBodies[i].position.set(v.x, v.y, v.z);
                            tipMeshes[i].position.copy(v);
                        });
                    }
                }
            });

            const videoElement = document.getElementById('input_video');
            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                facingMode: "environment", // 外カメ
                width: 640, height: 360
            });
            cameraUtils.start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        init();
    </script>
</body>
</html>
