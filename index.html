<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Precision: Orbit Calibration</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: #fff; }
        #webgazerGazeDot { width: 4px !important; height: 4px !important; background: rgba(255,255,255,0.4) !important; border: none !important; }

        #target-container {
            position: absolute; width: 80px; height: 80px;
            transform: translate(-50%, -50%);
            transition: opacity 0.6s ease;
            opacity: 0; display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        #target-core {
            width: 16px; height: 16px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 30px 10px rgba(255, 255, 255, 0.8);
        }
        #timer-ring {
            position: absolute; width: 60px; height: 60px;
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 50%;
        }
        #msg {
            position: fixed; width: 100%; text-align: center; bottom: 10%;
            font-weight: 200; letter-spacing: 0.2em; opacity: 0.6; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="msg">セットアップを開始します</div>
<div id="target-container">
    <div id="timer-ring"></div>
    <div id="target-core"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.js"></script>

<script>
    const container = document.getElementById('target-container');
    const msg = document.getElementById('msg');
    const ring = document.getElementById('timer-ring');
    
    const staticPoints = [
        {x: 50, y: 50}, {x: 15, y: 15}, {x: 85, y: 15}, 
        {x: 85, y: 85}, {x: 15, y: 85}, {x: 50, y: 15}, 
        {x: 85, y: 50}, {x: 50, y: 85}, {x: 15, y: 50}
    ];

    let currentIdx = 0;
    let isOrbiting = false;

    async function start() {
        await webgazer.setRegression('ridge').begin();
        webgazer.showVideoPreview(false).showPredictionPoints(true);
        setTimeout(runStaticCalibration, 1500);
    }

    // 1. 9点の静止画キャリブレーション
    function runStaticCalibration() {
        if (currentIdx >= staticPoints.length) {
            currentIdx = 0;
            setTimeout(startOrbitCalibration, 1000);
            return;
        }

        msg.innerText = "ドットをじっと見つめてください";
        const p = staticPoints[currentIdx];
        moveTarget(p.x, p.y);
        
        let ticks = 0;
        const interval = setInterval(() => {
            webgazer.recordScreenPosition(parseFloat(container.style.left), parseFloat(container.style.top));
            ticks++;
            ring.style.transform = `scale(${1 - (ticks/40)})`;
            if (ticks >= 40) {
                clearInterval(interval);
                currentIdx++;
                runStaticCalibration();
            }
        }, 50);
    }

    // 2. 円軌道のキャリブレーション
    function startOrbitCalibration() {
        msg.innerText = "動き続けるドットを目で追いかけてください";
        container.style.transition = "none"; // 円運動はスムーズにするためtransitionを切る
        isOrbiting = true;
        
        let angle = 0;
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const radius = Math.min(window.innerWidth, window.innerHeight) * 0.35;

        const orbitInterval = setInterval(() => {
            const px = centerX + radius * Math.cos(angle);
            const py = centerY + radius * Math.sin(angle);
            
            container.style.left = px + "px";
            container.style.top = py + "px";
            container.style.opacity = "1";
            
            webgazer.recordScreenPosition(px, py);

            angle += 0.02; // 回転速度
            if (angle >= Math.PI * 2 * 2) { // 2周したら終了
                clearInterval(orbitInterval);
                finish();
            }
        }, 20);
    }

    function moveTarget(xPercent, yPercent) {
        container.style.transition = "all 0.8s cubic-bezier(0.19, 1, 0.22, 1)";
        container.style.left = (window.innerWidth * xPercent / 100) + "px";
        container.style.top = (window.innerHeight * yPercent / 100) + "px";
        container.style.opacity = "1";
        ring.style.transform = `scale(1)`;
    }

    function finish() {
        container.style.opacity = "0";
        msg.innerText = "すべての調整が完了しました";
        webgazer.showPredictionPoints(true); // 最後に赤い点を確認用に表示
    }

    window.onload = start;
</script>
</body>
</html>
