<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Spatial Studio - Finger Update</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { 
            --ios-bg: rgba(30, 30, 30, 0.75); 
            --ios-accent: #007AFF; 
            --ios-text: #ffffff;
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        video { display: none; }
        #ios-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, #2c3e50 0%, #000 100%);
            z-index: 2000; color: var(--ios-text); transition: all 0.6s;
        }
        .glass-card {
            background: var(--ios-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 35px; padding: 30px; width: 85%; max-width: 340px; text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .start-btn {
            background: var(--ios-accent); color: white; border: none; 
            width: 100%; padding: 16px; border-radius: 18px;
            font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="ios-ui">
        <div class="glass-card">
            <h1>Spatial Studio</h1>
            <p>指の判定を太く、掴みやすく調整しました</p>
            <button class="start-btn" id="start-btn">開始する</button>
        </div>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const tipMeshes = [], tipBodies = [];
        const FINGER_RADIUS = 0.025; // 指の太さ (約5cm)

        async function init() {
            document.getElementById('ios-ui').style.display = 'none';

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const light = new THREE.DirectionalLight(0xffffff, 0.7);
            light.position.set(2, 5, 2);
            scene.add(light);

            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            
            // 摩擦を増やす設定
            const contactMaterial = new CANNON.ContactMaterial(
                new CANNON.Material(), new CANNON.Material(), 
                { friction: 1.0, restitution: 0.1 }
            );
            world.addContactMaterial(contactMaterial);

            // --- 机 (Desk) ---
            const deskHeight = 1.5; // 顔の高さ
            const deskZPos = -0.25; // 手前
            const deskGeo = new THREE.BoxGeometry(1.0, 0.04, 0.5);
            const deskMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
            const deskMesh = new THREE.Mesh(deskGeo, deskMat);
            deskMesh.position.set(0, deskHeight, deskZPos);
            scene.add(deskMesh);

            const deskBody = new CANNON.Body({ mass: 0 });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.02, 0.25)));
            deskBody.position.set(0, deskHeight, deskZPos);
            world.addBody(deskBody);

            // --- キューブ (Target) ---
            cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.15, 0.15, 0.15),
                new THREE.MeshStandardMaterial({ color: 0x007AFF, metalness: 0.3, roughness: 0.4 })
            );
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.2, material: contactMaterial.materials[0] });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.075, 0.075, 0.075)));
            cubeBody.position.set(0, deskHeight + 0.3, deskZPos);
            world.addBody(cubeBody);

            // --- 指の関節 (太くした球体) ---
            const fingerGeo = new THREE.SphereGeometry(FINGER_RADIUS, 16, 16);
            const fingerMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
            
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fingerGeo, fingerMat);
                scene.add(mesh);
                tipMeshes.push(mesh);
                
                const body = new CANNON.Body({ mass: 0, material: contactMaterial.materials[1] });
                body.addShape(new CANNON.Sphere(FINGER_RADIUS));
                // 衝突時にキューブを吹き飛ばさないよう、衝突応答を少しマイルドに
                body.collisionResponse = true;
                world.addBody(body);
                tipBodies.push(body);
            }

            // --- MediaPipe Hands ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    const xrCamera = renderer.xr.getCamera(camera);
                    lm.forEach((point, i) => {
                        // 座標計算
                        const v = new THREE.Vector3(
                            (point.x - 0.5) * 1.5, 
                            -(point.y - 0.5) * 1.5, 
                            -point.z * 1.5 - 0.3
                        ).applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        
                        tipBodies[i].position.copy(v);
                        tipMeshes[i].position.copy(v);
                    });
                }
            });

            const videoElement = document.getElementById('input_video');
            const cameraStream = new Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cameraStream.start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            init();
        });
    </script>
</body>
</html>
