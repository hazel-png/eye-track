<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Spatial Studio - Camera Background</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: sans-serif; }
        /* ビデオを全画面で背面に表示 */
        #input_video {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: -1; transform: scaleX(-1); /* 自撮りモードなら反転、外カメラなら削除 */
        }
        #vr-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.8); z-index: 2000;
        }
        .btn { background: #1a73e8; color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="vr-ui">
        <button class="btn" id="start-btn">カメラ背景で開始</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, deskGroup;
        let calibRing, isCalibrated = false;
        let calibCount = 0;
        let accumZ = 0;

        const SCALE_CONFIG = { handSpread: 1.5, handVertical: 1.5, handDepth: 4.0, zOffset: -0.2, fingerRadius: 0.015 };
        const fingers = [];
        const _v = new THREE.Vector3();
        const dt = 1/60;

        async function init() {
            document.getElementById('vr-ui').style.display = 'none';

            scene = new THREE.Scene();
            // 背景を透明にする
            scene.background = null;

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // alpha: true が重要
            renderer.setClearColor(0x000000, 0); // 透明度を0に設定
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const handMat = new CANNON.Material();
            const objectMat = new CANNON.Material();
            world.addContactMaterial(new CANNON.ContactMaterial(handMat, objectMat, { friction: 1.0, restitution: 0.1 }));

            // Calibration Ring (ターゲット)
            calibRing = new THREE.Mesh(
                new THREE.TorusGeometry(0.12, 0.015, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0x1a73e8, transparent: true, opacity: 0.8 })
            );
            calibRing.position.set(0, 1.3, -0.6); 
            scene.add(calibRing);

            // Desk & Cube
            deskGroup = new THREE.Group();
            const deskMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.6), new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 }));
            deskMesh.position.set(0, 0.95, -0.5);
            deskGroup.add(deskMesh);
            scene.add(deskGroup);
            deskGroup.visible = false;

            const deskBody = new CANNON.Body({ mass: 0 });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.6, 0.025, 0.3)));
            deskBody.position.set(0, 0.95, -0.5);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeMesh.visible = false;
            cubeBody = new CANNON.Body({ mass: 0.2, linearDamping: 0.5 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.04, 0.04, 0.04)));
            cubeBody.position.set(0, 1.15, -0.5);
            world.addBody(cubeBody);

            // 手のモデル
            const fingerMat = new THREE.MeshStandardMaterial({ color: 0x39ff14, emissive: 0x39ff14, emissiveIntensity: 0.8 });
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(SCALE_CONFIG.fingerRadius, 16, 16), fingerMat);
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(SCALE_CONFIG.fingerRadius));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            const video = document.getElementById('input_video');
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0];
                const xrCamera = renderer.xr.getCamera(camera);

                if (!isCalibrated && renderer.xr.isPresenting) {
                    // 背景の自分の手と、青いリングを重ねてください
                    const inTarget = Math.abs(wrist.x - 0.5) < 0.2 && Math.abs(wrist.y - 0.5) < 0.2;
                    if (inTarget) {
                        calibCount++;
                        accumZ += Math.abs(wrist.z);
                        if (calibCount > 60) {
                            SCALE_CONFIG.handDepth = 0.6 / (accumZ / calibCount || 0.05); 
                            isCalibrated = true;
                            calibRing.visible = false;
                            deskGroup.visible = true;
                            cubeMesh.visible = true;
                        }
                    }
                }

                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    _v.set((point.x - 0.5) * SCALE_CONFIG.handSpread, -(point.y - 0.5) * SCALE_CONFIG.handVertical, -point.z * SCALE_CONFIG.handDepth + SCALE_CONFIG.zOffset);
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    f.body.position.lerp(new CANNON.Vec3(_v.x, _v.y, _v.z), 0.8, f.body.position);
                    f.mesh.position.copy(f.body.position);
                });
            });

            new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            }).start();

            renderer.setAnimationLoop(() => {
                if (isCalibrated) {
                    world.step(dt);
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
