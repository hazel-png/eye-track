<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Hand Tracker - Rear Camera & Correct Aspect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
        #vr-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #fff; z-index: 2000;
        }
        .btn { background: #1a73e8; color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="vr-ui">
        <button class="btn" id="start-btn">START VR (REAR CAMERA)</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, deskGroup, videoTexture;
        let calibRing, monitor;
        let isCalibrated = false;
        let calibCount = 0;
        let maxReachZ = 0;

        const SCALE_CONFIG = { handSpread: 1.6, handVertical: 1.6, handDepth: 4.0, zOffset: -0.1, fingerRadius: 0.015 };
        const fingers = [];
        const _v = new THREE.Vector3();

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 44px Arial';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.fillText(text, 256, 80);
            return new THREE.CanvasTexture(canvas);
        }

        async function init() {
            document.getElementById('vr-ui').style.display = 'none';

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            const video = document.getElementById('input_video');
            videoTexture = new THREE.VideoTexture(video);

            // VR空間内モニター
            const monitorGeo = new THREE.PlaneGeometry(0.5, 0.5); 
            const monitorMat = new THREE.MeshBasicMaterial({ map: videoTexture });
            monitor = new THREE.Mesh(monitorGeo, monitorMat);
            monitor.position.set(0, 0.8, -0.7);
            scene.add(monitor);

            // 指示テキスト
            const instrMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(0.5, 0.125),
                new THREE.MeshBasicMaterial({ map: createTextTexture("EXTEND YOUR ARM"), transparent: true })
            );
            instrMesh.position.set(0, 0.35, 0.01);
            monitor.add(instrMesh);

            calibRing = new THREE.Mesh(
                new THREE.TorusGeometry(0.06, 0.005, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0x1a73e8 })
            );
            calibRing.position.set(0, 0, 0.01);
            monitor.add(calibRing);

            // Physics & Objects
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const handMat = new CANNON.Material();
            const objectMat = new CANNON.Material();

            deskGroup = new THREE.Group();
            const deskMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.6), new THREE.MeshStandardMaterial({ color: 0x555555 }));
            deskMesh.position.set(0, 0.7, -0.5);
            deskGroup.add(deskMesh);
            scene.add(deskGroup);
            deskGroup.visible = false;

            const deskBody = new CANNON.Body({ mass: 0, material: objectMat });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.6, 0.025, 0.3)));
            deskBody.position.set(0, 0.7, -0.5);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeMesh.visible = false;
            cubeBody = new CANNON.Body({ mass: 0.2, material: objectMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.04, 0.04, 0.04)));
            cubeBody.position.set(0, 1.0, -0.5);
            world.addBody(cubeBody);

            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(SCALE_CONFIG.fingerRadius, 16, 16), new THREE.MeshStandardMaterial({ color: 0x39ff14 }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, material: handMat, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(SCALE_CONFIG.fingerRadius));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                // VR内モニターの比率修正（外カメラの解像度に基づく）
                if (video.videoWidth > 0 && monitor.scale.x === 1 && monitor.scale.y === 1) {
                    const aspect = video.videoWidth / video.videoHeight;
                    monitor.scale.set(aspect, 1, 1);
                }

                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0];
                const xrCamera = renderer.xr.getCamera(camera);

                if (!isCalibrated && renderer.xr.isPresenting) {
                    const inTarget = Math.abs(wrist.x - 0.5) < 0.2 && Math.abs(wrist.y - 0.5) < 0.2;
                    if (inTarget) {
                        calibCount++;
                        maxReachZ = Math.max(maxReachZ, Math.abs(wrist.z));
                        const progress = Math.min(calibCount / 60, 1);
                        calibRing.material.color.lerpColors(new THREE.Color(0x1a73e8), new THREE.Color(0x39ff14), progress);
                        
                        if (calibCount > 60) {
                            // ピンと伸ばした腕の長さを約0.7mとしてスケールを固定
                            SCALE_CONFIG.handDepth = 0.7 / (maxReachZ || 0.1);
                            isCalibrated = true;
                            monitor.visible = false;
                            deskGroup.visible = true;
                            cubeMesh.visible = true;
                        }
                    } else {
                        calibCount = 0;
                        calibRing.material.color.set(0x1a73e8);
                    }
                }

                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    _v.set(
                        (point.x - 0.5) * SCALE_CONFIG.handSpread, 
                        -(point.y - 0.5) * SCALE_CONFIG.handVertical, 
                        -point.z * SCALE_CONFIG.handDepth + SCALE_CONFIG.zOffset
                    );
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    f.body.position.copy(new CANNON.Vec3(_v.x, _v.y, _v.z));
                    f.mesh.position.copy(f.body.position);
                });
            });

            // 明示的に外カメラ(environment)を指定
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment",
                width: 1280, height: 720
            });
            cameraUtils.start();

            renderer.setAnimationLoop(() => {
                if (isCalibrated) {
                    world.step(1/60);
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
