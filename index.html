<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Spatial View | Low Latency</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Consolas', monospace; }
        #container { position: absolute; inset: 0; }
        #hud { 
            position: absolute; top: 20px; left: 20px; color: #00f2ff; 
            background: rgba(0, 5, 15, 0.95); padding: 15px; border-left: 3px solid #00f2ff;
            pointer-events: none; z-index: 100; font-size: 11px;
        }
        #webcam { display: none; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="font-weight: bold; margin-bottom: 5px; color: #00f2ff;">DIRECT RESPONSE MODE</div>
        <div style="font-size: 9px; opacity: 0.6;">DAMPING: MAX | INERTIA: MIN</div>
    </div>
    <div id="container"></div>
    <video id="webcam" autoplay playsinline></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let scene, camera, renderer, faceLandmarker;
        const video = document.getElementById('webcam');

        // --- ゴム感を排除した物理パラメータ ---
        const physics = {
            pos: new THREE.Vector3(0, 0, 10),
            vel: new THREE.Vector3(0, 0, 0),
            rot: new THREE.Vector2(0, 0),
            rotVel: new THREE.Vector2(0, 0),
            
            targetPos: new THREE.Vector3(0, 0, 10),
            targetRot: new THREE.Vector2(0, 0),

            // stiffnessを上げ、dampingを限界まで上げることで「遊び」を消す
            stiffness: 0.4, 
            damping: 0.5,   
            jitter: 0.0005 
        };

        async function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x00050a, 0.04);
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(100, 40, 0x00f2ff, 0x011122));

            const core = new THREE.Mesh(
                new THREE.IcosahedronGeometry(1.2, 1),
                new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true })
            );
            scene.add(core);

            for (let i = 0; i < 60; i++) {
                const m = new THREE.Mesh(
                    new THREE.BoxGeometry(0.2, 0.2, 0.2),
                    new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.4 })
                );
                m.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*25, (Math.random()-0.5)*40 - 5);
                scene.add(m);
            }

            await setupTracking();
            animate();
        }

        async function setupTracking() {
            try {
                const res = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(res, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO", numFaces: 1
                });
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => { video.play(); predict(); };
            } catch (e) { console.error(e); }
        }

        function predict() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const lm = results.faceLandmarks[0];
                    const headX = (lm[234].x + lm[454].x) / 2;
                    const headY = (lm[234].y + lm[454].y) / 2;
                    const faceWidth = Math.abs(lm[454].x - lm[234].x);

                    physics.targetPos.x = (0.5 - headX) * 8; 
                    physics.targetPos.y = (0.5 - headY) * 6;
                    physics.targetPos.z = (0.15 / faceWidth) * 5 + 8;

                    physics.targetRot.y = (lm[1].x - headX) * 6.5; 
                    physics.targetRot.x = (headY - lm[1].y) * 5.0;
                }
            }
            requestAnimationFrame(predict);
        }

        function animate() {
            requestAnimationFrame(animate);

            // バネ計算の「揺れ」を最小化するステップ
            let forceP = new THREE.Vector3().subVectors(physics.targetPos, physics.pos).multiplyScalar(physics.stiffness);
            physics.vel.add(forceP).multiplyScalar(physics.damping);
            physics.pos.add(physics.vel);

            let forceR = new THREE.Vector2().subVectors(physics.targetRot, physics.rot).multiplyScalar(physics.stiffness);
            physics.rotVel.add(forceR).multiplyScalar(physics.damping);
            physics.rot.add(physics.rotVel);

            const jX = (Math.random() - 0.5) * physics.jitter;
            const jY = (Math.random() - 0.5) * physics.jitter;

            camera.position.copy(physics.pos);
            camera.rotation.set(physics.rot.x + jX, physics.rot.y + jY, 0);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
