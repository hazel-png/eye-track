<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Magic Hands VR - Fixed Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        :root { --ios-blue: #007AFF; }
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #111; z-index: 2000; color: white;
        }
        .ios-btn {
            background: var(--ios-blue); color: white; border: none; padding: 20px 40px;
            border-radius: 20px; font-size: 18px; font-weight: 600; cursor: pointer;
        }
        #input_video { display: none; }
    </style>
</head>
<body>
    <div id="overlay">
        <button class="ios-btn" id="start-btn">VR体験を開始</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        // VRButtonのインポート（Three.jsが読み込まれた後に実行される）
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        let calibSphere, isCalibrating = false, calibComplete = false;
        let maxReachZ = 0.15, currentRawZ = 0;
        const fingers = [];
        const dt = 1/60;

        function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

        async function init() {
            // 要素が存在するかチェック
            const startBtn = document.getElementById('start-btn');
            const overlay = document.getElementById('overlay');
            if (overlay) overlay.remove();

            // --- Three.js & Physics Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);

            // キャリブターゲット
            calibSphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.08, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0x007AFF, transparent: true, opacity: 0.3 })
            );
            calibSphere.position.set(0, 1.3, -0.4);
            scene.add(calibSphere);

            // ターゲットキューブ
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.12), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            cubeMesh.visible = false;
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.5 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.06, 0.06, 0.06)));
            cubeBody.position.set(0, 1.5, -0.6);
            world.addBody(cubeBody);

            // 衝突時の振動
            cubeBody.addEventListener("collide", (e) => {
                const vel = e.contact.getImpactVelocityAlongNormal();
                vibrate(Math.min(vel * 10, 20));
            });

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.015), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(0.015));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            // --- MediaPipe Hands ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                const xrCamera = renderer.xr.getCamera(camera);
                currentRawZ = landmarks[0].z;

                const p1 = landmarks[5], p2 = landmarks[9], p3 = landmarks[13], p4 = landmarks[17];
                const palmCenter = {
                    x: (p1.x + p2.x + p3.x + p4.x) / 4,
                    y: (p1.y + p2.y + p3.y + p4.y) / 4,
                    z: (p1.z + p2.z + p3.z + p4.z) / 4
                };

                let adjustedZ = calibComplete 
                    ? Math.pow(Math.abs(palmCenter.z) / maxReachZ, 0.85) * 3.5 
                    : Math.abs(palmCenter.z) * 5.0;

                landmarks.forEach((point, i) => {
                    const _v = new THREE.Vector3(
                        (palmCenter.x - 0.5) * 2.2 + (point.x - palmCenter.x) * 1.8,
                        -(palmCenter.y - 0.5) * 2.2 - (point.y - palmCenter.y) * 1.8,
                        -adjustedZ + (point.z - palmCenter.z) * 1.5 - 0.5
                    );
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    fingers[i].body.position.copy(_v);
                    fingers[i].mesh.position.copy(_v);
                });

                if (!calibComplete && !isCalibrating) {
                    if (fingers[8].body.position.distanceTo(calibSphere.position) < 0.15) {
                        isCalibrating = true;
                        vibrate(10);
                        calibSphere.material.color.set(0x34C759);
                        setTimeout(() => {
                            maxReachZ = Math.abs(currentRawZ);
                            calibComplete = true;
                            calibSphere.visible = false;
                            cubeMesh.visible = true;
                            vibrate([40, 30, 40]);
                        }, 2000);
                    }
                }
            });

            const video = document.getElementById('input_video');
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cameraUtils.start();

            renderer.setAnimationLoop(() => {
                world.step(dt);
                if (calibComplete) {
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }

        // DOMが読み込まれてからリスナーを登録
        const btn = document.getElementById('start-btn');
        if (btn) {
            btn.addEventListener('click', init);
        } else {
            console.error("Start button not found!");
        }
    </script>
</body>
</html>
