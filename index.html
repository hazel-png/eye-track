<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR - Real-time Tuner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        video { display: none; }
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: white; z-index: 2000;
        }
        /* 調整パネルのスタイル */
        #gui-container {
            position: fixed; top: 10px; right: 10px; width: 220px;
            background: rgba(0, 0, 0, 0.7); color: white; padding: 15px;
            border-radius: 10px; z-index: 3000; display: none;
            font-size: 13px;
        }
        .control-group { margin-bottom: 10px; }
        .control-group label { display: block; margin-bottom: 5px; }
        .control-group input { width: 100%; }
        .btn {
            background: #4285F4; color: white; border: none; padding: 15px 30px;
            border-radius: 8px; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <button class="btn" id="start-btn">Start with Tuner</button>
    </div>

    <div id="gui-container">
        <div class="control-group">
            <label id="label-reach">Reach (Depth): 2.5</label>
            <input type="range" id="input-reach" min="1.0" max="5.0" step="0.1" value="2.5">
        </div>
        <div class="control-group">
            <label id="label-offset">Z-Offset: -0.4</label>
            <input type="range" id="input-offset" min="-1.5" max="0.5" step="0.05" value="-0.4">
        </div>
        <div class="control-group">
            <label id="label-scale">Move Scale: 1.4</label>
            <input type="range" id="input-scale" min="0.5" max="3.0" step="0.1" value="1.4">
        </div>
        <p style="font-size: 10px; color: #ccc;">Adjust until it feels natural!</p>
    </div>

    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        // 調整可能なパラメータ
        const config = {
            reach: 2.5,
            offset: -0.4,
            scale: 1.4,
            fingerRadius: 0.012
        };

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const fingers = [];
        const _v = new THREE.Vector3();
        const dt = 1/60;

        // UIの初期化
        function setupUI() {
            const gui = document.getElementById('gui-container');
            gui.style.display = 'block';

            const updateLabel = (id, text) => document.getElementById(id).innerText = text;

            document.getElementById('input-reach').addEventListener('input', (e) => {
                config.reach = parseFloat(e.target.value);
                updateLabel('label-reach', `Reach (Depth): ${config.reach}`);
            });
            document.getElementById('input-offset').addEventListener('input', (e) => {
                config.offset = parseFloat(e.target.value);
                updateLabel('label-offset', `Z-Offset: ${config.offset}`);
            });
            document.getElementById('input-scale').addEventListener('input', (e) => {
                config.scale = parseFloat(e.target.value);
                updateLabel('label-scale', `Move Scale: ${config.scale}`);
            });
        }

        async function init() {
            document.getElementById('start-overlay').remove();
            setupUI();

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            
            const handMat = new CANNON.Material("handMat");
            const objectMat = new CANNON.Material("objectMat");
            const contactMat = new CANNON.ContactMaterial(handMat, objectMat, {
                friction: 1.0, restitution: 0.0,
                contactEquationStiffness: 1e7, contactEquationRelaxation: 3
            });
            world.addContactMaterial(contactMat);

            // Workspace Setup
            const DESK_Y = 1.0;
            const DESK_Z = -0.3;

            const deskMesh = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.05, 0.5), new THREE.MeshStandardMaterial({ color: 0xeeeeee }));
            deskMesh.position.set(0, DESK_Y, DESK_Z);
            scene.add(deskMesh);

            const deskBody = new CANNON.Body({ mass: 0, material: objectMat });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.025, 0.25)));
            deskBody.position.copy(deskMesh.position);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ 
                mass: 0.1, material: objectMat,
                linearDamping: 0.5, angularDamping: 0.5 
            });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.04, 0.04, 0.04)));
            cubeBody.position.set(0, DESK_Y + 0.2, DESK_Z);
            world.addBody(cubeBody);

            const fingerGeo = new THREE.SphereGeometry(config.fingerRadius, 16, 16);
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fingerGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, material: handMat, collisionFilterGroup: 2, collisionFilterMask: 1 });
                body.addShape(new CANNON.Sphere(config.fingerRadius));
                body.type = CANNON.Body.KINEMATIC; 
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const xrCamera = renderer.xr.getCamera(camera);
                const landmarks = results.multiHandLandmarks[0];

                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    
                    // リアルタイム設定を適用
                    _v.set(
                        (point.x - 0.5) * config.scale, 
                        -(point.y - 0.5) * config.scale, 
                        -point.z * config.reach + config.offset
                    );
                    
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    const nextPos = new CANNON.Vec3(_v.x, _v.y, _v.z);
                    
                    f.body.velocity.set(
                        (nextPos.x - f.body.position.x) / dt,
                        (nextPos.y - f.body.position.y) / dt,
                        (nextPos.z - f.body.position.z) / dt
                    );
                    f.body.position.copy(nextPos);
                    f.mesh.position.copy(f.body.position);
                });
            });

            const video = document.getElementById('input_video');
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cameraUtils.start();

            renderer.setAnimationLoop(() => {
                world.step(dt);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
