<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spatial Computing Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        video { display: none; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2c2c2e 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; color: white; transition: opacity 0.5s;
        }
        .apple-logo { font-size: 60px; margin-bottom: 20px; }
        .mode-text { letter-spacing: 2px; text-transform: uppercase; font-size: 11px; opacity: 0.5; margin-bottom: 40px; }
        .start-btn {
            padding: 16px 50px; border-radius: 30px; background: #fff; color: #000;
            font-weight: 600; font-size: 16px; cursor: pointer; border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        #XRButton { display: none !important; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="apple-logo"></div>
        <div class="mode-text">Spatial Computing</div>
        <button class="start-btn" id="start-xr">Enter</button>
    </div>
    <video id="input_video" playsinline></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.150.0';
        import { VRButton } from 'https://esm.sh/three@0.150.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, hands;
        const tipMeshes = [], tipBodies = [];
        const video = document.getElementById('input_video');

        async function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = null; // 背景を透過させる（AR/VR向け）

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // VR Button (隠し)
            const vrBtn = VRButton.createButton(renderer);
            vrBtn.id = "XRButton";
            document.body.appendChild(vrBtn);

            // Cannon.js Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const pMat = new CANNON.Material({ friction: 0.1 });

            // Ground
            const ground = new CANNON.Body({ mass: 0, material: pMat });
            ground.addShape(new CANNON.Plane());
            ground.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(ground);

            // Cube Mesh & Body
            cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.2), 
                new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.2 })
            );
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 1, material: pMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.1, 0.1, 0.1)));
            cubeBody.position.set(0, 1.5, -0.8);
            world.addBody(cubeBody);

            // Hand Joint Points
            for (let i = 0; i < 21; i++) {
                const m = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 8), new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
                scene.add(m);
                tipMeshes.push(m);
                
                const b = new CANNON.Body({ mass: 0 }); // キネマティック（質量0）
                b.addShape(new CANNON.Sphere(0.015));
                world.addBody(b);
                tipBodies.push(b);
            }

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 1.0);
            light.position.set(1, 2, 1);
            scene.add(light);

            createUI();
            setupMediaPipe();

            renderer.setAnimationLoop(render);
        }

        function setupMediaPipe() {
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    const xrCamera = renderer.xr.isPresenting ? renderer.xr.getCamera(camera) : camera;
                    
                    landmarks.forEach((point, i) => {
                        // 座標変換 (簡易的な調整)
                        const v = new THREE.Vector3((point.x - 0.5) * 2, -(point.y - 0.5) * 2, -0.5);
                        v.unproject(xrCamera);
                        
                        tipBodies[i].position.copy(v);
                        tipMeshes[i].position.copy(v);
                    });
                }
            });
        }

        function render() {
            world.step(1/60);
            
            // Sync Mesh and Body
            cubeMesh.position.copy(cubeBody.position);
            cubeMesh.quaternion.copy(cubeBody.quaternion);

            // MediaPipe Update
            if (video.readyState >= 2) {
                hands.send({ image: video });
            }

            renderer.render(scene, camera);
        }

        function createUI() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.roundRect(0, 0, 512, 256, 40); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 44px sans-serif'; ctx.fillText('Spatial Center', 60, 90);
            
            const texture = new THREE.CanvasTexture(canvas);
            const plane = new THREE.Mesh(
                new THREE.PlaneGeometry(0.8, 0.4), 
                new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide })
            );
            plane.position.set(0.6, 1.2, -1); 
            scene.add(plane);
        }

        document.getElementById('start-xr').addEventListener('click', async () => {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').remove(), 500);

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                await video.play();
                
                await init();
                
                const btn = document.getElementById('XRButton');
                if (btn) btn.click();
            } catch (err) {
                console.error("Camera error:", err);
                alert("カメラのアクセスが必要です。");
            }
        });
    </script>
</body>
</html>
