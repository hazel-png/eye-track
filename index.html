<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spatial Studio Ultra - Fixed Fingers</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Roboto', sans-serif; }
        video { display: none; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #fff; z-index: 2000;
        }
        .btn {
            background: #1a73e8; color: white; border: none; padding: 24px 48px;
            border-radius: 100px; font-size: 22px; font-weight: 500; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <button class="btn" id="start-btn">VR体験を開始</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, deskGroup;
        let calibRing, isCalibrated = false;
        let calibCount = 0, accumZ = 0;

        const CONFIG = {
            handSpread: 1.6, handVertical: 1.6, handDepth: 4.5,
            zOffset: -0.25, smoothing: 0.2, targetZ: -0.6
        };

        const fingers = [];
        const dt = 1/60;

        async function init() {
            document.getElementById('overlay').remove();

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // Physics Setup
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const handMat = new CANNON.Material();
            const objMat = new CANNON.Material();
            world.addContactMaterial(new CANNON.ContactMaterial(handMat, objMat, { friction: 0.5, restitution: 0.1 }));

            // Calibration Ring
            calibRing = new THREE.Mesh(
                new THREE.TorusGeometry(0.12, 0.008, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0x4285F4, transparent: true, opacity: 0.8 })
            );
            calibRing.position.set(0, 1.3, CONFIG.targetZ);
            scene.add(calibRing);

            // Objects
            deskGroup = new THREE.Group();
            const deskBase = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.6), new THREE.MeshStandardMaterial({ color: 0xeeeeee }));
            deskBase.position.set(0, 0.9, -0.5);
            deskGroup.add(deskBase);
            scene.add(deskGroup);
            deskGroup.visible = false;

            const deskBody = new CANNON.Body({ mass: 0, material: objMat });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.6, 0.025, 0.3)));
            deskBody.position.copy(deskBase.position);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), new THREE.MeshStandardMaterial({ color: 0x1a73e8 }));
            scene.add(cubeMesh);
            cubeMesh.visible = false;
            cubeBody = new CANNON.Body({ mass: 0.2, material: objMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.04, 0.04, 0.04)));
            cubeBody.position.set(0, 1.2, -0.5);
            world.addBody(cubeBody);

            // Fingers (Fix: Ensure all 21 joints are unique)
            const fingerGeo = new THREE.SphereGeometry(0.012, 16, 16);
            const fingerMat = new THREE.MeshStandardMaterial({ color: 0x39ff14, emissive: 0x39ff14, emissiveIntensity: 0.4 });
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fingerGeo, fingerMat);
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, material: handMat, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(0.012));
                world.addBody(body);
                fingers.push({ mesh, body, lastPos: new THREE.Vector3() });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                const xrCamera = renderer.xr.getCamera(camera);

                // --- Calibration ---
                if (!isCalibrated && renderer.xr.isPresenting) {
                    const wrist = landmarks[0];
                    if (Math.abs(wrist.x - 0.5) < 0.18 && Math.abs(wrist.y - 0.5) < 0.18) {
                        calibCount++;
                        accumZ += Math.abs(wrist.z);
                        calibRing.material.color.lerp(new THREE.Color(0x39ff14), 0.1);
                        if (calibCount > 60) {
                            CONFIG.handDepth = Math.abs(CONFIG.targetZ) / (accumZ / calibCount);
                            isCalibrated = true;
                            calibRing.visible = false;
                            deskGroup.visible = true;
                            cubeMesh.visible = true;
                        }
                    } else {
                        calibCount = 0; accumZ = 0;
                        calibRing.material.color.set(0x4285F4);
                    }
                }

                // --- Finger Updates (Fix: Map each landmark to its unique finger body) ---
                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    const targetPos = new THREE.Vector3(
                        (point.x - 0.5) * CONFIG.handSpread,
                        -(point.y - 0.5) * CONFIG.handVertical,
                        -point.z * CONFIG.handDepth + CONFIG.zOffset
                    );
                    targetPos.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);

                    // 滑らかな追従
                    f.lastPos.lerp(targetPos, CONFIG.smoothing);
                    f.body.position.set(f.lastPos.x, f.lastPos.y, f.lastPos.z);
                    f.mesh.position.copy(f.lastPos);
                });
            });

            const video = document.getElementById('input_video');
            new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            }).start();

            renderer.setAnimationLoop(() => {
                if (isCalibrated) {
                    world.step(dt);
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
