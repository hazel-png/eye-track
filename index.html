<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spatial Position Audio</title>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: sans-serif; display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100vh;
            overflow: hidden; touch-action: none;
        }
        .container { text-align: center; width: 100%; }
        #moveBtn {
            width: 200px; height: 200px; border-radius: 40px;
            background: #111; border: 2px solid var(--gold);
            color: var(--gold); font-size: 1rem; cursor: pointer;
            margin: 20px auto; display: flex; justify-content: center; align-items: center;
        }
        #moveBtn:active { background: #222; box-shadow: 0 0 40px var(--gold); }
        .pos-display { font-family: monospace; font-size: 1.2rem; color: var(--gold); margin: 20px; }
        .hint { font-size: 0.7rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="hint">1. ファイルを選択<br>2. ボタンを押しながらスマホを前後左右に振る</div>
    <input type="file" id="fileInput" accept="audio/*" style="margin: 20px;">
    
    <div id="moveBtn">HOLD & MOVE<br>IN SPACE</div>

    <div class="pos-display">
        X: <span id="posX">0.0</span><br>
        Y: <span id="posY">0.0</span><br>
        Z: <span id="posZ">0.0</span>
    </div>
    <button onclick="resetPos()" style="background:none; border:1px solid #444; color:#888; padding:5px 15px; border-radius:20px;">RESET POS</button>
</div>

<script>
    let audioCtx, panner, source;
    let posX = 0, posY = 0, posZ = 0;
    let isMoving = false;

    const fileInput = document.getElementById('fileInput');
    const moveBtn = document.getElementById('moveBtn');

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        panner = audioCtx.createPanner();
        panner.panningModel = 'HRTF';
        panner.distanceModel = 'inverse'; // 遠ざかると音が小さくなる設定

        const arrayBuffer = await file.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

        source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.loop = true;
        source.connect(panner);
        panner.connect(audioCtx.destination);
        source.start();

        // センサー許可（iOS）
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission();
        }
    };

    window.addEventListener('devicemotion', (event) => {
        if (!isMoving || !panner) return;

        // 加速度を取得（重力の影響を除いた値）
        const acc = event.acceleration;
        if (!acc.x) return;

        // 加速度を位置に加算（簡易的な積分的な動き）
        // 感度調整のために 0.2 を掛けています
        posX += acc.x * 0.2;
        posY += acc.y * 0.2;
        posZ += acc.z * 0.2;

        // 限界値（あまり遠くにいきすぎないよう制限）
        posX = Math.max(-20, Math.min(20, posX));
        posY = Math.max(-20, Math.min(20, posY));
        posZ = Math.max(-20, Math.min(20, posZ));

        // 音源の位置を更新
        panner.positionX.setTargetAtTime(posX, audioCtx.currentTime, 0.1);
        panner.positionY.setTargetAtTime(posY, audioCtx.currentTime, 0.1);
        panner.positionZ.setTargetAtTime(posZ, audioCtx.currentTime, 0.1);

        // 表示更新
        document.getElementById('posX').innerText = posX.toFixed(1);
        document.getElementById('posY').innerText = posY.toFixed(1);
        document.getElementById('posZ').innerText = posZ.toFixed(1);
    });

    const startMoving = () => { isMoving = true; if(audioCtx) audioCtx.resume(); };
    const stopMoving = () => { isMoving = false; };
    const resetPos = () => { posX = 0; posY = 0; posZ = 0; };

    moveBtn.addEventListener('mousedown', startMoving);
    moveBtn.addEventListener('mouseup', stopMoving);
    moveBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startMoving(); });
    moveBtn.addEventListener('touchend', stopMoving);
</script>
</body>
</html>
