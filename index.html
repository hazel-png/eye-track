<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR BLADE '95 | Retro Spatial SHMUP</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; text-transform: uppercase; }
        #container { position: absolute; inset: 0; }
        
        /* 90s風レトロHUD */
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 100; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        .top-hud { display: flex; justify-content: space-between; font-size: 14px; color: #0f0; text-shadow: 0 0 5px #0f0; }
        #score { color: #fff; }
        
        #warning { display: none; text-align: center; color: #f00; font-size: 30px; font-weight: bold; animation: blink 0.5s infinite; text-shadow: 0 0 10px #f00; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #webcam { display: none; }

        /* 初期画面 */
        #start-screen { position: absolute; inset: 0; background: #000; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        #start-screen h1 { font-size: 40px; color: #0ff; text-shadow: 0 0 15px #0ff; margin-bottom: 5px; }
        #start-screen p { color: #ff0; animation: blink 1s infinite; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>STAR BLADE '95</h1>
        <p>TILT HEAD TO MOVE. CLICK TO SHOOT.</p>
        <p style="font-size: 10px; color: #aaa; margin-top: 20px;">[ CLICK TO START ]</p>
    </div>

    <div id="hud">
        <div class="top-hud">
            <div>SCORE: <span id="score">000000</span></div>
            <div>PLAYER: 1P</div>
        </div>
        <div id="warning">WARNING! <br> INCOMING ENEMIES</div>
        <div style="text-align: center; color: #0ff; font-size: 10px;">90S RETRO-VISION ENABLED</div>
    </div>

    <div id="container"></div>
    <video id="webcam" autoplay playsinline></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let scene, camera, renderer, faceLandmarker;
        let playerGroup, laserSound;
        const video = document.getElementById('webcam');
        const startScreen = document.getElementById('start-screen');
        
        // ゲーム状態
        let gameState = { score: 0, playerX: 0, enemies: [], lasers: [], targetX: 0, isReady: false };
        const hudScore = document.getElementById('score');
        const hudWarning = document.getElementById('warning');

        // --- ゲーム開始の儀式 ---
        startScreen.addEventListener('click', () => {
            startScreen.style.display = 'none';
            initGame();
        });

        async function initGame() {
            // --- Scene Setup (90s Retro Config) ---
            scene = new THREE.Scene();
            // 90s定番の「濃いフォグ（霧）」で描画距離をごまかす
            scene.fog = new THREE.Fog(0x000000, 15, 30); 

            // FOVを少し広めにしてスピード感を出す
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 10);
            camera.lookAt(0, 0, -5);

            renderer = new THREE.WebGLRenderer({ antialias: false }); // あえてアンチエイリアスOFFでジャギーを出す
            renderer.setSize(window.innerWidth, window.innerHeight);
            // 解像度をあえて下げる（Pixel Ratioを低く設定）
            renderer.setPixelRatio(0.8); 
            document.getElementById('container').appendChild(renderer.domElement);

            // --- 視覚的要素（90sグラフィック） ---
            // レトロなカラーグリッドの床
            const gridHelper = new THREE.GridHelper(100, 20, 0x00ff00, 0x330033);
            gridHelper.position.y = -1;
            scene.add(gridHelper);

            // ワイヤーフレームの背景
            const bgGeometry = new THREE.IcosahedronGeometry(40, 1);
            const bgMaterial = new THREE.MeshBasicMaterial({ color: 0x220022, wireframe: true, side: THREE.BackSide });
            scene.add(new THREE.Mesh(bgGeometry, bgMaterial));

            // --- 自機（プレイヤー）の構築 ---
            playerGroup = new THREE.Group();
            const bodyGeo = new THREE.ConeGeometry(0.5, 1.5, 4); // 粗いポリゴン
            const bodyMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.x = Math.PI / 2; // 寝かせる
            playerGroup.add(body);
            scene.add(playerGroup);

            // オーディオ（音が出ないブラウザ向けの保険）
            const listener = new THREE.AudioListener();
            camera.add(listener);

            await setupTracking();
            gameState.isReady = true;
            animate();
        }

        async function setupTracking() {
            try {
                const res = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(res, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO", numFaces: 1
                });
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => { video.play(); predict(); };
            } catch (e) { console.error(e); }
        }

        function predict() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const lm = results.faceLandmarks[0];
                    // 顔の傾き（左右）を取得して自機の目標位置にする
                    const headX = (lm[234].x + lm[454].x) / 2;
                    gameState.targetX = (0.5 - headX) * 15; // 左右の移動量
                }
            }
            requestAnimationFrame(predict);
        }

        // --- ゲームループ（アニメーション） ---
        function animate() {
            if (!gameState.isReady) return;
            requestAnimationFrame(animate);

            // 1. プレイヤーの移動（物理慣性を適用）
            playerGroup.position.x += (gameState.targetX - playerGroup.position.x) * 0.1;
            // 傾き演出（レトロ格闘ゲーム風）
            playerGroup.rotation.z = (playerGroup.position.x - gameState.targetX) * 0.1;

            // 2. 敵（キューブ）の生成と移動
            if (Math.random() < 0.05) { // 生成確率
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                // 粗いテクスチャ風のMeshBasicMaterial
                const material = new THREE.MeshBasicMaterial({ color: Math.random() < 0.5 ? 0xff0000 : 0x0000ff, wireframe: Math.random() < 0.3 });
                const enemy = new THREE.Mesh(geometry, material);
                enemy.position.set((Math.random() - 0.5) * 20, Math.random() * 5, -30);
                scene.add(enemy);
                gameState.enemies.push(enemy);
            }

            gameState.enemies.forEach((enemy, index) => {
                enemy.position.z += 0.5; // 奥から手前へ移動
                enemy.rotation.x += 0.02; enemy.rotation.y += 0.02;

                // プレイヤーを通り過ぎたら削除
                if (enemy.position.z > 15) {
                    scene.remove(enemy);
                    gameState.enemies.splice(index, 1);
                }
            });

            // 3. レーザーの移動と当たり判定
            gameState.lasers.forEach((laser, lIndex) => {
                laser.position.z -= 1.0; // 手前から奥へ（速い）

                // 敵との当たり判定（シンプル）
                gameState.enemies.forEach((enemy, eIndex) => {
                    if (laser.position.distanceTo(enemy.position) < 1.5) {
                        // 爆発（粗い表現として削除）
                        scene.remove(enemy);
                        gameState.enemies.splice(eIndex, 1);
                        scene.remove(laser);
                        gameState.lasers.splice(lIndex, 1);
                        
                        // スコア加算
                        gameState.score += 100;
                        hudScore.innerText = String(gameState.score).padStart(6, '0');
                    }
                });

                // 遠くに行ったら削除
                if (laser.position.z < -40) {
                    scene.remove(laser);
                    gameState.lasers.splice(lIndex, 1);
                }
            });

            // WARNINGの表示制御
            hudWarning.style.display = gameState.enemies.length > 5 ? 'block' : 'none';

            renderer.render(scene, camera);
        }

        // --- クリックでショット（レーザー発射） ---
        window.addEventListener('click', () => {
            if (!gameState.isReady) return;
            
            const geometry = new THREE.CylinderGeometry(0.05, 0.05, 2, 4); // 粗いポリゴン
            const material = new THREE.MeshBasicMaterial({ color: 0xff00f2 });
            const laser = new THREE.Mesh(geometry, material);
            laser.rotation.x = Math.PI / 2; // 横にする
            laser.position.set(playerGroup.position.x, playerGroup.position.y, playerGroup.position.z);
            scene.add(laser);
            gameState.lasers.push(laser);
        });

        window.addEventListener('resize', () => {
            if (!gameState.isReady) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
