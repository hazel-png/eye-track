<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebXR Physics - Cannon.js</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
    </style>
</head>
<body>
    <video id="input_video" playsinline></video>
    <div id="button_container"></div>

    <script type="module">
        // WebXR用のVRボタンをインポート
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const tipMeshes = [], tipBodies = [];

        async function init() {
            // --- Three.js Setup ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 3); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // WebXRを有効化
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // ライティング
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(1, 5, 1);
            scene.add(light);

            // 地面（グリッド）
            const grid = new THREE.GridHelper(20, 20, 0xffffff, 0x444444);
            scene.add(grid);

            // --- Cannon.js (物理エンジン) ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const pMat = new CANNON.Material({ friction: 2.5 });

            // 物理的な地面
            const groundBody = new CANNON.Body({ mass: 0, material: pMat });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);

            // ターゲット（立方体）
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({ color: 0x00ffaa }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.1, material: pMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.1, 0.1, 0.1)));
            cubeBody.position.set(0, 1.5, -0.5);
            world.addBody(cubeBody);

            // 手の関節代わりの球体 (21個)
            const jGeo = new THREE.SphereGeometry(0.015, 8, 8);
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(jGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                tipMeshes.push(mesh);
                const body = new CANNON.Body({ mass: 0 });
                body.addShape(new CANNON.Sphere(0.015));
                world.addBody(body);
                tipBodies.push(body);
            }

            // --- MediaPipe Hand Tracking ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    // VR内のカメラの姿勢を取得
                    const xrCamera = renderer.xr.getCamera(camera);
                    
                    lm.forEach((point, i) => {
                        // 座標をワールド空間に変換（カメラの向きに合わせる）
                        const v = new THREE.Vector3(
                            (point.x - 0.5) * 1.5, 
                            -(point.y - 0.5) * 1.5, 
                            -point.z * 1.5 - 0.4
                        ).applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        
                        tipBodies[i].position.copy(v);
                        tipMeshes[i].position.copy(v);
                    });
                }
            });

            const videoElement = document.getElementById('input_video');
            const cameraStream = new Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                width: 640, height: 480
            });
            cameraStream.start();

            // レンダリングループ（WebXRではこれを使用）
            renderer.setAnimationLoop(render);
        }

        function render() {
            world.step(1/60);
            
            // 物理エンジンの計算結果をMeshに反映
            cubeMesh.position.copy(cubeBody.position);
            cubeMesh.quaternion.copy(cubeBody.quaternion);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
