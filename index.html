<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>6DoF Real-World Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        #overlay {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(255,255,255,0.9); z-index: 1000;
        }
        .btn {
            background: #4285F4; color: white; border: none; padding: 20px 40px;
            border-radius: 50px; font-size: 18px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>6DoF 実写同期</h1>
        <button class="btn" id="start-btn">カメラと同期を開始</button>
        <p style="color:#666; font-size:12px; margin-top:10px;">周囲を明るくして開始してください</p>
    </div>

    <script type="module">
        import { ARButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let scene, camera, renderer;

        async function init() {
            // シーン作成
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // レンダラー設定 (alpha: true が現実を映す鍵)
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 環境光
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            // 目印のオブジェクト（これが現実空間に固定される）
            const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const material = new THREE.MeshNormalMaterial();
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(0, 0, -0.5); // 50cm前に設置
            scene.add(cube);

            // 白い霧の効果 (カメラに追従)
            const mist = new THREE.Mesh(
                new THREE.PlaneGeometry(10, 10),
                new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15, depthWrite: false })
            );
            mist.position.z = -0.05;
            camera.add(mist);
            scene.add(camera);

            // ARセッションの開始
            try {
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['local-floor']
                });
                renderer.xr.setSession(session);
                document.getElementById('overlay').remove();
            } catch (e) {
                alert("ARセッション失敗: " + e.message);
                return;
            }

            // ループ処理
            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').onclick = init;
    </script>
</body>
</html>
