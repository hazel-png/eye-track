<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fixed Hyper-Realistic Audio</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 40px; box-sizing: border-box; z-index: 10; }
        .ui-bottom { display: flex; justify-content: center; align-items: center; gap: 20px; pointer-events: auto; background: rgba(20,20,25,0.9); padding: 20px; border-radius: 15px; border: 1px solid #444; }
        .btn { cursor: pointer; padding: 12px 25px; background: #00d4ff; border: none; color: #000; border-radius: 5px; font-weight: bold; }
        .btn:disabled { background: #333; color: #666; }
        #status { font-family: monospace; color: #00d4ff; font-size: 12px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div>
            <h1>PHYSICS AUDIO ENGINE</h1>
            <div id="status">System: Standby</div>
        </div>
        <div class="ui-bottom">
            <label class="btn">FILE LOAD<input type="file" id="fileInput" style="display:none" accept="audio/*"></label>
            <button id="playBtn" class="btn" disabled>START</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DragControls } from 'three/addons/controls/DragControls.js';

        let scene, camera, renderer, audio, mesh, oControls, dControls;
        let filterNode, reverbNode, wetGain;
        let lastPos = new THREE.Vector3();
        let isReady = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(100, 50, 0x222222, 0x111111));

            // リスナー（中央）
            const listenerVis = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshBasicMaterial({color:0xffffff, wireframe:true}));
            scene.add(listenerVis);

            // 音源
            mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.7, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0x00d4ff, emissive: 0x00d4ff })
            );
            mesh.position.set(10, 1, 0);
            scene.add(mesh);
            mesh.add(new THREE.PointLight(0x00d4ff, 100, 20));
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));

            // オーディオ設定
            const listener = new THREE.AudioListener();
            camera.add(listener);

            audio = new THREE.PositionalAudio(listener);
            
            // エラー回避：pannerへのアクセスを確実にする
            const panner = audio.panner; // getPanner()ではなくプロパティに直接アクセス
            panner.panningModel = 'HRTF';
            panner.distanceModel = 'inverse';
            panner.refDistance = 1;
            panner.rolloffFactor = 2; // 減衰を強めに設定

            mesh.add(audio);

            // 物理シミュ用ノード
            const ctx = listener.context;
            filterNode = ctx.createBiquadFilter();
            filterNode.type = 'lowpass';

            reverbNode = ctx.createConvolver();
            // インパルス応答（簡易残響）の生成
            const irLen = ctx.sampleRate * 2;
            const irBuf = ctx.createBuffer(2, irLen, ctx.sampleRate);
            for(let c=0; c<2; c++) {
                const data = irBuf.getChannelData(c);
                for(let i=0; i<irLen; i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/irLen, 2);
            }
            reverbNode.buffer = irBuf;

            wetGain = ctx.createGain();
            wetGain.gain.value = 0.2;

            // 接続
            panner.disconnect();
            panner.connect(filterNode);
            filterNode.connect(ctx.destination);
            filterNode.connect(reverbNode);
            reverbNode.connect(wetGain);
            wetGain.connect(ctx.destination);

            // コントロール
            oControls = new OrbitControls(camera, renderer.domElement);
            dControls = new DragControls([mesh], camera, renderer.domElement);
            dControls.addEventListener('dragstart', () => oControls.enabled = false);
            dControls.addEventListener('dragend', () => oControls.enabled = true);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // ファイル読み込み処理
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const url = URL.createObjectURL(file);
            const loader = new THREE.AudioLoader();
            
            document.getElementById('status').innerText = "Loading Audio...";
            loader.load(url, (buffer) => {
                audio.setBuffer(buffer);
                audio.setLoop(true);
                document.getElementById('playBtn').disabled = false;
                document.getElementById('status').innerText = "System Ready";
                isReady = true;
            });
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            if (audio.context.state === 'suspended') audio.context.resume();
            if (audio.isPlaying) {
                audio.pause();
                document.getElementById('playBtn').innerText = "START";
            } else {
                audio.play();
                document.getElementById('playBtn').innerText = "STOP";
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            if (isReady && audio.isPlaying) {
                const dist = mesh.position.distanceTo(camera.position);
                
                // 1. 空気吸収（距離でこもる）
                const cutoff = Math.max(200, 20000 * Math.exp(-dist * 0.05));
                filterNode.frequency.setTargetAtTime(cutoff, audio.context.currentTime, 0.1);

                // 2. ドップラー効果（ピッチ変化）
                const v = mesh.position.clone().sub(lastPos).multiplyScalar(60);
                const relV = v.dot(camera.position.clone().sub(mesh.position).normalize());
                const shift = 343 / (343 + relV);
                audio.setPlaybackRate(Math.max(0.7, Math.min(1.5, shift)));
                lastPos.copy(mesh.position);

                document.getElementById('status').innerText = `Dist: ${dist.toFixed(1)}m | Freq: ${Math.round(cutoff)}Hz`;
            }

            oControls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
