<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spatial Computing Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        video { display: none; }
        
        /* iPhone風 Splash Screen */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2c2c2e 0%, #000000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; color: white;
        }
        .apple-logo { font-size: 60px; margin-bottom: 20px; }
        .mode-text { letter-spacing: 2px; text-transform: uppercase; font-size: 12px; opacity: 0.6; margin-bottom: 40px; }

        /* Three.jsが生成するボタンをiPhone風に無理やり上書きするスタイル */
        #XRButton {
            position: relative !important;
            bottom: auto !important;
            left: auto !important;
            margin: 0 !important;
            padding: 18px 60px !important;
            border-radius: 40px !important;
            background: #ffffff !important;
            color: #000000 !important;
            font-weight: 600 !important;
            font-size: 16px !important;
            border: none !important;
            opacity: 1 !important;
            cursor: pointer !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="apple-logo"></div>
        <div class="mode-text">Spatial Computing Mode</div>
        <div id="button-container"></div>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';
        import { VRButton } from 'https://cdn.skypack.dev/three@0.150.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const tipMeshes = [], tipBodies = [];

        async function startApp() {
            // オーバーレイを消す
            document.getElementById('overlay').style.display = 'none';

            // --- Three.js Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // --- 物理エンジン & ハントラ (前回のロジック) ---
            initPhysics();
            await initCameraAndHands();

            // メインループ
            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        function initPhysics() {
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const pMat = new CANNON.Material({ friction: 4.0 });

            // 地面
            const groundBody = new CANNON.Body({ mass: 0, material: pMat });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);

            // キューブ
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({ color: 0x1c1c1e, metalness: 0.8 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.2, material: pMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.1, 0.1, 0.1)));
            cubeBody.position.set(0, 1.5, -0.8);
            world.addBody(cubeBody);

            // 21点
            const jGeo = new THREE.SphereGeometry(0.012, 8, 8);
            for (let i = 0; i < 21; i++) {
                const m = new THREE.Mesh(jGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(m);
                tipMeshes.push(m);
                const b = new CANNON.Body({ mass: 0, material: pMat });
                b.addShape(new CANNON.Sphere(0.012));
                world.addBody(b);
                tipBodies.push(b);
            }
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        }

        async function initCameraAndHands() {
            const videoElement = document.getElementById('input_video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            videoElement.srcObject = stream;
            videoElement.play();

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    const xrCamera = renderer.xr.getCamera(camera);
                    lm.forEach((point, i) => {
                        const v = new THREE.Vector3((point.x - 0.5) * 2, -(point.y - 0.5) * 1.5, -point.z * 3 - 0.8)
                            .applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        tipBodies[i].position.copy(v);
                        tipMeshes[i].position.copy(v);
                    });
                }
            });

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                hands.send({ image: videoElement });
                renderer.render(scene, camera);
            });
        }

        // --- 起動処理 ---
        const btn = VRButton.createButton(new THREE.WebGLRenderer()); // 仮のレンダラーで作成
        btn.id = "XRButton";
        // ボタンがクリックされたらアプリ本体を動かす
        btn.addEventListener('click', () => {
            startApp();
        });
        document.getElementById('button-container').appendChild(btn);

    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
</body>
</html>
