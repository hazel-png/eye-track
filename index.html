<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Spatial Engine | Stabilized 6DoF</title>
    <style>
        :root { --accent: #00f2ff; --bg: #05050a; --glass: rgba(10, 10, 25, 0.9); }
        body { margin: 0; background: var(--bg); color: var(--accent); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 40px; box-sizing: border-box; 
        }
        #status-panel { 
            background: var(--glass); backdrop-filter: blur(10px); padding: 20px; 
            border-left: 3px solid var(--accent); font-size: 11px; letter-spacing: 1px;
            pointer-events: none; border-radius: 0 8px 8px 0; width: fit-content;
        }
        .ui-bottom { 
            display: flex; justify-content: center; align-items: center; gap: 20px; 
            pointer-events: auto; background: var(--glass); padding: 20px 40px; 
            border-radius: 100px; border: 1px solid rgba(0, 242, 255, 0.2);
        }
        .btn { 
            cursor: pointer; padding: 10px 30px; background: transparent; 
            border: 2px solid var(--accent); color: var(--accent); border-radius: 30px; 
            font-weight: bold; transition: 0.3s; text-transform: uppercase;
        }
        .btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        .btn:disabled { opacity: 0.2; }
        #webcam { display: none; }
        .stat-val { color: #fff; font-family: monospace; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="container"></div>
    <video id="webcam" autoplay playsinline></video>

    <div id="status-panel">
        <div style="opacity: 0.5; font-size: 9px; margin-bottom: 5px;">STABILIZED 6DOF SYSTEM</div>
        <div>POS: <span id="pos-stat" class="stat-val">0.0, 0.0, 0.0</span></div>
        <div>ROT: <span id="rot-stat" class="stat-val">0.0, 0.0</span></div>
    </div>

    <div id="overlay">
        <div style="text-align: center;">
            <h1 style="letter-spacing: 12px; margin: 0; font-weight: 200;">SPATIAL CORE V3</h1>
            <p style="opacity: 0.5; font-size: 10px;">PRO-STABILIZED TRACKING ENABLED</p>
        </div>
        <div class="ui-bottom">
            <label class="btn">Load Audio<input type="file" id="fileInput" accept="audio/*" style="display:none;"></label>
            <button id="playBtn" class="btn" disabled>Initialize</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DragControls } from 'three/addons/controls/DragControls.js';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let scene, camera, renderer, audio, listener, headGroup, coreMesh, faceLandmarker, orbit;
        let filterNode, reverbNode, analyser;
        const video = document.getElementById('webcam');

        // --- 安定化パラメータ ---
        const LERP_FACTOR = 0.03;   // スムージング強度（小さいほどヌルヌル動く）
        const DEADZONE = 0.15;      // 位置の微小な変化を無視する閾値
        const indices = [10, 152, 234, 454, 1, 33, 263]; // 顔全体を把握する点

        async function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x05050a, 0.015);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('container').appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(200, 50, 0x00f2ff, 0x050515));

            headGroup = new THREE.Group();
            const headAvatar = new THREE.Mesh(
                new THREE.BoxGeometry(1, 1.3, 0.8),
                new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true })
            );
            headGroup.add(headAvatar);
            scene.add(headGroup);

            listener = new THREE.AudioListener();
            headGroup.add(listener);

            coreMesh = new THREE.Mesh(
                new THREE.IcosahedronGeometry(2, 1),
                new THREE.MeshStandardMaterial({ color: 0x00f2ff, wireframe: true, emissive: 0x00f2ff, emissiveIntensity: 1.5 })
            );
            coreMesh.position.set(0, 3, -10);
            scene.add(coreMesh);
            coreMesh.add(new THREE.PointLight(0x00f2ff, 50, 40));

            // オーディオグラフ
            audio = new THREE.PositionalAudio(listener);
            audio.setRefDistance(5);
            coreMesh.add(audio);

            const ctx = listener.context;
            filterNode = ctx.createBiquadFilter();
            reverbNode = ctx.createDelay();
            reverbNode.delayTime.value = 0.1;
            const feedback = ctx.createGain();
            feedback.gain.value = 0.3;
            
            reverbNode.connect(feedback);
            feedback.connect(reverbNode);

            audio.panner.disconnect();
            audio.panner.connect(filterNode);
            filterNode.connect(ctx.destination);
            filterNode.connect(reverbNode);
            reverbNode.connect(ctx.destination);

            analyser = new THREE.AudioAnalyser(audio, 128);

            orbit = new OrbitControls(camera, renderer.domElement);
            orbit.enableDamping = true;

            const drag = new DragControls([coreMesh], camera, renderer.domElement);
            drag.addEventListener('dragstart', () => orbit.enabled = false);
            drag.addEventListener('dragend', () => orbit.enabled = true);

            await setupTracking();
            animate();
        }

        async function setupTracking() {
            const resolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(resolver, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = stream;
            video.onloadeddata = () => predict();
        }

        function predict() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const lm = results.faceLandmarks[0];

                    // --- 改良版：安定化計算 ---
                    // 鼻先(lm[1])ではなく眉間(lm[168])を重心基準にして「首振りによるブレ」を最小化
                    const center = lm[168];
                    const faceWidth = Math.abs(lm[454].x - lm[234].x);

                    // 目標座標（感度を以前より少しマイルドに設定）
                    const tX = (center.x - 0.5) * -30;
                    const tY = (0.5 - center.y) * 15 + 3;
                    const tZ = (0.18 / faceWidth) * 12;

                    // 位置更新（デッドゾーン：小さな震えは無視）
                    if (Math.abs(tX - headGroup.position.x) > DEADZONE) {
                        headGroup.position.x += (tX - headGroup.position.x) * LERP_FACTOR;
                    }
                    headGroup.position.y += (tY - headGroup.position.y) * LERP_FACTOR;
                    headGroup.position.z += (tZ - headGroup.position.z) * LERP_FACTOR;

                    // 向き更新（鼻の突出 lm[1] を使って角度を出す）
                    const yaw = (lm[1].x - center.x) * 6;
                    const pitch = (lm[1].y - center.y) * 6;
                    headGroup.rotation.y += (-yaw - headGroup.rotation.y) * LERP_FACTOR * 2;
                    headGroup.rotation.x += (pitch - headGroup.rotation.x) * LERP_FACTOR * 2;

                    document.getElementById('pos-stat').innerText = `${headGroup.position.x.toFixed(1)}, ${headGroup.position.y.toFixed(1)}, ${headGroup.position.z.toFixed(1)}`;
                    document.getElementById('rot-stat').innerText = `${pitch.toFixed(2)}, ${yaw.toFixed(2)}`;
                }
            }
            requestAnimationFrame(predict);
        }

        function animate() {
            requestAnimationFrame(animate);
            orbit.update();
            if (audio?.isPlaying) {
                const level = analyser.getAverageFrequency() / 255;
                coreMesh.scale.setScalar(1 + level * 1.5);
                const dist = headGroup.position.distanceTo(coreMesh.position);
                filterNode.frequency.setTargetAtTime(Math.max(200, 20000 - dist * 1000), audio.context.currentTime, 0.1);
            }
            renderer.render(scene, camera);
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const url = URL.createObjectURL(e.target.files[0]);
            new THREE.AudioLoader().load(url, (buf) => {
                audio.setBuffer(buf);
                audio.setLoop(true);
                document.getElementById('playBtn').disabled = false;
                document.getElementById('playBtn').innerText = "Start Engine";
            });
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            if (audio.context.state === 'suspended') audio.context.resume();
            audio.isPlaying ? audio.pause() : audio.play();
            document.getElementById('playBtn').innerText = audio.isPlaying ? "Stop" : "Resume";
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
