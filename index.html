<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Physics VR - With Ground</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            align-items: center; justify-content: center; z-index: 1000;
            font-family: sans-serif; cursor: pointer; text-align: center;
        }
    </style>
</head>
<body>
    <div id="overlay">地面を追加しました！<br>タップしてVR開始</div>
    <video id="input_video" playsinline></video>

    <script>
        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const tipMeshes = [], tipBodies = [];

        function setupGyro() {
            window.addEventListener('deviceorientation', (e) => {
                if (e.alpha !== null) {
                    const alpha = THREE.MathUtils.degToRad(e.alpha);
                    const beta = THREE.MathUtils.degToRad(e.beta);
                    const gamma = THREE.MathUtils.degToRad(e.gamma);
                    camera.rotation.set(beta, gamma, alpha, 'YXZ');
                }
            }, true);
        }

        async function init() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            setupGyro();

            // --- Three.js ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            // 視覚的な地面（グリッド）
            const grid = new THREE.GridHelper(20, 20, 0xffffff, 0x444444);
            scene.add(grid);

            camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 0); // 1.6mの高さ（立ち上がった目線）
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(1, 5, 1);
            scene.add(light);

            // --- Cannon.js (物理エンジン) ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const pMat = new CANNON.Material({ friction: 2.5 });

            // **物理的な地面の追加**
            const groundBody = new CANNON.Body({
                mass: 0, // 質量0 = 動かない物体
                material: pMat
            });
            groundBody.addShape(new CANNON.Plane());
            // CannonのPlaneはデフォルトで上(Z)を向いているので、床にするためX軸で90度回転
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);

            // ターゲットオブジェクト（少し高い位置から落とす）
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({ color: 0x00ffaa }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.1, material: pMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.1, 0.1, 0.1)));
            cubeBody.position.set(0, 2.0, -0.6); // 空中に配置
            cubeBody.collisionFilterGroup = 2;
            cubeBody.collisionFilterMask = 1 | 0xFF; // 手(1)と地面(デフォルト)両方に当たる
            world.addBody(cubeBody);

            // 21関節の作成
            const jGeo = new THREE.SphereGeometry(0.015, 6, 6);
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(jGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                tipMeshes.push(mesh);
                const body = new CANNON.Body({ mass: 0, material: pMat });
                body.addShape(new CANNON.Sphere(0.015));
                body.collisionFilterGroup = 1;
                body.collisionFilterMask = 2;
                world.addBody(body);
                tipBodies.push(body);
            }

            // --- MediaPipe & Camera ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    lm.forEach((point, i) => {
                        const v = new THREE.Vector3(
                            (point.x - 0.5) * 1.6, 
                            -(point.y - 0.5) * 1.2, 
                            -point.z * 2 - 0.5
                        ).applyQuaternion(camera.quaternion).add(camera.position);
                        tipBodies[i].position.copy(v);
                        tipMeshes[i].position.copy(v);
                    });
                }
            });

            const videoElement = document.getElementById('input_video');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 480, height: 270 }
            });
            videoElement.srcObject = stream;
            videoElement.play();

            const processFrame = async () => {
                await hands.send({ image: videoElement });
                requestAnimationFrame(processFrame);
            };
            processFrame();

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            world.step(1/40);
            cubeMesh.position.copy(cubeBody.position);
            cubeMesh.quaternion.copy(cubeBody.quaternion);

            const w = window.innerWidth, h = window.innerHeight;
            renderer.setScissorTest(true);
            renderer.setScissor(0, 0, w/2, h); renderer.setViewport(0, 0, w/2, h); renderer.render(scene, camera);
            renderer.setScissor(w/2, 0, w/2, h); renderer.setViewport(w/2, 0, w/2, h); renderer.render(scene, camera);
        }

        document.getElementById('overlay').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            init();
        });
    </script>
</body>
</html>
