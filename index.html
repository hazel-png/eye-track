<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>アイトラッキング - 修正版</title>
    <style>
        body { margin: 0; background: #f0f0f0; font-family: sans-serif; }
        #status {
            position: fixed; top: 10px; left: 10px; z-index: 9999;
            background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 8px;
        }
        /* カメラプレビューとMediaPipeのデバッグ表示を徹底的に隠す */
        canvas, video, .dg { display: none !important; }
        #webgazerVideoContainer, #webgazerVideoFeed, #webgazerFaceOverlay, #webgazerFaceFeedbackBox {
            display: none !important;
        }
        /* 視線の点だけは出す */
        #webgazerGazeDot {
            display: block !important;
            background-color: red !important;
        }
    </style>
</head>
<body>

<div id="status">セットアップ中...（カメラを許可してください）</div>

<script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.js"></script>

<script>
    window.onload = async () => {
        const status = document.getElementById('status');

        try {
            // WebGazerの開始
            await webgazer.setRegression('ridge')
                .setGazeListener((data, clock) => {
                    if (data == null) return;
                })
                .begin();

            // 設定の適用
            webgazer.showVideoPreview(false)    // 顔を表示しない
                    .showPredictionPoints(true) // 赤い点だけ出す
                    .applyKalmanFilter(true);   // 動きを滑らかにする

            status.innerHTML = "トラッキング中！<br>画面の数カ所をクリックして校正してください。";
            status.style.background = "green";

        } catch (e) {
            status.innerHTML = "エラーが発生しました。サーバー(localhost)で実行しているか確認してください。";
            status.style.background = "red";
            console.error(e);
        }
    };

    window.onbeforeunload = () => {
        webgazer.saveDataAcrossSessions(false); // データを保存しない
        webgazer.end();
    };
</script>

</body>
</html>
