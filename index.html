<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>6DoF AR Studio - Custom Overlay</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: sans-serif; }
        video { display: none; }

        /* 現実世界の上に被せる「半透明の黒いカバー（少し白っぽく）」 */
        #ar-filter {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(30, 30, 30, 0.4); /* 黒ベースの半透明 */
            backdrop-filter: brightness(1.2) contrast(0.8); /* 少し白っぽく飛ばす */
            -webkit-backdrop-filter: brightness(1.2) contrast(0.8);
            pointer-events: none; /* タッチ操作を透過させる */
            z-index: 1; /* 3Dモデルの後ろ、カメラ映像の前 */
            display: none;
        }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: white; z-index: 2000;
        }

        .btn {
            background: #4285F4; color: white; border: none; padding: 20px 40px;
            border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="ar-filter"></div>

    <div id="start-overlay">
        <button class="btn" id="start-btn">ARを開始（等身大/6DoF）</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { ARButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const fingers = [];
        const _v = new THREE.Vector3();

        async function init() {
            // UIとフィルターの制御
            document.getElementById('start-overlay').remove();
            document.getElementById('ar-filter').style.display = 'block';

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const mat = new CANNON.Material();
            world.addContactMaterial(new CANNON.ContactMaterial(mat, mat, { friction: 0.7, restitution: 0.1 }));

            // Objects (Desk & Cube)
            const deskH = 1.2;
            const deskMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.04, 0.4),
                new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 })
            );
            deskMesh.position.set(0, deskH, -0.5);
            scene.add(deskMesh);

            const deskBody = new CANNON.Body({ mass: 0 });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.4, 0.02, 0.2)));
            deskBody.position.copy(deskMesh.position);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.3, material: mat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, deskH + 0.5, -0.5);
            world.addBody(cubeBody);

            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.015), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0 });
                body.addShape(new CANNON.Sphere(0.015));
                world.addBody(body);
                fingers.push({ mesh, body });
            }
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            // WebXR Session
            const session = await navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['local-floor'] });
            await renderer.xr.setSession(session);

            // MediaPipe
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const xrCamera = renderer.xr.getCamera(camera);
                const landmarks = results.multiHandLandmarks[0];
                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    _v.set((point.x - 0.5) * 1.15, -(point.y - 0.5) * 1.15, -point.z * 1.3 - 0.2);
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    f.body.position.set(_v.x, _v.y, _v.z);
                    f.mesh.position.copy(f.body.position);
                });
            });

            const video = document.getElementById('input_video');
            const cameraHelper = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                width: 1280, height: 720
            });
            cameraHelper.start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('start-btn').addEventListener('click', () => {
                init().catch(console.error);
            });
        });
    </script>
</body>
</html>
