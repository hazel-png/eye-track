<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Smartphone VR Hand Tracking</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; display: flex; }
    
    /* 左右のビューポート設定 */
    .view {
      position: relative;
      width: 50vw;
      height: 100vh;
      overflow: hidden;
      border-right: 1px solid #333;
    }

    video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* 鏡合わせ */
    }

    /* 左右それぞれのカーソル */
    .cursor {
      position: absolute;
      width: 20px; height: 20px;
      border: 2px solid white;
      border-radius: 50%;
      background: rgba(0, 255, 255, 0.5);
      transform: translate(-50%, -50%);
      display: none;
      z-index: 100;
    }

    /* 左右それぞれのターゲットボタン */
    .target {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 30px;
      border: 2px solid white;
      color: white;
      font-family: sans-serif;
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

  <div class="view" id="leftView">
    <video class="input_video"></video>
    <div class="cursor" id="cursorL"></div>
    <div class="target">VR TARGET</div>
  </div>

  <div class="view" id="rightView">
    <video class="input_video"></video>
    <div class="cursor" id="cursorR"></div>
    <div class="target">VR TARGET</div>
  </div>

  <script>
    const videoElements = document.querySelectorAll('.input_video');
    const cursorL = document.getElementById('cursorL');
    const cursorR = document.getElementById('cursorR');

    function onResults(results) {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const indexTip = landmarks[8];

        // 座標計算（0.0 ~ 1.0）
        const x = (1 - indexTip.x);
        const y = indexTip.y;

        // 左右のカーソルを更新
        [cursorL, cursorR].forEach(cursor => {
          cursor.style.display = 'block';
          cursor.style.left = `${x * 100}%`;
          cursor.style.top = `${y * 100}%`;
        });
      } else {
        cursorL.style.display = cursorR.style.display = 'none';
      }
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    // 1つのカメラストリームを両方のビデオ要素に流す
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    }).then(stream => {
      videoElements.forEach(video => {
        video.srcObject = stream;
        video.play();
      });

      // 毎フレーム解析を実行（代表して1つのビデオから）
      const camera = new Camera(videoElements[0], {
        onFrame: async () => {
          await hands.send({image: videoElements[0]});
        },
        width: 640, height: 480
      });
      camera.start();
    });
  </script>
</body>
</html>
