<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Life-size Hands</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #fff; z-index: 2000;
        }
        .btn {
            background: #4285F4; color: white; border: none; padding: 15px 30px;
            border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="overlay"><button class="btn" id="start-btn">等身大モードで開始</button></div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        const SCALE_X = 2.0; // 左右の広がり（等身大調整）
        const SCALE_Y = 1.2; // 上下の広がり
        const OFFSET_Z = -0.4; // 手の前後位置の基準

        let scene, camera, renderer, world, fingers = [];
        let cubeMesh, cubeBody;
        const _v = new THREE.Vector3();

        async function init() {
            document.getElementById('overlay').remove();

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const mat = new CANNON.Material();
            world.addContactMaterial(new CANNON.ContactMaterial(mat, mat, { friction: 0.9, restitution: 0.1 }));

            // Desk (Face height: 1.5m)
            const deskMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.6), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
            deskMesh.position.set(0, 1.5, -0.3);
            scene.add(deskMesh);
            const deskBody = new CANNON.Body({ mass: 0, material: mat });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.6, 0.025, 0.3)));
            deskBody.position.copy(deskMesh.position);
            world.addBody(deskBody);

            // Cube
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.3, material: mat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, 1.7, -0.3);
            world.addBody(cubeBody);

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            // Life-size Fingers (Approx. 2cm radius)
            const fingerGeo = new THREE.SphereGeometry(0.02, 16, 16);
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fingerGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, material: mat });
                body.addShape(new CANNON.Sphere(0.02));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            // MediaPipe & Camera
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
            
            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const xrCamera = renderer.xr.getCamera(camera);
                const lm = results.multiHandLandmarks[0];

                lm.forEach((point, i) => {
                    // 等身大にするための計算: 
                    // 画面中央(0.5)からの距離をメートルに換算
                    _v.set(
                        (point.x - 0.5) * SCALE_X, 
                        -(point.y - 0.5) * SCALE_Y, 
                        -point.z * 1.0 + OFFSET_Z 
                    );
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    
                    fingers[i].body.position.set(_v.x, _v.y, _v.z);
                    fingers[i].mesh.position.copy(fingers[i].body.position);
                });
            });

            const video = document.getElementById('input_video');
            new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            }).start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
