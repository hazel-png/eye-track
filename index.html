<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>iPhone Style WebXR VR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r150/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        video { display: none; }
        
        /* iPhone風の開始オーバーレイ */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; color: white;
        }
        .start-btn {
            padding: 15px 40px; border-radius: 30px; background: #fff; color: #000;
            font-weight: 600; font-size: 18px; cursor: pointer; border: none;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1); transition: transform 0.2s;
        }
        .start-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="overlay">
        <div style="font-size: 40px; margin-bottom: 20px;"></div>
        <div style="margin-bottom: 40px; opacity: 0.8;">Spatial Computing Mode</div>
        <button class="start-btn" id="enter-xr">Enter VR</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const tipMeshes = [], tipBodies = [];

        async function init() {
            // --- Three.js & WebXR ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            
            // 洗練されたグリッド
            const grid = new THREE.GridHelper(30, 30, 0x333333, 0x111111);
            scene.add(grid);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // UIパネルの作成 (iPhone風コントロールセンター)
            createUI();

            // --- Cannon.js (Physics) ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const pMat = new CANNON.Material({ friction: 3.0 });

            // 地面
            const groundBody = new CANNON.Body({ mass: 0, material: pMat });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);

            // iPhone風の角丸キューブ
            cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.2), 
                new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.9, roughness: 0.1 })
            );
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.15, material: pMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.1, 0.1, 0.1)));
            cubeBody.position.set(0, 1.2, -1);
            world.addBody(cubeBody);

            // 指先21点
            const jGeo = new THREE.SphereGeometry(0.012, 12, 12);
            for (let i = 0; i < 21; i++) {
                const m = new THREE.Mesh(jGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 }));
                scene.add(m);
                tipMeshes.push(m);
                const b = new CANNON.Body({ mass: 0, material: pMat });
                b.addShape(new CANNON.Sphere(0.012));
                b.collisionFilterGroup = 1;
                b.collisionFilterMask = 2 | 0xFF;
                world.addBody(b);
                tipBodies.push(b);
            }

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const light = new THREE.PointLight(0xffffff, 1.2);
            light.position.set(2, 5, 2);
            scene.add(light);

            // --- MediaPipe & Camera ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            const videoElement = document.getElementById('input_video');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 480, height: 270 }
            });
            videoElement.srcObject = stream;
            videoElement.play();

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    const xrCamera = renderer.xr.getCamera(camera);
                    lm.forEach((point, i) => {
                        const v = new THREE.Vector3(
                            (point.x - 0.5) * 1.8, 
                            -(point.y - 0.5) * 1.4, 
                            -point.z * 2.5 - 0.6
                        ).applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        tipBodies[i].position.copy(v);
                        tipMeshes[i].position.copy(v);
                    });
                }
            });

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                hands.send({ image: videoElement });
                renderer.render(scene, camera);
            });
        }

        // iPhone風の空中UI（グラスモーフィズム）を作る関数
        function createUI() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            // パネル描画
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.roundRect(10, 10, 492, 236, 40);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = 'white';
            ctx.font = 'bold 32px -apple-system';
            ctx.fillText('Control Center', 50, 80);
            ctx.font = '20px -apple-system';
            ctx.fillText('Spatial Audio: ON', 50, 130);
            ctx.fillText('Hand Tracking: Active', 50, 170);

            const texture = new THREE.CanvasTexture(canvas);
            const plane = new THREE.Mesh(
                new THREE.PlaneGeometry(0.8, 0.4),
                new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide })
            );
            plane.position.set(0.7, 1.8, -1);
            plane.rotation.y = -0.3;
            scene.add(plane);
        }

        document.getElementById('enter-xr').addEventListener('click', () => {
            document.getElementById('overlay').style.display = 'none';
            init();
            // WebXRセッションの開始（VRButtonのクリックをシミュレート）
            const btn = document.querySelector('button[style*="position: absolute"]'); // Three.jsが生成するボタン
            if(btn) btn.click();
        });
    </script>
</body>
</html>
