<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タイマー式・アイトラッキング校正</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        
        /* 視線のドット */
        #webgazerGazeDot {
            width: 10px !important; height: 10px !important;
            background: #ff3b30 !important; border: none !important;
            z-index: 10001 !important;
        }

        /* タイマーターゲット */
        #target {
            position: absolute; width: 50px; height: 50px;
            background: none; border: 3px solid #fff; border-radius: 50%;
            transform: translate(-50%, -50%); display: none; z-index: 10000;
        }
        
        /* タイマーのプログレス（中心の点） */
        #target::after {
            content: ""; position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; background: #fff;
            border-radius: 50%; transform: translate(-50%, -50%);
        }

        #msg {
            position: fixed; width: 100%; text-align: center;
            top: 45%; font-size: 1.5rem; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="msg">カメラを起動中...</div>
<div id="target"></div>

<script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.js"></script>

<script>
    const target = document.getElementById('target');
    const msg = document.getElementById('msg');
    
    // 校正ポイント（全9箇所）
    const points = [
        {x: 10, y: 10}, {x: 50, y: 10}, {x: 90, y: 10},
        {x: 10, y: 50}, {x: 50, y: 50}, {x: 90, y: 50},
        {x: 10, y: 90}, {x: 50, y: 90}, {x: 90, y: 90}
    ];
    let currentPoint = 0;

    async function start() {
        await webgazer.setRegression('ridge').begin();
        webgazer.showVideoPreview(false).showPredictionPoints(true);
        
        msg.innerText = "ドットを目で追いかけてください";
        target.style.display = "block";
        runTimerCalibration();
    }

    function runTimerCalibration() {
        if (currentPoint >= points.length) {
            target.style.display = "none";
            msg.innerText = "校正が完了しました";
            return;
        }

        const p = points[currentPoint];
        const px = window.innerWidth * (p.x / 100);
        const py = window.innerHeight * (p.y / 100);

        // ターゲットを移動
        target.style.left = px + "px";
        target.style.top = py + "px";

        // 3秒間、その場所を学習させ続ける（50msごと）
        let ticks = 0;
        const interval = setInterval(() => {
            webgazer.recordScreenPosition(px, py);
            ticks++;
            
            // 3秒（50ms * 60回）経過したら次の点へ
            if (ticks >= 60) {
                clearInterval(interval);
                currentPoint++;
                runTimerCalibration();
            }
        }, 50);
    }

    window.onload = start;
</script>
</body>
</html>
