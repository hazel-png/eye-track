<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Advanced VR Hand Physics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #btn-start {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px; background: white; z-index: 1000; cursor: pointer;
        }
        video { display: none; }
    </style>
</head>
<body>
    <div id="btn-start">センサーとカメラを起動</div>
    <video id="input_video"></video>

    <script>
        let scene, camera, renderer, cube, handGroup;
        let isGrabbing = false;
        const joints = [];

        // 1. Three.js 初期化
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222)); // 地面（距離感のため）

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0); // 人の目線の高さ

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 掴む対象：立方体
            const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const material = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x002244 });
            cube = new THREE.Mesh(geometry, material);
            cube.position.set(0, 1.5, -0.5); // 目の前に配置
            scene.add(cube);

            const light = new THREE.PointLight(0xffffff, 1, 10);
            light.position.set(0, 2, 1);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // 手の関節（21個の小さな球体）
            handGroup = new THREE.Group();
            const jointGeo = new THREE.SphereGeometry(0.01, 8, 8);
            const jointMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for (let i = 0; i < 21; i++) {
                const s = new THREE.Mesh(jointGeo, jointMat);
                joints.push(s);
                handGroup.add(s);
            }
            scene.add(handGroup);
        }

        // 2. スマホの傾き（ジャイロ）を同期
        function initSensors() {
            window.addEventListener('deviceorientation', (event) => {
                const alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0; // z
                const beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0;   // x
                const gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0; // y
                
                // スマホの傾きをカメラに反映（VRゴーグル用）
                camera.rotation.set(beta, gamma, alpha, 'YXZ');
            });
        }

        // 3. MediaPipe 手の検知
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                
                // カメラの向きに合わせて手の座標系を回転・移動させる
                handGroup.position.copy(camera.position);
                handGroup.quaternion.copy(camera.quaternion);

                lm.forEach((point, i) => {
                    // 指の球体を配置（カメラからの相対位置）
                    joints[i].position.set(
                        (point.x - 0.5) * 1.2, 
                        -(point.y - 0.5) * 1.0, 
                        -point.z * 2 - 0.4 // 常にカメラの少し先に表示
                    );
                });

                // ピンチ判定
                const tPos = joints[4].position;
                const iPos = joints[8].position;
                const dist = tPos.distanceTo(iPos);

                if (dist < 0.05) {
                    joints[4].material.color.set(0x00ff00);
                    joints[8].material.color.set(0x00ff00);
                    
                    const grabPoint = new THREE.Vector3().addVectors(tPos, iPos).multiplyScalar(0.5);
                    // 手のローカル座標をワールド座標に変換して当たり判定
                    const worldGrabPoint = grabPoint.clone().applyMatrix4(handGroup.matrixWorld);

                    if (worldGrabPoint.distanceTo(cube.position) < 0.2) {
                        isGrabbing = true;
                        cube.position.copy(worldGrabPoint);
                    }
                } else {
                    isGrabbing = false;
                    joints.forEach(j => j.material.color.set(0xffffff));
                }
            }
        });

        // 4. ループ処理
        function animate() {
            requestAnimationFrame(animate);
            const w = window.innerWidth;
            const h = window.innerHeight;

            renderer.setScissorTest(true);
            // 左目
            renderer.setScissor(0, 0, w/2, h);
            renderer.setViewport(0, 0, w/2, h);
            renderer.render(scene, camera);
            // 右目
            renderer.setScissor(w/2, 0, w/2, h);
            renderer.setViewport(w/2, 0, w/2, h);
            renderer.render(scene, camera);
        }

        // 起動トリガー（ブラウザのセキュリティ制限解除のため）
        document.getElementById('btn-start').addEventListener('click', async () => {
            document.getElementById('btn-start').style.display = 'none';
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            initThree();
            initSensors();
            animate();
            const cam = new Camera(document.getElementById('input_video'), {
                onFrame: async () => { await hands.send({ image: document.getElementById('input_video') }); },
                width: 640, height: 480, facingMode: "environment"
            });
            cam.start();
        });
    </script>
</body>
</html>
