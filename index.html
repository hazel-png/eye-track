<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VR External Cam Hands</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7); z-index: 2000; color: white; text-align: center;
        }
        .start-btn {
            background: #fff; color: #000; border: none; padding: 15px 40px;
            border-radius: 30px; font-size: 18px; font-weight: 600; cursor: pointer;
        }
        #input_video { display: none; }
    </style>
</head>
<body>
    <div id="overlay">
        <div>
            <h1>Spatial Hands VR</h1>
            <p>1. 下のボタンでVRを開始<br>2. VR内で「パー」で2秒静止<br>3. その後「グー」をすれば完了</p>
            <button class="start-btn" id="start-btn">VRを開始</button>
        </div>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        let fingers = [];
        let calibStep = 0; // 0: 待機, 1: VR開始後パー待ち, 2: グー待ち, 3: 完了
        let stayTimer = 0;
        let maxReachZ = 0.15, openHandSize = 0;

        function getHandSize(landmarks) {
            const wrist = landmarks[0];
            const middleTip = landmarks[12];
            return Math.sqrt(Math.pow(middleTip.x - wrist.x, 2) + Math.pow(middleTip.y - wrist.y, 2));
        }

        async function init() {
            // --- Three.js & Physics Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // VRセッション開始を検知
            renderer.xr.addEventListener('sessionstart', () => {
                calibStep = 1; // VRに入ったらキャリブレーション開始
                document.getElementById('overlay').style.display = 'none';
            });

            world = new CANNON.World();
            world.gravity.set(0, -1.0, 0);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0x00ff00 }));
            cubeMesh.visible = false;
            scene.add(cubeMesh);

            cubeBody = new CANNON.Body({ mass: 1 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, 1.3, -0.4);
            world.addBody(cubeBody);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.01), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(0.01));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            // --- MediaPipe Hands (外カメラ設定) ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ 
                maxNumHands: 1, 
                modelComplexity: 1, 
                minDetectionConfidence: 0.7, 
                minTrackingConfidence: 0.7 
            });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                const xrCamera = renderer.xr.isPresenting ? renderer.xr.getCamera(camera) : camera;

                // --- キャリブレーション・ロジック ---
                if (calibStep === 1) {
                    // Step 1: パーで静止（手の色を青にする）
                    fingers.forEach(f => f.mesh.material.color.setHex(0x00aaff));
                    stayTimer++;
                    if (stayTimer > 90) { // 約1.5秒
                        maxReachZ = Math.abs(landmarks[0].z);
                        openHandSize = getHandSize(landmarks);
                        calibStep = 2;
                        stayTimer = 0;
                        if (navigator.vibrate) navigator.vibrate(100);
                    }
                } else if (calibStep === 2) {
                    // Step 2: グーを待つ（手の色を黄色にする）
                    fingers.forEach(f => f.mesh.material.color.setHex(0xffff00));
                    if (getHandSize(landmarks) < openHandSize * 0.7) {
                        calibStep = 3;
                        cubeMesh.visible = true;
                        if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                    }
                } else if (calibStep === 3) {
                    // 完了時（手の色を白にする）
                    fingers.forEach(f => f.mesh.material.color.setHex(0xffffff));
                }

                // 座標計算 & 描画
                const palmZ = (landmarks[0].z + landmarks[9].z) / 2;
                landmarks.forEach((point, i) => {
                    let constrainedZ = point.z;
                    if (i > 0) constrainedZ = Math.max(point.z, palmZ - 0.04);

                    const zScale = (Math.abs(constrainedZ) / maxReachZ) * 0.6;
                    // 外カメラ使用時は鏡像反転をさせない（point.x - 0.5 にマイナスをつけない）
                    const posX = (point.x - 0.5) * 2.0; 
                    const posY = (point.y - 0.5) * -1.5 + 1.0;
                    const posZ = -zScale - 0.3;

                    const targetPos = new THREE.Vector3(posX, posY, posZ);
                    targetPos.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);

                    fingers[i].body.position.x += (targetPos.x - fingers[i].body.position.x) * 0.4;
                    fingers[i].body.position.y += (targetPos.y - fingers[i].body.position.y) * 0.4;
                    fingers[i].body.position.z += (targetPos.z - fingers[i].body.position.z) * 0.4;
                    fingers[i].mesh.position.copy(fingers[i].body.position);
                });
            });

            const video = document.getElementById('input_video');
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", // 外カメラを指定
                width: 1280, height: 720
            });
            cameraUtils.start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                if (calibStep === 3) {
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
