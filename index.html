<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY FACE-OFF 1993</title>
    <style>
        /* 90年代風テキストフォント（なければmonospace） */
        @font-face {
            font-family: 'RetroGaming';
            src: url('https://fonts.cdnfonts.com/s/76662/PressStart2P-Regular.woff') format('woff');
        }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Press Start 2P', 'RetroGaming', monospace; color: #fff; user-select: none;}
        #container { position: absolute; inset: 0; }
        
        /* HUD (Head-Up Display) */
        #hud { 
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px; box-sizing: border-box;
            display: flex; justify-content: space-between; z-index: 100; pointer-events: none;
            text-shadow: 2px 2px #000;
        }
        .hud-val { color: #ff0; }
        #hi-score { color: #f00; text-align: center; width: 100%; position: absolute; top: 20px; left: 0;}

        /* レティクル（照準） */
        #reticle {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            border: 4px solid #f00; border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 200; pointer-events: none; box-sizing: border-box;
        }
        #reticle::before, #reticle::after {
            content: ''; position: absolute; background: #f00;
        }
        #reticle::before { top: 50%; left: -10px; width: 60px; height: 4px; transform: translateY(-50%); }
        #reticle::after { left: 50%; top: -10px; height: 60px; width: 4px; transform: translateX(-50%); }

        #webcam { display: none; }
        
        /* タイトル画面 */
        #title-screen {
            position: absolute; inset: 0; background: #000; z-index: 300;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 10px solid #00f; box-sizing: border-box;
        }
        #title-logo { font-size: 40px; color: #ff0; text-shadow: 4px 4px #f00; margin-bottom: 20px; text-align: center; }
        #start-bt {
            background: #f00; color: #fff; border: 4px solid #fff; padding: 15px 30px;
            font-family: inherit; font-size: 20px; cursor: pointer;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="hud">
        <div>SCORE: <span id="score" class="hud-val">0</span></div>
        <div id="hi-score">HI: <span class="hud-val">10000</span></div>
        <div>GAME-MODE: <span class="hud-val">FACE-AIM</span></div>
    </div>
    <div id="reticle"></div>
    <div id="container"></div>
    <video id="webcam" autoplay playsinline></video>

    <div id="title-screen">
        <div id="title-logo">GALAXY<br>FACE-OFF<br>1993</div>
        <div style="font-size:10px; margin-bottom:30px; color:#aaa;">MOVE FACE TO AIM & DODGE</div>
        <button id="start-bt">PRESS START</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // --- ゲーム定数 ---
        const GAME_SPEED = 0.2;
        const ENEMY_SPAWN_RATE = 0.02; // 毎フレームの生成確率
        const FIRE_RATE = 150; // 連射速度(ms)

        let scene, camera, renderer, faceLandmarker;
        const video = document.getElementById('webcam');
        const hudScore = document.getElementById('score');
        
        // ゲーム状態
        let gameState = 'TITLE';
        let score = 0;
        let lastFireTime = 0;
        const enemies = [];
        const bullets = [];
        const particles = []; // 爆発

        // 90s風爆発テクスチャ（ドット絵風のアニメーション画像）
        // ※本来は画像ファイルが必要ですが、ここではTHREE.jsのCanvasTextureで代用
        const createExplosionTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            // 黄色と赤のドット爆発
            ctx.fillStyle = '#ff0'; ctx.fillRect(8, 8, 16, 16);
            ctx.fillStyle = '#f00'; ctx.fillRect(12, 12, 8, 8);
            ctx.fillStyle = '#fff'; ctx.fillRect(14, 14, 4, 4);
            return new THREE.CanvasTexture(canvas);
        };
        const explosionTexture = createExplosionTexture();

        // 物理パラメータ（直接レスポンス・ゴム感なし）
        const physics = {
            shipPos: new THREE.Vector3(0, -4, 0), // 自機画面内移動
            aimRot: new THREE.Vector2(0, 0),    // 照準（カメラ角度）
            velP: new THREE.Vector3(), velR: new THREE.Vector2(),
            stiffness: 0.5, damping: 0.4 // キビキビ動く設定
        };

        // --- ゲームオブジェクト群 ---
        let playerShip, targetPoint, raycaster;

        async function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000033, 20, 50); // ネイビーの霧
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: false }); // レトロにするためアンチエイリアスOFF
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(1); // 解像度をあえて荒く
            document.getElementById('container').appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster(); // 照準用

            // 1. 宇宙環境
            // スターフィールド（点ではなく、粗いポリゴンの星）
            for (let i = 0; i < 200; i++) {
                const star = new THREE.Mesh(
                    new THREE.BoxGeometry(0.1, 0.1, 0.1),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                star.position.set((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
                scene.add(star);
            }

            // 2. 自機（ローポリゴン・Star Fox風）
            const shipGeometry = new THREE.ConeGeometry(0.5, 2, 4); // 4角錐
            shipGeometry.rotateX(Math.PI / 2); // 前を向ける
            const shipMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: false });
            // 90sフラットシェーディング効果（MeshLambert + FlatShadingが正解だがBasicで単純化）
            playerShip = new THREE.Mesh(shipGeometry, shipMaterial);
            playerShip.position.copy(physics.shipPos);
            scene.add(playerShip);

            // 照準のターゲット点（画面奥）
            targetPoint = new THREE.Object3D();
            targetPoint.position.set(0, 0, -20);
            scene.add(targetPoint);

            await setupTracking();
            // animateはスタートボタン押下後に開始
        }

        // --- ゲームロジック ---

        // 敵機の生成（ローポリ・悪役カラー）
        function spawnEnemy() {
            const geometry = new THREE.OctahedronGeometry(1, 0); // 8面体（カクカク）
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: false });
            const enemy = new THREE.Mesh(geometry, material);
            // 画面奥のランダム位置
            enemy.position.set((Math.random()-0.5)*30, (Math.random()-0.5)*20, -50);
            scene.add(enemy);
            enemies.push(enemy);
        }

        // ビーム発射（赤い線）
        function fireBeam() {
            const geometry = new THREE.BoxGeometry(0.1, 0.1, 5);
            const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const beam = new THREE.Mesh(geometry, material);
            // 自機の位置から発射
            beam.position.copy(playerShip.position);
            // 照準の方向へ向ける
            beam.lookAt(raycaster.ray.direction.clone().multiplyScalar(100).add(camera.position));
            scene.add(beam);
            bullets.push(beam);
        }

        // 爆発エフェクト（90s風ドットスプライト）
        function createExplosion(pos) {
            const material = new THREE.PointsMaterial({
                size: 2, color: 0xffffff, map: explosionTexture, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });
            const points = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute([0,0,0], 3)), material);
            points.position.copy(pos);
            scene.add(points);
            particles.push({ mesh: points, life: 1.0 }); // Life 1.0 -> 0.0で消滅
        }

        // --- メインループ ---
        function animate() {
            if (gameState !== 'PLAYING') return; // タイトル画面中は動かさない
            requestAnimationFrame(animate);

            // 1. 物理シミュレーション（キビキビ追従）
            // 自機位置
            let forceP = new THREE.Vector3().subVectors(targetPos, physics.pos).multiplyScalar(physics.stiffness);
            physics.vel velP.add(forceP).multiplyScalar(physics.damping);
            physics.pos shipPos.add(physics.vel velP);
            
            // 照準角度
            let forceR = new THREE.Vector2().subVectors(targetRot, physics.rot aimRot).multiplyScalar(physics.stiffness);
            physics.vel rotVel.add(forceR).multiplyScalar(physics.damping);
            physics.rot aimRot.add(physics.vel rotVel);

            // 2. カメラと自機の更新
            camera.rotation.set(physics.rot aimRot.x, physics.rot aimRot.y, 0, 'XYZ');
            
            // 自機は画面下部に固定しつつ、顔の動きで少し左右上下に動かす（覗き込み）
            playerShip.position.set(physics.pos shipPos.x * 0.2, -4 + physics.pos shipPos.y * 0.1, 0);

            // 照準レイキャスターの更新（画面中央固定）
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            // 3. ゲーム・アルゴリズム
            // 敵生成
            if (Math.random() < ENEMY_SPAWN_RATE) spawnEnemy();

            // 敵の移動と照準チェック
            raycaster.far = 60; // 照準の届く距離
            const aimIntersects = raycaster.intersectObjects(enemies);
            const isAimingEnemy = aimIntersects.length > 0;
            
            // レティクルの色を変える（90s風演出）
            document.getElementById('reticle').style.borderColor = isAimingEnemy ? '#ff0' : '#f00';
            document.getElementById('reticle').style.opacity = isAimingEnemy ? 1 : 0.7;

            // オートショット（照準が合っていて連射時間が過ぎていたら）
            const now = performance.now();
            if (isAimingEnemy && now - lastFireTime > FIRE_RATE) {
                fireBeam();
                lastFireTime = now;
            }

            // 敵の更新（直進、消滅）
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].position.z += GAME_SPEED * 2; // 手前に進む
                // 画面外（カメラの後ろ）に行ったら消滅
                if (enemies[i].position.z > 5) {
                    scene.remove(enemies[i]);
                    enemies.splice(i, 1);
                }
            }

            // 弾の更新（直進、ヒット判定）
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].translateZ(-GAME_SPEED * 10); // 奥へ進む
                
                // 敵とのコリジョン（90s的な単純な距離判定）
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (bullets[i].position.distanceTo(enemies[j].position) < 1.5) {
                        // ヒット！
                        createExplosion(enemies[j].position);
                        scene.remove(enemies[j]); scene.remove(bullets[i]);
                        enemies.splice(j, 1); bullets.splice(i, 1);
                        score += 100; hudScore.innerText = score;
                        break; // この弾の処理は終了
                    }
                }
                // 画面奥に行ったら消滅
                if (bullets[i] && bullets[i].position.z < -60) {
                    scene.remove(bullets[i]); bullets.splice(i, 1);
                }
            }

            // 爆発アニメーション（lifeを減らして消滅）
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].life -= 0.1; // 10フレームで消滅
                particles[i].mesh.material.size = particles[i].life * 4; // 段々小さく
                if (particles[i].life <= 0) {
                    scene.remove(particles[i].mesh); particles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // --- トラッキング設定 ---
        // predict内で更新するターゲット値
        let targetPos = new THREE.Vector3(0,0,0);
        let targetRot = new THREE.Vector2(0,0);

        async function setupTracking() {
            const res = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(res, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = stream;
            video.onloadedmetadata = () => { video.play(); predict(); };
        }

        function predict() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const lm = results.faceLandmarks[0];
                    const headX = (lm[234].x + lm[454].x) / 2;
                    const headY = (lm[234].y + lm[454].y) / 2;
                    const faceWidth = Math.abs(lm[454].x - lm[234].x);

                    // 1. 位置移動（控えめ・リアルスケール）
                    targetPos.x = (0.5 - headX) * 10; 
                    targetPos.y = (0.5 - headY) * 6;
                    // 2. 照準角度（ Yaw/Pitch・感度高め）
                    targetRot.y = (lm[1].x - headX) * 7.0; 
                    targetRot.x = (headY - lm[1].y) * 5.5;
                }
            }
            requestAnimationFrame(predict);
        }

        // --- UIイベント ---
        document.getElementById('start-bt').addEventListener('click', () => {
            document.getElementById('title-screen').style.display = 'none';
            gameState = 'PLAYING';
            // ゲームループ開始
            animate();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
