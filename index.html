<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Hand Tracking - External Cam</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body style="margin: 0; background: #000;">
    <video id="input_video" style="display:none;" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        let fingers = [];
        let calibStep = 0; // 0: 待機, 1: VR開始&パー待ち, 2: グー待ち, 3: 完了
        let stayTimer = 0;
        let maxReachZ = 0.15, openHandSize = 0;

        function getHandSize(landmarks) {
            const wrist = landmarks[0];
            const middleTip = landmarks[12];
            return Math.sqrt(Math.pow(middleTip.x - wrist.x, 2) + Math.pow(middleTip.y - wrist.y, 2));
        }

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // VRボタンを設置（VRを装着する前にこれをタップ）
            const vrBtn = VRButton.createButton(renderer);
            document.body.appendChild(vrBtn);

            // 【重要】VRモードに入った瞬間にキャリブレーションを開始
            renderer.xr.addEventListener('sessionstart', () => {
                calibStep = 1;
                console.log("VR Session Started - Starting Calibration");
            });

            // 物理エンジンの設定
            world = new CANNON.World();
            world.gravity.set(0, -1.5, 0);

            // ターゲットオブジェクト（キャリブレーション後に現れる）
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.12), new THREE.MeshStandardMaterial({ color: 0x00ff88 }));
            cubeMesh.visible = false;
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 1 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.06, 0.06, 0.06)));
            cubeBody.position.set(0, 1.4, -0.4);
            world.addBody(cubeBody);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));

            // 手のジョイント（21個）
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.01), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(0.01));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            // MediaPipe Hands (外カメラ environment 指定)
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                
                // VRモード時は左右それぞれの目の中間地点を取得
                const xrCamera = renderer.xr.isPresenting ? renderer.xr.getCamera(camera) : camera;

                // --- VR内の状態変化フィードバック ---
                if (calibStep === 1) {
                    // 青：パーで止まって（位置測定中）
                    fingers.forEach(f => f.mesh.material.color.setHex(0x00aaff));
                    stayTimer++;
                    if (stayTimer > 100) {
                        maxReachZ = Math.abs(landmarks[0].z);
                        openHandSize = getHandSize(landmarks);
                        calibStep = 2;
                        if (navigator.vibrate) navigator.vibrate(100);
                    }
                } else if (calibStep === 2) {
                    // 黄：グーにして（握り測定中）
                    fingers.forEach(f => f.mesh.material.color.setHex(0xffff00));
                    if (getHandSize(landmarks) < openHandSize * 0.75) {
                        calibStep = 3;
                        cubeMesh.visible = true;
                        if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                    }
                } else {
                    // 白：準備完了
                    fingers.forEach(f => f.mesh.material.color.setHex(0xffffff));
                }

                // 座標計算
                const palmZ = (landmarks[0].z + landmarks[9].z) / 2;
                landmarks.forEach((point, i) => {
                    let cZ = Math.max(point.z, palmZ - 0.04); // Zクランプ
                    const zScale = (Math.abs(cZ) / maxReachZ) * 0.5;
                    
                    // 外カメラなので X は反転させない
                    const posX = (point.x - 0.5) * 2.2; 
                    const posY = (point.y - 0.5) * -1.8 + 1.2;
                    const posZ = -zScale - 0.3;

                    const targetPos = new THREE.Vector3(posX, posY, posZ);
                    // VRヘッドセットの向きに合わせて手の位置を回転
                    targetPos.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);

                    fingers[i].body.position.set(targetPos.x, targetPos.y, targetPos.z);
                    fingers[i].mesh.position.copy(fingers[i].body.position);
                });
            });

            const video = document.getElementById('input_video');
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", // 外カメラ
                width: 1280, height: 720
            });
            cameraUtils.start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                if (calibStep === 3) {
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }

        init();
    </script>
</body>
</html>
