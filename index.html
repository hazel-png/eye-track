<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spatial Studio - White Mist AR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: -apple-system, sans-serif; }
        video { display: none; }
        #gui-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.9); z-index: 9999;
        }
        .btn-google {
            background: #4285F4; color: white; border: none; padding: 18px 40px;
            border-radius: 30px; font-size: 18px; font-weight: 500; cursor: pointer;
            box-shadow: 0 2px 8px rgba(66,133,244,0.4);
        }
    </style>
</head>
<body>
    <div id="gui-container">
        <h1 style="color: #3c4043; font-size: 24px;">Spatial Studio AR</h1>
        <button class="btn-google" id="spatial-start-btn">ARセッションを開始</button>
        <p style="color: #70757a; margin-top: 20px;">※カメラとARの許可が必要です</p>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { ARButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const fingers = [];
        const _v = new THREE.Vector3();

        async function startExperience() {
            document.getElementById('gui-container').style.display = 'none';

            // --- Scene & Renderer ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // --- 視覚効果：白い霧のカバー ---
            // カメラのすぐ前(0.02m)に半透明の白い平面を置く
            const mistGeo = new THREE.PlaneGeometry(10, 10);
            const mistMat = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.15, // ここで白さを調整
                depthWrite: false 
            });
            const mistMesh = new THREE.Mesh(mistGeo, mistMat);
            mistMesh.position.z = -0.05; 
            camera.add(mistMesh);
            scene.add(camera); // カメラをシーンに追加して追従させる

            // --- Physics ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const mat = new CANNON.Material();
            world.addContactMaterial(new CANNON.ContactMaterial(mat, mat, { friction: 0.7, restitution: 0.1 }));

            // --- Desk & Cube ---
            const deskH = 1.3;
            const deskMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.04, 0.4),
                new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 })
            );
            deskMesh.position.set(0, deskH, -0.5);
            scene.add(deskMesh);

            const deskBody = new CANNON.Body({ mass: 0 });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.4, 0.02, 0.2)));
            deskBody.position.copy(deskMesh.position);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.12), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.3, material: mat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.06, 0.06, 0.06)));
            cubeBody.position.set(0, deskH + 0.4, -0.5);
            world.addBody(cubeBody);

            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.015, 12, 12), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0 });
                body.addShape(new CANNON.Sphere(0.015));
                world.addBody(body);
                fingers.push({ mesh, body });
            }
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));

            // --- WebXR ---
            try {
                const session = await navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['local-floor'] });
                await renderer.xr.setSession(session);
            } catch(e) {
                alert("ARを起動できませんでした。HTTPS環境か確認してください。");
            }

            // --- Tracking ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const xrCamera = renderer.xr.getCamera(camera);
                results.multiHandLandmarks[0].forEach((point, i) => {
                    _v.set((point.x - 0.5) * 1.15, -(point.y - 0.5) * 1.15, -point.z * 1.3 - 0.2);
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    fingers[i].body.position.set(_v.x, _v.y, _v.z);
                    fingers[i].mesh.position.copy(fingers[i].body.position);
                });
            });

            const video = document.getElementById('input_video');
            new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                width: 1280, height: 720
            }).start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        // 安全なイベント登録
        window.addEventListener('load', () => {
            const btn = document.getElementById('spatial-start-btn');
            if(btn) btn.onclick = startExperience;
        });
    </script>
</body>
</html>
