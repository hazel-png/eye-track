<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Physics of Sound</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --cyan: #00f2ff; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column;
            align-items: center; min-height: 100vh; touch-action: none;
        }
        .ui-panel {
            margin-top: 20px; background: #0a0a0a; border: 1px solid #222;
            padding: 20px; border-radius: 20px; box-shadow: 0 0 40px rgba(0,0,0,1);
        }
        .grid {
            position: relative; width: 300px; height: 300px; background: #050505;
            border: 1px solid #333; overflow: hidden; margin: 10px 0;
        }
        .mesh {
            position: absolute; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(212,175,55,0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(212,175,55,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .node {
            position: absolute; width: 16px; height: 16px; background: var(--gold);
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--gold); z-index: 10;
        }
        .head {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: var(--cyan); border-radius: 50%; transform: translate(-50%, -50%);
        }
        .status { font-family: monospace; font-size: 0.65rem; color: var(--gold); margin-bottom: 10px; }
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        button, label {
            font-size: 0.6rem; border: 1px solid #444; color: #888;
            padding: 8px 15px; border-radius: 5px; cursor: pointer; background: none;
        }
    </style>
</head>
<body>

<div class="ui-panel">
    <div class="status" id="readout">PHYSICS ENGINE: READY</div>
    
    <div class="grid" id="gridXZ">
        <div class="mesh"></div>
        <div class="head"></div>
        <div id="nodeXZ" class="node" style="top:50%; left:50%;"></div>
    </div>

    <div class="grid" id="gridY" style="height: 100px;">
        <div class="mesh"></div>
        <div class="head"></div>
        <div id="nodeY" class="node" style="top:50%; left:50%;"></div>
    </div>

    <div class="controls">
        <label for="file">LOAD SOURCE</label>
        <input type="file" id="file" hidden accept="audio/*">
        <button onclick="resetPos()">RESET POS</button>
    </div>
</div>

<script>
    let audioCtx, panner, source, mainFilter, rearFilter, reverbNode;
    let coord = { x: 0, y: 0, z: 0 };

    async function setupAudio(file) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 1. Panner (ドップラー効果を有効にするためPanningModelをHRTFに)
        panner = audioCtx.createPanner();
        panner.panningModel = 'HRTF';
        panner.distanceModel = 'inverse';

        // 2. メインフィルタ（距離減衰用）
        mainFilter = audioCtx.createBiquadFilter();
        mainFilter.type = 'lowpass';

        // 3. リアフィルタ（後ろに回った時の遮蔽用）
        rearFilter = audioCtx.createBiquadFilter();
        rearFilter.type = 'peaking';
        rearFilter.frequency.value = 10000; // 10kHz付近
        rearFilter.Q.value = 1;

        // 4. ルームアコースティクス (簡易リバーブ)
        reverbNode = audioCtx.createConvolver();
        const duration = 1.5; // 1.5秒の残響
        const rate = audioCtx.sampleRate;
        const length = rate * duration;
        const impulse = audioCtx.createBuffer(2, length, rate);
        for (let i = 0; i < 2; i++) {
            let channelData = impulse.getChannelData(i);
            for (let j = 0; j < length; j++) {
                channelData[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, 2);
            }
        }
        reverbNode.buffer = impulse;

        const buffer = await file.arrayBuffer();
        const audioData = await audioCtx.decodeAudioData(buffer);
        
        source = audioCtx.createBufferSource();
        source.buffer = audioData;
        source.loop = true;

        // 接続経路: Source -> MainFilter -> RearFilter -> Panner -> Destination
        // 同時に Source -> Reverb -> Destination (ウェット音)
        const reverbGain = audioCtx.createGain();
        reverbGain.gain.value = 0.15; // 残響の強さ

        source.connect(mainFilter);
        mainFilter.connect(rearFilter);
        rearFilter.connect(panner);
        panner.connect(audioCtx.destination);

        source.connect(reverbNode);
        reverbNode.connect(reverbGain);
        reverbGain.connect(audioCtx.destination);

        source.start();
        render();
    }

    function render() {
        if (!panner) return;
        const now = audioCtx.currentTime;
        const scale = 30;
        
        const rx = coord.x * scale;
        const ry = coord.y * scale;
        const rz = coord.z * scale;

        // ドップラー効果を狙うため少し速めに追従 (0.05s)
        panner.positionX.setTargetAtTime(rx, now, 0.05);
        panner.positionY.setTargetAtTime(ry, now, 0.05);
        panner.positionZ.setTargetAtTime(rz, now, 0.05);

        // 距離による高域減衰 (空気吸収)
        const dist = Math.sqrt(rx*rx + ry*ry + rz*rz);
        mainFilter.frequency.setTargetAtTime(Math.max(1000, 20000 - dist * 500), now, 0.1);

        // 【新】耳の裏側の再現
        // 真後ろ(Z > 0)にいくほど 10kHz をカットする
        const rearIntensity = Math.max(0, Math.min(1, rz / 10)); 
        rearFilter.gain.setTargetAtTime(rearIntensity * -15, now, 0.1);

        // UI更新
        document.getElementById('nodeXZ').style.left = ((coord.x+1)/2*100)+'%';
        document.getElementById('nodeXZ').style.top = ((coord.z+1)/2*100)+'%';
        document.getElementById('nodeY').style.left = ((coord.x+1)/2*100)+'%';
        document.getElementById('nodeY').style.top = ((-coord.y+1)/2*100)+'%';
        
        document.getElementById('readout').innerText = `X:${rx.toFixed(1)} Y:${ry.toFixed(1)} Z:${rz.toFixed(1)} | DOPPLER: ON`;
        requestAnimationFrame(render);
    }

    function handleInput(id, type) {
        const grid = document.getElementById(id);
        let active = false;
        const update = (e) => {
            if(!active) return;
            const r = grid.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            const nx = (t.clientX - r.left) / r.width * 2 - 1;
            const ny = (t.clientY - r.top) / r.height * 2 - 1;
            coord.x = Math.max(-1, Math.min(1, nx));
            if(type === 'XZ') coord.z = Math.max(-1, Math.min(1, ny));
            else coord.y = -Math.max(-1, Math.min(1, ny));
        };
        grid.onmousedown = grid.ontouchstart = () => { active = true; audioCtx?.resume(); };
        window.onmousemove = window.ontouchmove = update;
        window.onmouseup = window.ontouchend = () => active = false;
    }

    handleInput('gridXZ', 'XZ');
    handleInput('gridY', 'Y');
    document.getElementById('file').onchange = (e) => setupAudio(e.target.files[0]);
    function resetPos() { coord = {x:0, y:0, z:0}; }
</script>
</body>
</html>
