<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Spatial Immersion Engine - Ultra Real</title>
    <style>
        body { margin: 0; background: #000; color: #00d4ff; font-family: 'Courier New', monospace; overflow: hidden; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; box-sizing: border-box; z-index: 10; }
        .ui-bottom { display: flex; justify-content: center; align-items: center; gap: 20px; pointer-events: auto; background: rgba(5,5,20,0.95); padding: 25px; border-radius: 60px; border: 1px solid #00d4ff; box-shadow: 0 0 30px rgba(0,212,255,0.2); }
        .btn { cursor: pointer; padding: 15px 30px; background: #00d4ff; border: none; color: #000; border-radius: 40px; font-weight: bold; transition: 0.3s; letter-spacing: 1px; }
        .btn:hover { background: #fff; transform: scale(1.05); }
        .btn:disabled { background: #222; color: #555; cursor: not-allowed; }
        #status-panel { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 20px; border-left: 4px solid #ff0055; pointer-events: none; border-radius: 0 10px 10px 0; }
        .stat-item { margin-bottom: 5px; font-size: 13px; }
        #webcam { display: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>

    <div id="status-panel">
        <div class="stat-item">SYSTEM: <span id="sys-stat" style="color:#fff">BOOTING...</span></div>
        <div class="stat-item">TRACKING: <span id="track-stat" style="color:#ff0055">WAITING...</span></div>
        <div class="stat-item">ITD/HRTF: <span id="hrtf-stat" style="color:#00ff88">ACTIVE</span></div>
        <div class="stat-item" style="font-size: 10px; color: #666; margin-top: 10px;">ORIENTATION (P, Y, R)</div>
        <div id="rot-stat" style="color:#00d4ff">0.00, 0.00, 0.00</div>
    </div>

    <div id="overlay">
        <div style="text-align: center;">
            <h1 style="letter-spacing: 12px; margin: 0; text-shadow: 0 0 20px #00d4ff;">SPATIAL IMMERSION</h1>
            <p style="color: #666; font-size: 12px; margin-top: 10px;">AI-Driven Head Tracking & Acoustic Physics</p>
        </div>
        
        <div class="ui-bottom">
            <label class="btn">1. LOAD AUDIO<input type="file" id="fileInput" accept="audio/*"></label>
            <button id="playBtn" class="btn" disabled>2. START ENGINE</button>
            <div style="font-size: 10px; text-align: center; min-width: 100px;">
                REVERB MIX<br>
                <input type="range" id="reverbMix" min="0" max="0.8" step="0.01" value="0.4" style="width: 100%;">
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DragControls } from 'three/addons/controls/DragControls.js';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let scene, camera, renderer, audio, listener, headGroup, mesh, faceLandmarker;
        let reverbNode, wetGain, dryGain, filterNode, analyser;
        const video = document.getElementById('webcam');
        const sysStat = document.getElementById('sys-stat');
        const trackStat = document.getElementById('track-stat');
        const rotStat = document.getElementById('rot-stat');

        // --- 1. AI Tracking ---
        async function setupTracking() {
            try {
                const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: { 
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO",
                    numFaces: 1
                });
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadeddata = () => {
                    sysStat.innerText = "ONLINE";
                    predictFace();
                };
            } catch (e) {
                sysStat.innerText = "HARDWARE ERROR";
                console.error(e);
            }
        }

        async function predictFace() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    trackStat.innerText = "LOCKED";
                    const lm = results.faceLandmarks[0];
                    
                    const nose = lm[1];
                    const leftEye = lm[33];
                    const rightEye = lm[263];

                    // より滑らかな追跡のためのマッピング
                    const yaw = (nose.x - (leftEye.x + rightEye.x) / 2) * 4;
                    const pitch = (nose.y - (leftEye.y + rightEye.y) / 2) * 4;
                    const roll = Math.atan2(rightEye.y - leftEye.y, rightEye.x - leftEye.x);

                    // リスナーの回転を更新
                    headGroup.rotation.set(pitch, -yaw, -roll);
                    rotStat.innerText = `${pitch.toFixed(2)}, ${yaw.toFixed(2)}, ${roll.toFixed(2)}`;
                } else {
                    trackStat.innerText = "SEARCHING...";
                }
            }
            requestAnimationFrame(predictFace);
        }

        // --- 2. Audio & Scene ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010103);
            scene.fog = new THREE.FogExp2(0x010103, 0.05);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const grid = new THREE.GridHelper(200, 80, 0x00d4ff, 0x030308);
            scene.add(grid);

            headGroup = new THREE.Group();
            const headMesh = new THREE.Mesh(
                new THREE.IcosahedronGeometry(0.5, 2),
                new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true })
            );
            headGroup.add(headMesh);
            scene.add(headGroup);

            listener = new THREE.AudioListener();
            headGroup.add(listener);

            mesh = new THREE.Mesh(
                new THREE.SphereGeometry(1.2, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0xff0055, emissiveIntensity: 5 })
            );
            mesh.position.set(0, 2, -15);
            scene.add(mesh);
            mesh.add(new THREE.PointLight(0xff0055, 200, 30));
            scene.add(new THREE.AmbientLight(0x101015));

            // HRTF Panner設定
            audio = new THREE.PositionalAudio(listener);
            audio.setRefDistance(0.5);
            audio.setRolloffFactor(4.0); // 減衰を鋭く
            audio.setDistanceModel('exponential');
            
            // HRTFを強制
            const panner = audio.panner;
            panner.panningModel = 'HRTF';
            
            mesh.add(audio);

            const ctx = listener.context;
            filterNode = ctx.createBiquadFilter();
            filterNode.type = 'lowpass';
            
            reverbNode = ctx.createConvolver();
            const irLen = ctx.sampleRate * 3.5;
            const irBuf = ctx.createBuffer(2, irLen, ctx.sampleRate);
            for(let c=0; c<2; c++) {
                const d = irBuf.getChannelData(c);
                for(let i=0; i<irLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/irLen, 2.5);
            }
            reverbNode.buffer = irBuf;

            dryGain = ctx.createGain();
            wetGain = ctx.createGain();
            wetGain.gain.value = 0.4;

            // ルーティング
            setTimeout(() => {
                panner.disconnect();
                panner.connect(filterNode);
                filterNode.connect(dryGain);
                dryGain.connect(ctx.destination);
                filterNode.connect(reverbNode);
                reverbNode.connect(wetGain);
                wetGain.connect(ctx.destination);
            }, 500);

            analyser = new THREE.AudioAnalyser(audio, 64);

            const oControls = new OrbitControls(camera, renderer.domElement);
            oControls.enableDamping = true;
            const dControls = new DragControls([mesh], camera, renderer.domElement);
            dControls.addEventListener('dragstart', () => oControls.enabled = false);
            dControls.addEventListener('dragend', () => oControls.enabled = true);

            setupTracking();
        }

        init();

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            new THREE.AudioLoader().load(url, (buffer) => {
                audio.setBuffer(buffer);
                audio.setLoop(true);
                document.getElementById('playBtn').disabled = false;
            });
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            if (audio.context.state === 'suspended') audio.context.resume();
            audio.isPlaying ? audio.pause() : audio.play();
            document.getElementById('playBtn').innerText = audio.isPlaying ? "PAUSE ENGINE" : "RESUME ENGINE";
        });

        document.getElementById('reverbMix').addEventListener('input', (e) => {
            wetGain.gain.setTargetAtTime(e.target.value, audio.context.currentTime, 0.1);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (audio && audio.isPlaying) {
                const level = analyser.getAverageFrequency() / 255;
                mesh.scale.setScalar(1 + level * 0.4);

                // --- 高度な物理シミュレーション ---
                const dist = mesh.position.length();
                
                // 1. リスナーの正面ベクトルと音源へのベクトルの角度を計算
                const headDir = new THREE.Vector3(0, 0, -1).applyQuaternion(headGroup.quaternion);
                const sourceDir = mesh.position.clone().normalize();
                const dot = headDir.dot(sourceDir); // 1.0(正面) ~ -1.0(真後ろ)

                // 2. 角度による音質の変化（背後を向くと音がこもる）
                const angleDamping = THREE.MathUtils.lerp(0.6, 1.0, (dot + 1) / 2);
                const freq = Math.max(200, (20000 - (dist * 1200)) * angleDamping);
                
                filterNode.frequency.setTargetAtTime(freq, audio.context.currentTime, 0.1);

                // 3. 距離によるDry/Wet比の自動調整（遠いほどリバーブ成分が勝つ）
                const dynamicDry = Math.max(0, 1 - (dist / 25));
                dryGain.gain.setTargetAtTime(dynamicDry, audio.context.currentTime, 0.1);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
