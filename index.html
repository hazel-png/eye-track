<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fixed Spatial Studio AR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: sans-serif; }
        video { display: none; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.9); z-index: 10000;
        }
        .btn {
            background: #4285F4; color: white; border: none; padding: 18px 40px;
            border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <button class="btn" id="btn-start">ARセッションを開始</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        let scene, camera, renderer, world, cubeMesh, cubeBody;
        let xrActive = false; // ARが有効かどうかのフラグ
        const fingers = [];
        const _v = new THREE.Vector3();

        async function init() {
            const btn = document.getElementById('btn-start');
            if(!btn) return;

            // 1. Scene & Renderer Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 2. Mist Effect (カメラの直前に白い板を固定)
            const mist = new THREE.Mesh(
                new THREE.PlaneGeometry(10, 10),
                new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15, depthWrite: false })
            );
            mist.position.z = -0.05;
            camera.add(mist);
            scene.add(camera);

            // 3. Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const mat = new CANNON.Material();
            world.addContactMaterial(new CANNON.ContactMaterial(mat, mat, { friction: 0.7, restitution: 0.1 }));

            // Objects
            const deskH = 1.3;
            const deskMesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.04, 0.4), new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
            deskMesh.position.set(0, deskH, -0.5);
            scene.add(deskMesh);
            const deskBody = new CANNON.Body({ mass: 0 });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.4, 0.02, 0.2)));
            deskBody.position.copy(deskMesh.position);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.12), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.3, material: mat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.06, 0.06, 0.06)));
            cubeBody.position.set(0, deskH + 0.5, -0.5);
            world.addBody(cubeBody);

            for (let i = 0; i < 21; i++) {
                const f = new THREE.Mesh(new THREE.SphereGeometry(0.015), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(f);
                const b = new CANNON.Body({ mass: 0 });
                b.addShape(new CANNON.Sphere(0.015));
                world.addBody(b);
                fingers.push({ mesh: f, body: b });
            }
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));

            // 4. WebXR Session (ここを確実に待つ)
            try {
                const session = await navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['local-floor'] });
                await renderer.xr.setSession(session);
                xrActive = true; // セッションが確立されたらフラグを立てる
                document.getElementById('overlay').remove();
            } catch (e) {
                console.error(e);
                alert("AR開始に失敗。HTTPS環境を確認してください。");
                return;
            }

            // 5. MediaPipe (ARが動いてから開始)
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

            hands.onResults((results) => {
                if (!xrActive || !results.multiHandLandmarks?.length) return;
                const xrCamera = renderer.xr.getCamera(camera);
                results.multiHandLandmarks[0].forEach((point, i) => {
                    _v.set((point.x - 0.5) * 1.15, -(point.y - 0.5) * 1.15, -point.z * 1.3 - 0.2);
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    fingers[i].body.position.set(_v.x, _v.y, _v.z);
                    fingers[i].mesh.position.copy(fingers[i].body.position);
                });
            });

            const video = document.getElementById('input_video');
            const camHelper = new Camera(video, {
                onFrame: async () => { if(xrActive) await hands.send({ image: video }); },
                width: 1280, height: 720
            });
            camHelper.start();

            renderer.setAnimationLoop(() => {
                if (!xrActive) return;
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        window.onload = () => {
            const btn = document.getElementById('btn-start');
            if(btn) btn.addEventListener('click', init);
        };
    </script>
</body>
</html>
