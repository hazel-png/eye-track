<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definitive Spatial Engine | Ear-Line Centroid</title>
    <style>
        :root { --accent: #00f2ff; --bg: #05050a; --glass: rgba(10, 10, 25, 0.9); }
        body { margin: 0; background: var(--bg); color: var(--accent); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 40px; box-sizing: border-box; 
        }
        #status-panel { 
            background: var(--glass); backdrop-filter: blur(15px); padding: 15px; 
            border-left: 3px solid var(--accent); font-size: 11px;
            pointer-events: none; border-radius: 0 10px 10px 0; width: 220px;
        }
        .ui-bottom { 
            display: flex; justify-content: center; align-items: center; gap: 20px; 
            pointer-events: auto; background: var(--glass); padding: 20px 40px; 
            border-radius: 100px; border: 1px solid rgba(0, 242, 255, 0.2);
        }
        .btn { 
            cursor: pointer; padding: 10px 30px; background: transparent; 
            border: 2px solid var(--accent); color: var(--accent); border-radius: 30px; 
            font-weight: bold; transition: 0.3s; text-transform: uppercase;
        }
        .btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }
        .btn:disabled { opacity: 0.2; }
        #webcam { display: none; }
        .stat-val { color: #fff; float: right; }
    </style>
</head>
<body>

    <div id="container"></div>
    <video id="webcam" autoplay playsinline></video>

    <div id="status-panel">
        <div style="margin-bottom: 8px; font-weight: bold; color: #ff00f2;">EAR-LINE STABILIZED</div>
        <div>TRACKING: <span id="track-stat" class="stat-val">INIT...</span></div>
        <div>X-POS: <span id="pos-x" class="stat-val">0.0</span></div>
        <div>YAW: <span id="rot-y" class="stat-val">0.0</span></div>
    </div>

    <div id="overlay">
        <div style="text-align: center;">
            <h1 style="letter-spacing: 12px; margin: 0; font-weight: 200;">SPATIAL CORE</h1>
            <p style="opacity: 0.5; font-size: 10px;">EAR-AXIS ROTATION FILTERING</p>
        </div>
        <div class="ui-bottom">
            <label class="btn">Load Audio<input type="file" id="fileInput" accept="audio/*" style="display:none;"></label>
            <button id="playBtn" class="btn" disabled>Start Engine</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DragControls } from 'three/addons/controls/DragControls.js';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let scene, camera, renderer, audio, listener, headGroup, coreMesh, faceLandmarker, orbit;
        let filterNode, reverbNode, analyser;
        const video = document.getElementById('webcam');

        // --- 安定化パラメータ ---
        const LERP_POS = 0.03; // 位置追従（さらに重くして固定感を出す）
        const LERP_ROT = 0.12; // 回転追従（キビキビ反応させる）
        
        // 234: 右耳付近, 454: 左耳付近 (これらの平均を「頭の回転軸」にする)
        const earIndices = [234, 454]; 

        async function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x05050a, 0.02);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('container').appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(200, 50, 0x00f2ff, 0x050515));

            headGroup = new THREE.Group();
            const headMesh = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 1.5, 0.8),
                new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true })
            );
            headGroup.add(headMesh);
            scene.add(headGroup);

            listener = new THREE.AudioListener();
            headGroup.add(listener);

            coreMesh = new THREE.Mesh(
                new THREE.IcosahedronGeometry(2, 1),
                new THREE.MeshStandardMaterial({ color: 0x00f2ff, wireframe: true, emissive: 0x00f2ff, emissiveIntensity: 2 })
            );
            coreMesh.position.set(0, 3, -10);
            scene.add(coreMesh);
            coreMesh.add(new THREE.PointLight(0x00f2ff, 60, 40));
            scene.add(new THREE.AmbientLight(0x111122));

            // Audio Graph
            audio = new THREE.PositionalAudio(listener);
            audio.setRefDistance(5);
            coreMesh.add(audio);

            const ctx = listener.context;
            filterNode = ctx.createBiquadFilter();
            reverbNode = ctx.createDelay();
            const feedback = ctx.createGain();
            reverbNode.delayTime.value = 0.1;
            feedback.gain.value = 0.3;
            reverbNode.connect(feedback); feedback.connect(reverbNode);

            audio.panner.disconnect();
            audio.panner.connect(filterNode);
            filterNode.connect(ctx.destination);
            filterNode.connect(reverbNode);
            reverbNode.connect(ctx.destination);

            analyser = new THREE.AudioAnalyser(audio, 128);

            orbit = new OrbitControls(camera, renderer.domElement);
            orbit.enableDamping = true;
            const drag = new DragControls([coreMesh], camera, renderer.domElement);
            drag.addEventListener('dragstart', () => orbit.enabled = false);
            drag.addEventListener('dragend', () => orbit.enabled = true);

            await setupTracking();
            animate();
        }

        async function setupTracking() {
            const res = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(res, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            video.srcObject = stream;
            video.onloadeddata = () => { document.getElementById('track-stat').innerText = "EAR-AXIS ON"; predict(); };
        }

        function predict() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const lm = results.faceLandmarks[0];

                    // 1. 【最重要】位置基準を「耳のライン」に設定
                    const earLX = lm[234].x, earLY = lm[234].y;
                    const earRX = lm[454].x, earRY = lm[454].y;
                    
                    const headCenterX = (earLX + earRX) / 2;
                    const headCenterY = (earLY + earRY) / 2;
                    const faceWidth = Math.sqrt(Math.pow(earRX - earLX, 2) + Math.pow(earRY - earLY, 2));

                    // 2. 位置（平行移動）の計算
                    // 耳の中心は首を振ってもほとんど動かないため、スライド誤認が消える
                    const tX = (headCenterX - 0.5) * -30;
                    const tY = (0.5 - headCenterY) * 20 + 2;
                    const tZ = (0.2 / faceWidth) * 12;

                    headGroup.position.x += (tX - headGroup.position.x) * LERP_POS;
                    headGroup.position.y += (tY - headGroup.position.y) * LERP_POS;
                    headGroup.position.z += (tZ - headGroup.position.z) * LERP_POS;

                    // 3. 回転の計算
                    // 鼻先（lm[1]）が、耳の中心軸からどれだけズレたかで角度を出す
                    const yaw = (lm[1].x - headCenterX) * 8; // 感度を上げ、回転を強調
                    const pitch = (lm[1].y - headCenterY) * 7;
                    
                    headGroup.rotation.y += (-yaw - headGroup.rotation.y) * LERP_ROT;
                    headGroup.rotation.x += (pitch - headGroup.rotation.x) * LERP_ROT;

                    // ステータス表示
                    document.getElementById('pos-x').innerText = headGroup.position.x.toFixed(1);
                    document.getElementById('rot-y').innerText = yaw.toFixed(2);
                }
            }
            requestAnimationFrame(predict);
        }

        function animate() {
            requestAnimationFrame(animate);
            orbit.update();
            if (audio?.isPlaying) {
                const level = analyser.getAverageFrequency() / 255;
                coreMesh.scale.setScalar(1 + level * 1.5);
                coreMesh.rotation.y += 0.01 + level * 0.1;
                const dist = headGroup.position.distanceTo(coreMesh.position);
                filterNode.frequency.setTargetAtTime(Math.max(200, 20000 - dist * 800), audio.context.currentTime, 0.1);
            }
            renderer.render(scene, camera);
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            new THREE.AudioLoader().load(URL.createObjectURL(e.target.files[0]), (buf) => {
                audio.setBuffer(buf); audio.setLoop(true);
                document.getElementById('playBtn').disabled = false;
            });
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            if (audio.context.state === 'suspended') audio.context.resume();
            audio.isPlaying ? audio.pause() : audio.play();
            document.getElementById('playBtn').innerText = audio.isPlaying ? "PAUSE" : "RESUME";
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
