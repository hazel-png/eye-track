<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Precision Calibration</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: #fff; }
        #webgazerGazeDot { width: 5px !important; height: 5px !important; background: rgba(255,255,255,0.3) !important; }

        #target-container {
            position: absolute; width: 80px; height: 80px;
            transform: translate(-50%, -50%);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            opacity: 0; display: flex; align-items: center; justify-content: center;
        }
        #target-core {
            width: 15px; height: 15px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 25px 8px rgba(255, 255, 255, 0.9);
        }
        #timer-ring {
            position: absolute; width: 60px; height: 60px;
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 50%;
        }
        #msg {
            position: fixed; width: 100%; text-align: center; bottom: 10%;
            font-weight: 200; letter-spacing: 0.2em; opacity: 0.7;
        }
    </style>
</head>
<body>

<div id="msg">キャリブレーションを開始します...</div>
<div id="target-container">
    <div id="timer-ring"></div>
    <div id="target-core"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.js"></script>

<script>
    const container = document.getElementById('target-container');
    const msg = document.getElementById('msg');
    const ring = document.getElementById('timer-ring');
    
    // 精度を最大化する9点配置（マージンを10%持たせてカメラの死角を回避）
    const points = [
        {x: 50, y: 50}, // Center
        {x: 10, y: 10}, {x: 50, y: 10}, {x: 90, y: 10}, // Top row
        {x: 90, y: 50}, {x: 90, y: 90}, {x: 50, y: 90}, // Right & Bottom
        {x: 10, y: 90}, {x: 10, y: 50}, // Left
        {x: 50, y: 50}  // Final Center
    ];
    let currentPoint = 0;

    async function start() {
        await webgazer.setRegression('ridge').begin();
        webgazer.showVideoPreview(false).showPredictionPoints(true);
        setTimeout(runCalibration, 2000);
    }

    function runCalibration() {
        if (currentPoint >= points.length) {
            container.style.opacity = "0";
            msg.innerText = "精度調整が完了しました";
            return;
        }

        const p = points[currentPoint];
        const px = window.innerWidth * (p.x / 100);
        const py = window.innerHeight * (p.y / 100);

        container.style.left = px + "px";
        container.style.top = py + "px";
        container.style.opacity = "1";

        let ticks = 0;
        const duration = 80; // 50ms * 80回 = 4秒間 (より多くのサンプルを取得)
        
        const interval = setInterval(() => {
            // 視線のデータを記録
            webgazer.recordScreenPosition(px, py);
            ticks++;

            // リングのアニメーション
            ring.style.transform = `scale(${1 - (ticks/duration)})`;
            ring.style.opacity = 1 - (ticks/duration);

            if (ticks >= duration) {
                clearInterval(interval);
                container.style.opacity = "0.2";
                currentPoint++;
                setTimeout(runCalibration, 1000); // 移動のための十分な間隔
                ring.style.transform = `scale(1)`;
            }
        }, 50);
    }

    window.onload = start;
</script>
</body>
</html>
