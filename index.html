<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR - Calibrated Neon Hands</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        video { display: none; }
        #gui-overlay {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #0f0; padding: 15px;
            border-radius: 10px; text-align: center; z-index: 2000;
            pointer-events: none; border: 2px solid #0f0;
        }
    </style>
</head>
<body>
    <div id="gui-overlay">
        <div id="status-text">PRESS "ENTER VR" TO START</div>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        let isCalibrated = false;
        let calibrationTimer = 0;
        const CALIBRATION_DURATION = 120; // 約2秒 (60fps * 2)
        
        const SCALE_CONFIG = {
            handSpread: 1.4,
            handVertical: 1.4,
            handDepth: 2.5,
            zOffset: -0.4,
            fingerRadius: 0.012
        };

        const fingers = [];
        const _v = new THREE.Vector3();
        const dt = 1/60;
        let currentHandData = null;

        async function init() {
            const statusText = document.getElementById('status-text');

            // --- Three.js Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // --- Physics Setup ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const handMat = new CANNON.Material("handMat");
            const objectMat = new CANNON.Material("objectMat");
            world.addContactMaterial(new CANNON.ContactMaterial(handMat, objectMat, { friction: 1.0, restitution: 0.1 }));

            // Desk & Cube
            const DESK_Z = -0.4;
            const deskMesh = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.05, 0.5), new THREE.MeshStandardMaterial({ color: 0xeeeeee }));
            deskMesh.position.set(0, 1.0, DESK_Z);
            scene.add(deskMesh);
            const deskBody = new CANNON.Body({ mass: 0, material: objectMat });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.025, 0.25)));
            deskBody.position.copy(deskMesh.position);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.1, material: objectMat, linearDamping: 0.5, angularDamping: 0.5 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.04, 0.04, 0.04)));
            cubeBody.position.set(0, 1.2, DESK_Z);
            world.addBody(cubeBody);

            // Neon Green Fingers (Visible against anything)
            const fingerGeo = new THREE.SphereGeometry(SCALE_CONFIG.fingerRadius, 16, 16);
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fingerGeo, new THREE.MeshStandardMaterial({ 
                    color: 0x00ff00, 
                    emissive: 0x00ff00, 
                    emissiveIntensity: 1.0 
                }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, material: handMat, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(SCALE_CONFIG.fingerRadius));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            // --- MediaPipe Hands ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
            hands.onResults((results) => {
                currentHandData = results.multiHandLandmarks?.[0] || null;
            });

            const video = document.getElementById('input_video');
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cameraUtils.start();

            // --- Animation Loop with Calibration Logic ---
            renderer.setAnimationLoop(() => {
                const session = renderer.xr.getSession();
                
                if (session && !isCalibrated) {
                    if (currentHandData) {
                        calibrationTimer++;
                        statusText.innerText = `CALIBRATING... KEEP HAND STILL: ${Math.ceil((CALIBRATION_DURATION - calibrationTimer)/60)}s`;
                        
                        if (calibrationTimer >= CALIBRATION_DURATION) {
                            // キャリブレーション実行: 手首のZ値からスケールを計算
                            const wristZ = Math.abs(currentHandData[0].z);
                            SCALE_CONFIG.handDepth = 1.0 / (wristZ || 0.1) * 0.7;
                            SCALE_CONFIG.zOffset = -0.3;
                            isCalibrated = true;
                            statusText.innerText = "READY!";
                            setTimeout(() => { statusText.style.display = 'none'; }, 2000);
                        }
                    } else {
                        calibrationTimer = 0;
                        statusText.innerText = "PLEASE HOLD YOUR HAND IN FRONT OF CAMERA";
                    }
                }

                if (isCalibrated && currentHandData) {
                    const xrCamera = renderer.xr.getCamera(camera);
                    currentHandData.forEach((point, i) => {
                        const f = fingers[i];
                        _v.set(
                            (point.x - 0.5) * SCALE_CONFIG.handSpread, 
                            -(point.y - 0.5) * SCALE_CONFIG.handVertical, 
                            -point.z * SCALE_CONFIG.handDepth + SCALE_CONFIG.zOffset
                        );
                        _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        
                        const nextPos = new CANNON.Vec3(_v.x, _v.y, _v.z);
                        f.body.velocity.set((nextPos.x - f.body.position.x)/dt, (nextPos.y - f.body.position.y)/dt, (nextPos.z - f.body.position.z)/dt);
                        f.body.position.copy(nextPos);
                        f.mesh.position.copy(f.body.position);
                    });
                }

                world.step(dt);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        init();
    </script>
</body>
</html>
