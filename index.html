<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Hand Physics MR</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; display: flex; }
    .view { position: relative; width: 50vw; height: 100vh; overflow: hidden; border-right: 1px solid #333; }
    video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; transform: scaleX(-1); }

    /* 操作するモノ（立方体に見立てた正方形） */
    .object {
      position: absolute; width: 80px; height: 80px;
      background: rgba(0, 255, 255, 0.4); border: 2px solid #0ff;
      box-shadow: 0 0 20px #0ff; display: flex; align-items: center; justify-content: center;
      color: white; font-weight: bold; pointer-events: none; z-index: 5;
    }
    .grabbing { background: rgba(255, 255, 0, 0.6); border-color: #ff0; box-shadow: 0 0 30px #ff0; }
  </style>
</head>
<body>

  <div class="view"><video class="input_video"></video><canvas class="output_canvas"></canvas><div class="object">CUBE</div></div>
  <div class="view"><video class="input_video"></video><canvas class="output_canvas"></canvas><div class="object">CUBE</div></div>

  <script>
    let objPos = { x: 0.5, y: 0.5, z: 0 }; // オブジェクトの正規化座標
    let isGrabbing = false;
    let pinchThreshold = 0.06;

    window.addEventListener('load', () => {
      const videoEls = document.querySelectorAll('.input_video');
      const canvasEls = document.querySelectorAll('.output_canvas');
      const objectEls = document.querySelectorAll('.object');
      const ctxs = Array.from(canvasEls).map(c => c.getContext('2d'));

      const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
      hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

      hands.onResults((results) => {
        // キャンバスのクリア
        ctxs.forEach((ctx, i) => {
          ctx.save();
          ctx.clearRect(0, 0, canvasEls[i].width, canvasEls[i].height);
          
          if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
              drawHand(ctx, landmarks, canvasEls[i]);
              checkInteraction(landmarks);
            }
          }
          ctx.restore();
        });
        updateObjectUI();
      });

      function drawHand(ctx, landmarks, canvas) {
        // 全指の関節を描画
        ctx.fillStyle = "#00ff00";
        landmarks.forEach(point => {
          const px = point.x * canvas.width;
          const py = point.y * canvas.height;
          // 奥行き(z)に応じて円のサイズを変える
          const size = 5 + (point.z * -20); 
          ctx.beginPath();
          ctx.arc(px, py, Math.max(1, size), 0, 2 * Math.PI);
          ctx.fill();
        });
      }

      function checkInteraction(landmarks) {
        const thumb = landmarks[4];
        const index = landmarks[8];
        
        // ピンチ距離計算
        const dist = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));
        const pinchCenter = { x: (thumb.x + index.x) / 2, y: (thumb.y + index.y) / 2 };

        // オブジェクトとの当たり判定（XY座標）
        const dx = Math.abs(pinchCenter.x - objPos.x);
        const dy = Math.abs(pinchCenter.y - objPos.y);

        if (dist < pinchThreshold && dx < 0.1 && dy < 0.1) {
          isGrabbing = true;
          objPos.x = pinchCenter.x;
          objPos.y = pinchCenter.y;
        } else {
          isGrabbing = false;
        }
      }

      function updateObjectUI() {
        objectEls.forEach(el => {
          el.style.left = `${(1 - objPos.x) * 100}%`;
          el.style.top = `${objPos.y * 100}%`;
          if (isGrabbing) el.classList.add('grabbing');
          else el.classList.remove('grabbing');
        });
      }

      const camera = new Camera(videoEls[0], {
        onFrame: async () => {
          canvasEls.forEach(c => { c.width = videoEls[0].videoWidth; c.height = videoEls[0].videoHeight; });
          await hands.send({image: videoEls[0]});
        },
        width: 1280, height: 720, facingMode: "environment"
      });

      videoEls[0].onplay = () => {
        const stream = videoEls[0].captureStream ? videoEls[0].captureStream() : videoEls[0].mozCaptureStream();
        videoEls[1].srcObject = stream; videoEls[1].play();
      };
      camera.start();
    });
  </script>
</body>
</html>
