<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pure Gaze Focus Sync (Apple Style)</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
    canvas#three-canvas { display: block; width: 100vw; height: 100vh; }
    
    /* Smooth Gaze Cursor */
    #gaze-cursor {
      position: absolute; width: 30px; height: 30px;
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 50%; pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 100;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
      /* Add slight blur to look more OS-like */
      backdrop-filter: blur(2px);
    }

    #info-panel {
      position: absolute; top: 20px; left: 20px;
      color: #fff; background: rgba(255, 255, 255, 0.1);
      padding: 12px; border-radius: 12px; font-size: 11px;
      backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2);
      z-index: 101;
    }

    #loading-overlay {
      position: absolute; inset: 0; background: #000;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; color: #fff; z-index: 1000;
      transition: opacity 1s ease;
    }

    #webcam-hidden { display: none; }
  </style>
</head>
<body>

<div id="loading-overlay">
  <h2 id="loading-status">CALIBRATING OPTICS...</h2>
  <p>Face the camera and stay still</p>
</div>

<div id="info-panel">
  <div style="font-weight: bold; margin-bottom: 5px;">GAZE ENGINE ACTIVE</div>
  <div>DEPTH: <span id="val-depth">0.00</span></div>
</div>

<div id="gaze-cursor"></div>
<video id="webcam-hidden" autoplay playsinline></video>
<canvas id="three-canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/",
    "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/vision_bundle.js"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9";

  // --- PARAMETERS ---
  const SETTINGS = {
    gazeSmooth: 0.12,  // Gaze lag (Lower = smoother, more Apple-like)
    focusSmooth: 0.07, // Focus transition speed
    camZ: 25,
    defaultDepth: 20
  };

  let scene, camera, renderer, composer, bokehPass;
  let faceLandmarker, video;
  let lastVideoTime = -1;
  
  // Smoothing states
  let smoothGaze = { x: 0.5, y: 0.5 };
  let currentFocusDepth = SETTINGS.defaultDepth;

  const uiDepth = document.getElementById('val-depth');
  const overlay = document.getElementById('loading-overlay');
  const cursor = document.getElementById('gaze-cursor');

  async function init() {
    // 1. Scene Setup
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0c);

    camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = SETTINGS.camZ;

    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    // Create many spheres at various depths
    const geo = new THREE.SphereGeometry(1.2, 32, 32);
    for(let i=0; i<50; i++) {
      const mat = new THREE.MeshStandardMaterial({ 
        color: new THREE.Color().setHSL(Math.random(), 0.5, 0.6),
        roughness: 0.1, metalness: 0.5
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*25, (Math.random()-0.5)*35);
      scene.add(mesh);
    }

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(5, 10, 10);
    scene.add(light);

    // Bokeh (Depth of Field)
    composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    bokehPass = new BokehPass(scene, camera, { focus: 20, aperture: 0.02, maxblur: 0.02 });
    composer.addPass(bokehPass);

    // 2. MediaPipe Initializer
    try {
      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm");
      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numFaces: 1
      });

      video = document.getElementById('webcam-hidden');
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 1000);
        animate();
      };
    } catch (err) {
      document.getElementById('loading-status').innerText = "CAMERA ERROR";
      console.error(err);
    }
  }

  function updateGazeFocus(landmarks) {
    const irisL = landmarks[468];
    const irisR = landmarks[473];
    if (!irisL || !irisR) return;

    // 1. Exponential Smoothing for Gaze (Apple Style)
    const rawX = (irisL.x + irisR.x) / 2;
    const rawY = (irisL.y + irisR.y) / 2;
    smoothGaze.x += (rawX - smoothGaze.x) * SETTINGS.gazeSmooth;
    smoothGaze.y += (rawY - smoothGaze.y) * SETTINGS.gazeSmooth;

    // Update Visual Cursor
    const screenX = (1 - smoothGaze.x) * window.innerWidth;
    const screenY = smoothGaze.y * window.innerHeight;
    cursor.style.left = `${screenX}px`;
    cursor.style.top = `${screenY}px`;

    // 2. Raycasting to target object
    const raycaster = new THREE.Raycaster();
    const ndcX = ((1 - smoothGaze.x) * 2) - 1;
    const ndcY = -(smoothGaze.y * 2) + 1;
    raycaster.setFromCamera({ x: ndcX, y: ndcY }, camera);
    
    const hits = raycaster.intersectObjects(scene.children);
    let targetDepth = SETTINGS.defaultDepth;

    if (hits.length > 0) {
      targetDepth = hits[0].distance; // Distance from camera to object
    }

    // 3. Smoothly transition the focus distance
    currentFocusDepth += (targetDepth - currentFocusDepth) * SETTINGS.focusSmooth;
    bokehPass.uniforms.focus.value = currentFocusDepth;
    uiDepth.innerText = currentFocusDepth.toFixed(2);
  }

  function animate() {
    requestAnimationFrame(animate);

    if (video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      const res = faceLandmarker.detectForVideo(video, performance.now());
      if (res.faceLandmarks && res.faceLandmarks[0]) {
        updateGazeFocus(res.faceLandmarks[0]);
      }
    }
    composer.render();
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });

  init();
</script>
</body>
</html>
