<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Hand Fix - Multi-Joint</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body style="margin: 0; background: #000;">
    <video id="input_video" style="display:none;" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, uiMesh, uiContext;
        let fingers = [];
        let calibStep = 0; 
        let stayTimer = 0;
        let maxReachZ = 0.15;

        function updateUIMessage(text) {
            uiContext.clearRect(0, 0, 512, 128);
            uiContext.fillStyle = 'rgba(0, 0, 0, 0.7)';
            uiContext.fillRect(0, 0, 512, 128);
            uiContext.fillStyle = 'white';
            uiContext.font = 'bold 36px sans-serif';
            uiContext.textAlign = 'center';
            uiContext.fillText(text, 256, 75);
            uiMesh.material.map.needsUpdate = true;
        }

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // UI Panel
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            uiContext = canvas.getContext('2d');
            const texture = new THREE.CanvasTexture(canvas);
            uiMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 0.1), new THREE.MeshBasicMaterial({ map: texture, transparent: true }));
            uiMesh.position.set(0, 1.5, -0.6);
            scene.add(uiMesh);

            renderer.xr.addEventListener('sessionstart', () => {
                calibStep = 1; stayTimer = 0;
                updateUIMessage("Hold palm still...");
            });

            // Physics
            world = new CANNON.World();
            world.gravity.set(0, -1.0, 0);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0x00ff88 }));
            cubeMesh.visible = false;
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 1 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, 1.4, -0.4);
            world.addBody(cubeBody);

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));

            // --- 修正箇所: 球体のサイズと色の設定 ---
            for (let i = 0; i < 21; i++) {
                // 球体を小さく(0.008)して、重なりを防ぐ
                const mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.008), 
                    new THREE.MeshStandardMaterial({ color: 0xffffff })
                );
                scene.add(mesh);

                const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(0.008));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                const xrCamera = renderer.xr.isPresenting ? renderer.xr.getCamera(camera) : camera;

                if (calibStep === 1) {
                    fingers.forEach(f => f.mesh.material.color.setHex(0x00aaff));
                    stayTimer++;
                    if (stayTimer > 80) {
                        maxReachZ = Math.abs(landmarks[0].z);
                        calibStep = 2;
                        cubeMesh.visible = true;
                        updateUIMessage("Ready!");
                        setTimeout(() => uiMesh.visible = false, 2000);
                    }
                } else if (calibStep === 2) {
                    fingers.forEach(f => f.mesh.material.color.setHex(0xffffff));
                }

                // 手首の座標を基準に、他の指を相対的に配置する
                const wrist = landmarks[0];
                const palmZ = (landmarks[0].z + landmarks[9].z) / 2;

                landmarks.forEach((point, i) => {
                    // --- 修正箇所: 座標変換ロジックの改善 ---
                    // カメラ映像の座標(0.0~1.0)を、VR空間のメートル単位にスケールアップ
                    const scaleX = 1.2; // 横方向の広がり
                    const scaleY = 1.0; // 縦方向の広がり
                    
                    let cZ = Math.max(point.z, palmZ - 0.05); // 突き抜け防止
                    const zBase = (Math.abs(cZ) / maxReachZ) * 0.4; // 奥行きスケール

                    // 各ポイントを個別の位置へ配置
                    const posX = (point.x - 0.5) * scaleX; 
                    const posY = (point.y - 0.5) * -scaleY + 1.3; // 1.3は高さ調整
                    const posZ = -zBase - 0.3; // 0.3はカメラからの基本距離

                    const targetPos = new THREE.Vector3(posX, posY, posZ);
                    
                    // VRカメラの向きに合わせて手を回転・移動
                    targetPos.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);

                    // 物理体とメッシュを更新
                    fingers[i].body.position.set(targetPos.x, targetPos.y, targetPos.z);
                    fingers[i].mesh.position.copy(fingers[i].body.position);
                });

                // UIパネルをカメラの前に固定
                if (uiMesh.visible) {
                    const uiTarget = new THREE.Vector3(0, 0, -0.6).applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    uiMesh.position.copy(uiTarget);
                    uiMesh.quaternion.copy(xrCamera.quaternion);
                }
            });

            const video = document.getElementById('input_video');
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cameraUtils.start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                if (calibStep === 2) {
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }

        init();
    </script>
</body>
</html>
