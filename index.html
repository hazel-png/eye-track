<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Physics Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root {
            --ios-bg: rgba(25, 25, 25, 0.7);
            --ios-accent: #0A84FF;
        }
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        video { display: none; }

        /* iPhone風オーバーレイUI */
        #ios-ui {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #2c3e50 0%, #000 100%);
            z-index: 2000;
            color: white;
            transition: opacity 0.5s ease;
        }

        .glass-card {
            background: var(--ios-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            width: 80%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-weight: 600; font-size: 24px; margin-bottom: 10px; }
        p { font-size: 14px; opacity: 0.8; margin-bottom: 30px; line-height: 1.5; }

        .start-btn {
            background: var(--ios-accent);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(10, 132, 255, 0.3);
        }

        .start-btn:active { transform: scale(0.95); }

        /* VRボタンのカスタムスタイル上書き */
        #VRButton {
            border-radius: 20px !important;
            background: var(--ios-bg) !important;
            backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            font-family: inherit !important;
            bottom: 40px !important;
        }
    </style>
</head>
<body>
    <div id="ios-ui">
        <div class="glass-card">
            <h1>Spatial Physics</h1>
            <p>背面カメラを使用してハンドトラッキングを開始します。物理オブジェクトに触れてみましょう。</p>
            <button class="start-btn" id="start-btn">アクセスを許可</button>
        </div>
    </div>

    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const tipMeshes = [], tipBodies = [];

        async function init() {
            // --- UIの非表示 ---
            document.getElementById('ios-ui').style.opacity = '0';
            setTimeout(() => document.getElementById('ios-ui').style.display = 'none', 500);

            // --- Three.js ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // VRボタン追加
            const vrBtn = VRButton.createButton(renderer);
            document.body.appendChild(vrBtn);

            // 環境光
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.PointLight(0xffffff, 1);
            sun.position.set(2, 5, 2);
            scene.add(sun);

            // 地面
            const grid = new THREE.GridHelper(20, 40, 0x444444, 0x222222);
            scene.add(grid);

            // --- Cannon.js ---
            world = new CANNON.World();
            world.gravity.set(0, -9.82, 0);

            const groundBody = new CANNON.Body({ mass: 0 });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);

            cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.2), 
                new THREE.MeshStandardMaterial({ color: 0x0A84FF, roughness: 0.1, metalness: 0.5 })
            );
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.5 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.1, 0.1, 0.1)));
            cubeBody.position.set(0, 2, -0.8);
            world.addBody(cubeBody);

            // 関節
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.015), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                tipMeshes.push(mesh);
                const body = new CANNON.Body({ mass: 0 });
                body.addShape(new CANNON.Sphere(0.015));
                world.addBody(body);
                tipBodies.push(body);
            }

            // --- MediaPipe + 背面カメラ ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ 
                maxNumHands: 1, 
                modelComplexity: 1, 
                minDetectionConfidence: 0.7, 
                minTrackingConfidence: 0.7 
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    const xrCamera = renderer.xr.getCamera(camera);
                    lm.forEach((point, i) => {
                        const v = new THREE.Vector3(
                            (point.x - 0.5) * 2, 
                            -(point.y - 0.5) * 2, 
                            -point.z * 2 - 0.6
                        ).applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        tipBodies[i].position.copy(v);
                        tipMeshes[i].position.copy(v);
                    });
                }
            });

            const videoElement = document.getElementById('input_video');
            const cameraStream = new Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                // 背面カメラ(environment)を指定
                facingMode: "environment",
                width: 1280, height: 720
            });
            cameraStream.start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            // iOSのセンサー・カメラ許可プロンプト対策
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(init).catch(console.error);
            } else {
                init();
            }
        });
    </script>
</body>
</html>
