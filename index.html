<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gaze & Convergence Focus Sync Pro</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
    canvas#three-canvas { display: block; width: 100vw; height: 100vh; }
    
    #gaze-cursor {
      position: absolute; width: 35px; height: 35px;
      border: 2px solid rgba(0, 255, 255, 0.8);
      border-radius: 50%; pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.05s linear;
      z-index: 100;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }

    #info-panel {
      position: absolute; top: 20px; left: 20px;
      color: #00ffff; background: rgba(0, 0, 0, 0.8);
      padding: 15px; border-radius: 8px; font-size: 11px;
      font-family: 'Courier New', monospace;
      pointer-events: none; border: 1px solid #00ffff44;
      z-index: 101;
    }

    #loading-overlay {
      position: absolute; inset: 0; background: #050505;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; color: #00ffff; z-index: 1000;
      transition: opacity 0.8s ease;
    }

    #webcam-hidden { display: none; }
  </style>
</head>
<body>

<div id="loading-overlay">
  <h2 id="loading-status">SYNCING BIOMETRICS...</h2>
  <p>Initializing MediaPipe Face Landmarker</p>
</div>

<div id="info-panel">
  <div style="font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #00ffff44;">OPTICAL TELEMETRY</div>
  <div>GAZE_XY: <span id="val-gaze">--</span></div>
  <div>CONVERGENCE: <span id="val-conv">0%</span></div>
  <div>FOCUS_DIST: <span id="val-depth">0.00</span></div>
</div>

<div id="gaze-cursor"></div>
<video id="webcam-hidden" autoplay playsinline></video>
<canvas id="three-canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/",
    "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/vision_bundle.js"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9";

  const CONFIG = {
    irisMax: 0.056,  // Far distance threshold
    irisMin: 0.044,  // Near distance threshold
    smooth: 0.12,    // Interpolation speed
    camZ: 25
  };

  let scene, camera, renderer, composer, bokehPass;
  let faceLandmarker, video;
  let lastVideoTime = -1;
  let gazePoint = { x: 0.5, y: 0.5 };

  const uiGaze = document.getElementById('val-gaze');
  const uiConv = document.getElementById('val-conv');
  const uiDepth = document.getElementById('val-depth');
  const overlay = document.getElementById('loading-overlay');
  const cursor = document.getElementById('gaze-cursor');

  async function init() {
    // 1. Three.js Setup
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);
    scene.fog = new THREE.FogExp2(0x020205, 0.02);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = CONFIG.camZ;

    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    // Geometry Generation
    const geo = new THREE.IcosahedronGeometry(1.5, 2);
    for(let i=0; i<60; i++) {
      const mat = new THREE.MeshStandardMaterial({ 
        color: new THREE.Color().setHSL(Math.random(), 0.8, 0.6),
        emissive: new THREE.Color().setHSL(Math.random(), 0.8, 0.2),
        metalness: 0.8, roughness: 0.1
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((Math.random()-0.5)*50, (Math.random()-0.5)*30, (Math.random()-0.5)*40);
      scene.add(mesh);
    }

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const light = new THREE.PointLight(0x00ffff, 1000, 100);
    light.position.set(10, 10, 20);
    scene.add(light);

    // Post Processing
    composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    bokehPass = new BokehPass(scene, camera, { focus: 15, aperture: 0.018, maxblur: 0.015 });
    composer.addPass(bokehPass);

    // 2. MediaPipe Initializer
    try {
      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm");
      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        outputFaceBlendshapes: true
      });

      video = document.getElementById('webcam-hidden');
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 800);
        animate();
      };
    } catch (err) {
      document.getElementById('loading-status').innerText = "HARDWARE ERROR";
      console.error(err);
    }
  }

  function processFrame(landmarks) {
    const pL = landmarks[468]; // Left Iris
    const pR = landmarks[473]; // Right Iris
    if (!pL || !pR) return;

    // Gaze Point Smoothing
    gazePoint.x += ((pL.x + pR.x)/2 - gazePoint.x) * 0.25;
    gazePoint.y += ((pL.y + pR.y)/2 - gazePoint.y) * 0.25;

    // Move UI Cursor
    const screenX = (1 - gazePoint.x) * window.innerWidth;
    const screenY = gazePoint.y * window.innerHeight;
    cursor.style.left = `${screenX}px`;
    cursor.style.top = `${screenY}px`;

    // Convergence Calc
    const irisDist = Math.sqrt(Math.pow(pR.x - pL.x, 2) + Math.pow(pR.y - pL.y, 2));
    let conv = (CONFIG.irisMax - irisDist) / (CONFIG.irisMax - CONFIG.irisMin);
    conv = Math.max(0, Math.min(1, conv));

    // Raycast to find depth
    const raycaster = new THREE.Raycaster();
    const ndcX = ((1 - gazePoint.x) * 2) - 1;
    const ndcY = -(gazePoint.y * 2) + 1;
    raycaster.setFromCamera({ x: ndcX, y: ndcY }, camera);
    
    const hits = raycaster.intersectObjects(scene.children);
    let targetFocus = 20; // Default

    if (hits.length > 0) {
      const baseDepth = hits[0].distance;
      // Adjust focus based on convergence offset
      targetFocus = baseDepth - (conv * 12);
    }

    bokehPass.uniforms.focus.value += (targetFocus - bokehPass.uniforms.focus.value) * CONFIG.smooth;

    // UI Feedback
    uiGaze.innerText = `${(1-gazePoint.x).toFixed(2)} | ${gazePoint.y.toFixed(2)}`;
    uiConv.innerText = `${(conv * 100).toFixed(0)}%`;
    uiDepth.innerText = bokehPass.uniforms.focus.value.toFixed(2);
  }

  function animate() {
    requestAnimationFrame(animate);

    // Scene animation
    scene.children.forEach((obj, i) => {
      if (obj.isMesh) {
        obj.rotation.x += 0.005;
        obj.rotation.y += 0.008;
        obj.position.y += Math.sin(Date.now() * 0.001 + i) * 0.02;
      }
    });

    if (video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      const res = faceLandmarker.detectForVideo(video, performance.now());
      if (res.faceLandmarks && res.faceLandmarks[0]) {
        processFrame(res.faceLandmarks[0]);
      }
    }
    composer.render();
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });

  init();
</script>
</body>
</html>
