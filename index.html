<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D VR Hand Interaction</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; display: flex; }
        #container { display: flex; width: 100vw; height: 100vh; }
        .view { width: 50vw; height: 100vh; }
        video { display: none; } /* カメラ映像は隠す（計算にのみ使用） */
    </style>
</head>
<body>
    <video id="input_video"></video>
    <div id="container"></div>

    <script>
        let scene, camera, renderer, cube;
        const handJoints = [];
        let isGrabbing = false;

        // --- 1. Three.js セットアップ ---
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122); // 宇宙のような背景

            // カメラ（VR用：一旦一つで作ってレンダラーで左右に分ける）
            camera = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000);
            camera.position.z = 2;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            // 3Dオブジェクト（立方体）
            const geometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const material = new THREE.MeshStandardMaterial({ color: 0x00ffcc, metalness: 0.7, roughness: 0.2 });
            cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            // ライト
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 2).normalize();
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // 手の関節用の3D球体（21個）
            const jointGeo = new THREE.SphereGeometry(0.02, 8, 8);
            const jointMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            for (let i = 0; i < 21; i++) {
                const joint = new THREE.Mesh(jointGeo, jointMat);
                scene.add(joint);
                handJoints.push(joint);
            }
        }

        // --- 2. MediaPipe セットアップ ---
        const videoElement = document.getElementById('input_video');
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });

        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];

                // 全関節を3D空間に配置
                hand.forEach((lm, i) => {
                    // MediaPipe(0~1) -> Three.js(-scale~scale) への変換
                    handJoints[i].position.x = (lm.x - 0.5) * 4;
                    handJoints[i].position.y = -(lm.y - 0.5) * 3;
                    handJoints[i].position.z = -lm.z * 5; // 奥行き
                });

                // ピンチ検知（親指と人差し指）
                const thumb = handJoints[4].position;
                const index = handJoints[8].position;
                const dist = thumb.distanceTo(index);

                // モノを掴む判定
                if (dist < 0.15) {
                    handJoints[4].material.color.set(0x00ff00);
                    handJoints[8].material.color.set(0x00ff00);
                    
                    const midPoint = new THREE.Vector3().addVectors(thumb, index).multiplyScalar(0.5);
                    if (midPoint.distanceTo(cube.position) < 0.3) {
                        isGrabbing = true;
                        cube.position.copy(midPoint);
                    }
                } else {
                    isGrabbing = false;
                    handJoints.forEach(j => j.material.color.set(0xff0000));
                }
            }
        });

        // --- 3. レンダリングループ（左右分割描画） ---
        function animate() {
            requestAnimationFrame(animate);

            if (!isGrabbing) {
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.01;
            }

            const width = window.innerWidth;
            const height = window.innerHeight;

            // 左目用描画
            renderer.setScissorTest(true);
            renderer.setScissor(0, 0, width / 2, height);
            renderer.setViewport(0, 0, width / 2, height);
            renderer.render(scene, camera);

            // 右目用描画（少し視差をつけるのが本来のVRですが、まずは同じ位置で）
            renderer.setScissor(width / 2, 0, width / 2, height);
            renderer.setViewport(width / 2, 0, width / 2, height);
            renderer.render(scene, camera);
        }

        // カメラ起動
        const cam = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 640, height: 480, facingMode: "environment"
        });

        initThree();
        animate();
        cam.start();

        // 画面リサイズ対応
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = (window.innerWidth / 2) / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
