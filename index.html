<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Hand Tracking - English Guide</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body style="margin: 0; background: #000;">
    <video id="input_video" style="display:none;" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, uiMesh, uiContext;
        let fingers = [];
        let calibStep = 0; // 0: Idle, 1: Calibrating, 2: Finished
        let stayTimer = 0;
        let maxReachZ = 0.15;

        // 3D空間内にメッセージを表示する関数
        function updateUIMessage(text) {
            uiContext.clearRect(0, 0, 512, 128);
            uiContext.fillStyle = 'rgba(0, 0, 0, 0.5)';
            uiContext.fillRect(0, 0, 512, 128);
            uiContext.fillStyle = 'white';
            uiContext.font = 'bold 32px sans-serif';
            uiContext.textAlign = 'center';
            uiContext.fillText(text, 256, 75);
            uiMesh.material.map.needsUpdate = true;
        }

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // VR内メッセージパネルの作成
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 128;
            uiContext = canvas.getContext('2d');
            const texture = new THREE.CanvasTexture(canvas);
            uiMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(0.5, 0.125),
                new THREE.MeshBasicMaterial({ map: texture, transparent: true })
            );
            uiMesh.position.set(0, 1.6, -0.8); // 目の高さに配置
            scene.add(uiMesh);

            renderer.xr.addEventListener('sessionstart', () => {
                calibStep = 1;
                stayTimer = 0;
                updateUIMessage("Hold palm still for 2s...");
            });

            // 物理
            world = new CANNON.World();
            world.gravity.set(0, -1.2, 0);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0x00ff88 }));
            cubeMesh.visible = false;
            scene.add(cubeMesh);

            cubeBody = new CANNON.Body({ mass: 1 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, 1.4, -0.4);
            world.addBody(cubeBody);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.012), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(0.012));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                const xrCamera = renderer.xr.isPresenting ? renderer.xr.getCamera(camera) : camera;

                // キャリブレーション (English Guide)
                if (calibStep === 1) {
                    fingers.forEach(f => f.mesh.material.color.setHex(0x00aaff));
                    stayTimer++;
                    if (stayTimer > 80) {
                        maxReachZ = Math.abs(landmarks[0].z);
                        calibStep = 2;
                        cubeMesh.visible = true;
                        updateUIMessage("Calibration Complete!");
                        setTimeout(() => { uiMesh.visible = false; }, 3000); // 3秒後にメッセージを消す
                        if (navigator.vibrate) navigator.vibrate([50, 50]);
                    }
                } else if (calibStep === 2) {
                    fingers.forEach(f => f.mesh.material.color.setHex(0xffffff));
                }

                const palmZ = (landmarks[0].z + landmarks[9].z) / 2;

                landmarks.forEach((point, i) => {
                    let cZ = Math.max(point.z, palmZ - 0.04);
                    const zScale = (Math.abs(cZ) / maxReachZ) * 0.5;
                    
                    const posX = (point.x - 0.5) * 2.2; 
                    const posY = (point.y - 0.5) * -1.8 + 1.2;
                    const posZ = -zScale - 0.3;

                    const targetPos = new THREE.Vector3(posX, posY, posZ);
                    targetPos.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);

                    fingers[i].body.position.set(targetPos.x, targetPos.y, targetPos.z);
                    fingers[i].mesh.position.copy(fingers[i].body.position);
                });

                // メッセージパネルを常にカメラの前に追従させる（見失わないように）
                if (uiMesh.visible) {
                    const uiTargetPos = new THREE.Vector3(0, 0.1, -0.8);
                    uiTargetPos.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    uiMesh.position.copy(uiTargetPos);
                    uiMesh.quaternion.copy(xrCamera.quaternion);
                }
            });

            const video = document.getElementById('input_video');
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment",
                width: 1280, height: 720
            });
            cameraUtils.start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                if (calibStep === 2) {
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }

        init();
    </script>
</body>
</html>
