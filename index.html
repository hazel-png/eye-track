<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>カメラ・ヘッドトラッキング修正版</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background-color: #f0f0f0; }
        canvas { border: 2px solid #333; background-color: #000; width: 320px; height: 240px; }
        #controls { margin-top: 20px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/jeelizfacefilter@latest/dist/jeelizFaceFilter.umd.js"></script>
</head>
<body>

    <h1>ヘッドトラッキング・オーディオ</h1>
    <canvas id="jeeFaceFilterCanvas"></canvas>

    <div id="controls">
        <button id="startBtn">カメラと音声を起動</button>
        <div id="status">ライブラリ読み込み中...</div>
    </div>

    <script>
        window.onload = function() {
            const startBtn = document.getElementById('startBtn');
            const statusDiv = document.getElementById('status');
            
            // ライブラリが読み込まれているかチェック
            if (typeof JEELIZFACEFILTER === 'undefined') {
                statusDiv.textContent = "エラー: ライブラリを読み込めませんでした。ネット接続を確認してください。";
                statusDiv.style.color = "red";
                return;
            }

            statusDiv.textContent = "準備完了！ボタンを押してください。";

            const MP3_FILE = 'audio.mp3';
            let audioCtx, panner, htmlAudio, isAudioSetup = false;

            // ボタンクリック時の処理
            startBtn.addEventListener('click', () => {
                startBtn.disabled = true;
                statusDiv.textContent = "カメラ起動中...";
                initFaceFilter();
            });

            function setupAudio() {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    htmlAudio = new Audio(MP3_FILE);
                    htmlAudio.loop = true;
                    
                    const source = audioCtx.createMediaElementSource(htmlAudio);
                    panner = audioCtx.createPanner();
                    panner.panningModel = 'HRTF';
                    
                    // 初期位置
                    panner.positionX.setValueAtTime(0, audioCtx.currentTime);
                    panner.positionZ.setValueAtTime(-1, audioCtx.currentTime);

                    source.connect(panner);
                    panner.connect(audioCtx.destination);

                    htmlAudio.play().catch(e => {
                        statusDiv.textContent = "音声再生エラー: audio.mp3が見つかりません。";
                    });
                    
                    isAudioSetup = true;
                    statusDiv.textContent = "トラッキング中...";
                } catch(e) {
                    statusDiv.textContent = "オーディオ設定エラー";
                }
            }

            function initFaceFilter() {
                JEELIZFACEFILTER.init({
                    canvasId: 'jeeFaceFilterCanvas',
                    NNCPath: 'https://cdn.jsdelivr.net/npm/jeelizfacefilter@latest/dist/',
                    callbackReady: function(errCode) {
                        if (errCode) {
                            statusDiv.textContent = "カメラエラー: " + errCode;
                            return;
                        }
                        setupAudio();
                    },
                    callbackTrack: function(detectState) {
                        if (isAudioSetup && detectState.detected > 0.6) {
                            // 顔の向きを音の位置に反映 (-20〜20の範囲で調整)
                            const x = -detectState.ry * 20; 
                            const y = -detectState.rx * 20;
                            panner.positionX.setValueAtTime(x, audioCtx.currentTime);
                            panner.positionY.setValueAtTime(y, audioCtx.currentTime);
                        }
                    }
                });
            }
        };
    </script>
</body>
</html>
