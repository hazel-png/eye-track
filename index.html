<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Spatial View | 1:1 Scale</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Consolas', monospace; }
        #container { position: absolute; inset: 0; }
        #hud { 
            position: absolute; top: 20px; left: 20px; color: #00f2ff; 
            background: rgba(0, 5, 15, 0.9); padding: 15px; border-left: 3px solid #00f2ff;
            pointer-events: none; z-index: 100; font-size: 11px;
        }
        #webcam { display: none; }
        .label { color: #555; margin-right: 8px; }
        .val { color: #fff; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="font-weight: bold; margin-bottom: 8px; color: #ff00f2;">REAL-SCALE TRACKING</div>
        <div><span class="label">POS-X:</span><span id="v-px" class="val">0.0</span></div>
        <div><span class="label">YAW:</span><span id="v-ry" class="val">0.0</span></div>
        <div style="margin-top: 8px; font-size: 9px; opacity: 0.7;">※移動量を現実の物理法則に同期中</div>
    </div>
    <div id="container"></div>
    <video id="webcam" autoplay playsinline></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let scene, camera, renderer, faceLandmarker;
        const video = document.getElementById('webcam');

        // --- 物理パラメータ（抑制版） ---
        const physics = {
            pos: new THREE.Vector3(0, 0, 10),
            vel: new THREE.Vector3(0, 0, 0),
            rot: new THREE.Vector2(0, 0),
            rotVel: new THREE.Vector2(0, 0),
            
            targetPos: new THREE.Vector3(0, 0, 10),
            targetRot: new THREE.Vector2(0, 0),

            stiffness: 0.15, // 追従の強さ
            damping: 0.8,    // 減衰（重厚感）
            jitter: 0.0008   // ノイズ（より微細に）
        };

        async function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x00050a, 0.04);

            // FOVを45度に絞ることで周辺の歪みを防ぐ
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            // 奥行きを強調するための構造
            const grid = new THREE.GridHelper(100, 40, 0x00f2ff, 0x001122);
            grid.position.y = -5;
            scene.add(grid);

            // 基準となる中心のオブジェクト
            const centerCore = new THREE.Mesh(
                new THREE.IcosahedronGeometry(1.5, 1),
                new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true })
            );
            scene.add(centerCore);

            for (let i = 0; i < 40; i++) {
                const cube = new THREE.Mesh(
                    new THREE.BoxGeometry(0.3, 0.3, 0.3),
                    new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, opacity: 0.5, transparent: true })
                );
                cube.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*20, (Math.random()-0.5)*40 - 10);
                scene.add(cube);
            }

            await setupTracking();
            animate();
        }

        async function setupTracking() {
            try {
                const res = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(res, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO", numFaces: 1
                });

                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => { video.play(); predict(); };
            } catch (e) { console.error(e); }
        }

        function predict() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const lm = results.faceLandmarks[0];
                    const headX = (lm[234].x + lm[454].x) / 2;
                    const headY = (lm[234].y + lm[454].y) / 2;
                    const faceWidth = Math.abs(lm[454].x - lm[234].x);

                    // --- 係数を大幅に抑制 (リアルスケール) ---
                    physics.targetPos.x = (0.5 - headX) * 8; 
                    physics.targetPos.y = (0.5 - headY) * 5;
                    physics.targetPos.z = (0.15 / faceWidth) * 4 + 7;

                    // 回転の感度をさらに下げる
                    physics.targetRot.y = (lm[1].x - headX) * 2.0;
                    physics.targetRot.x = (headY - lm[1].y) * 1.5;

                    document.getElementById('v-px').innerText = physics.targetPos.x.toFixed(2);
                    document.getElementById('v-ry').innerText = physics.targetRot.y.toFixed(2);
                }
            }
            requestAnimationFrame(predict);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 物理演算
            let forceP = new THREE.Vector3().subVectors(physics.targetPos, physics.pos).multiplyScalar(physics.stiffness);
            physics.vel.add(forceP).multiplyScalar(physics.damping);
            physics.pos.add(physics.vel);

            let forceR = new THREE.Vector2().subVectors(physics.targetRot, physics.rot).multiplyScalar(physics.stiffness);
            physics.rotVel.add(forceR).multiplyScalar(physics.damping);
            physics.rot.add(physics.rotVel);

            // 微細ノイズ
            const jX = (Math.random() - 0.5) * physics.jitter;
            const jY = (Math.random() - 0.5) * physics.jitter;

            camera.position.copy(physics.pos);
            camera.rotation.set(physics.rot.x + jX, physics.rot.y + jY, 0);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
