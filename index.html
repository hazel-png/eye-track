<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fixed Spatial Engine</title>
    <style>
        body { margin: 0; background: #000; color: #00d4ff; font-family: monospace; overflow: hidden; }
        /* 描画エリアを確実に全画面にする */
        #container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; box-sizing: border-box; }
        .ui-bottom { display: flex; justify-content: center; align-items: center; gap: 20px; pointer-events: auto; background: rgba(5,5,20,0.9); padding: 20px; border-radius: 50px; border: 1px solid #00d4ff; }
        .btn { cursor: pointer; padding: 12px 25px; background: #00d4ff; border: none; color: #000; border-radius: 30px; font-weight: bold; }
        #status-panel { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-left: 4px solid #00d4ff; z-index: 20; pointer-events: none; }
        #webcam { display: none; }
    </style>
</head>
<body>

    <div id="container"></div> <video id="webcam" autoplay playsinline></video>

    <div id="status-panel">
        <div>3D SCENE: <span id="scene-stat">INIT...</span></div>
        <div>AI TRACKING: <span id="track-stat">LOADING...</span></div>
        <div>ORIENTATION: <span id="rot-stat">0, 0, 0</span></div>
    </div>

    <div id="overlay">
        <div style="text-align: center;">
            <h1 style="letter-spacing: 8px; margin: 0;">SPATIAL IMMERSION</h1>
            <p style="color: #555;">Drag sphere to move | Move head to listen</p>
        </div>
        <div class="ui-bottom">
            <label class="btn">LOAD AUDIO<input type="file" id="fileInput" accept="audio/*" style="display:none;"></label>
            <button id="playBtn" class="btn" disabled>START ENGINE</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DragControls } from 'three/addons/controls/DragControls.js';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let scene, camera, renderer, audio, listener, headGroup, mesh, faceLandmarker;
        let filterNode, dryGain, wetGain, analyser;
        const video = document.getElementById('webcam');

        // --- 1. Three.jsを「即座に」起動する ---
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(100, 50, 0x00d4ff, 0x050510));

            // あなた（リスナー）
            headGroup = new THREE.Group();
            const headMesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.5, 2), new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true }));
            headGroup.add(headMesh);
            scene.add(headGroup);

            listener = new THREE.AudioListener();
            headGroup.add(listener);

            // 音源
            mesh = new THREE.Mesh(
                new THREE.SphereGeometry(1.2, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0xff0055, emissiveIntensity: 2 })
            );
            mesh.position.set(0, 2, -10);
            scene.add(mesh);
            mesh.add(new THREE.PointLight(0xff0055, 100, 30));
            scene.add(new THREE.AmbientLight(0x222222));

            // オーディオ初期設定
            audio = new THREE.PositionalAudio(listener);
            audio.setRefDistance(1);
            audio.setRolloffFactor(3.0);
            audio.panner.panningModel = 'HRTF';
            mesh.add(audio);

            const ctx = listener.context;
            filterNode = ctx.createBiquadFilter();
            filterNode.type = 'lowpass';
            dryGain = ctx.createGain();
            
            // 簡易接続
            audio.panner.disconnect();
            audio.panner.connect(filterNode);
            filterNode.connect(dryGain);
            dryGain.connect(ctx.destination);

            analyser = new THREE.AudioAnalyser(audio, 64);

            const o = new OrbitControls(camera, renderer.domElement);
            const d = new DragControls([mesh], camera, renderer.domElement);
            d.addEventListener('dragstart', () => o.enabled = false);
            d.addEventListener('dragend', () => o.enabled = true);

            document.getElementById('scene-stat').innerText = "RUNNING";
            
            // 3Dが準備できたらAIを裏で起動
            setupTracking();
        }

        // --- 2. AI Tracking (Backgroud) ---
        async function setupTracking() {
            try {
                const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: { 
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO", numFaces: 1
                });
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.onloadeddata = () => {
                    document.getElementById('track-stat').innerText = "ACTIVE";
                    predict();
                };
            } catch (e) {
                document.getElementById('track-stat').innerText = "ERROR/NO CAMERA";
            }
        }

        function predict() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const lm = results.faceLandmarks[0];
                    const yaw = (lm[1].x - (lm[33].x + lm[263].x) / 2) * 4;
                    const pitch = (lm[1].y - (lm[33].y + lm[263].y) / 2) * 4;
                    headGroup.rotation.set(pitch, -yaw, 0);
                    document.getElementById('rot-stat').innerText = `${pitch.toFixed(2)}, ${yaw.toFixed(2)}`;
                }
            }
            requestAnimationFrame(predict);
        }

        // --- 3. UI Events ---
        document.getElementById('fileInput').addEventListener('change', (e) => {
            new THREE.AudioLoader().load(URL.createObjectURL(e.target.files[0]), (buf) => {
                audio.setBuffer(buf);
                audio.setLoop(true);
                document.getElementById('playBtn').disabled = false;
            });
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            if (audio.context.state === 'suspended') audio.context.resume();
            audio.isPlaying ? audio.pause() : audio.play();
            document.getElementById('playBtn').innerText = audio.isPlaying ? "PAUSE" : "START";
        });

        function animate() {
            requestAnimationFrame(animate);
            if (audio?.isPlaying) {
                const level = analyser.getAverageFrequency() / 255;
                mesh.scale.setScalar(1 + level * 0.5);
                const dist = mesh.position.length();
                filterNode.frequency.setTargetAtTime(Math.max(200, 20000 - dist * 1000), audio.context.currentTime, 0.1);
            }
            if(renderer) renderer.render(scene, camera);
        }

        initScene();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
