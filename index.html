<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Native WebXR Physics VR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r150/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/webxr/VRButton.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
    </style>
</head>
<body>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const tipMeshes = [], tipBodies = [];

        async function init() {
            // --- 1. Three.js & WebXR Setup ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 3); // WebXRでは初期位置が重要

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            // **WebXRを有効化**
            renderer.xr.enabled = true; 
            document.body.appendChild(renderer.domElement);
            
            // **VR開始ボタンを表示**
            document.body.appendChild(VRButton.createButton(renderer));

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 5, 1);
            scene.add(light);

            // --- 2. Cannon.js (Physics) ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const pMat = new CANNON.Material({ friction: 2.0 });

            // 地面
            const groundBody = new CANNON.Body({ mass: 0, material: pMat });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);

            // キューブ
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({ color: 0x00ffaa }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.1, material: pMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.1, 0.1, 0.1)));
            cubeBody.position.set(0, 2, -1);
            world.addBody(cubeBody);

            // 指21点
            const jGeo = new THREE.SphereGeometry(0.015, 6, 6);
            for (let i = 0; i < 21; i++) {
                const m = new THREE.Mesh(jGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(m);
                tipMeshes.push(m);
                const b = new CANNON.Body({ mass: 0, material: pMat });
                b.addShape(new CANNON.Sphere(0.015));
                b.collisionFilterGroup = 1;
                b.collisionFilterMask = 2 | 0xFF; // オブジェクトと地面に当たる
                world.addBody(b);
                tipBodies.push(b);
            }

            // --- 3. MediaPipe & Camera ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    lm.forEach((point, i) => {
                        // WebXR内のカメラ(XRCamera)の姿勢を取得
                        const xrCamera = renderer.xr.getCamera(camera);
                        const v = new THREE.Vector3(
                            (point.x - 0.5) * 1.5, 
                            -(point.y - 0.5) * 1.2, 
                            -point.z * 2 - 0.5
                        ).applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        
                        tipBodies[i].position.copy(v);
                        tipMeshes[i].position.copy(v);
                    });
                }
            });

            const videoElement = document.getElementById('input_video');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 480, height: 270 }
            });
            videoElement.srcObject = stream;
            videoElement.play();

            // WebXRのメインループ
            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                
                hands.send({ image: videoElement });
                renderer.render(scene, camera);
            });
        }

        init();
    </script>
</body>
</html>
