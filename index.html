<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Hand Tracking Desk (AR/VR)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #vr-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; z-index: 2000; }
        .btn { background: #fff; color: #000; border: none; padding: 20px 40px; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; }
        /* カメラ映像自体は隠すが、MediaPipeに渡すために必要 */
        #input-video { position: fixed; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>
    <div id="vr-ui"><button class="btn" id="start-btn">ENTER AR-VR HANDS</button></div>
    <video id="input-video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, videoTexture;
        let handJointMeshes = []; 
        let handJointBodies = []; // ★手の関節の物理ボディ
        const videoElement = document.getElementById('input-video');

        async function init() {
            document.getElementById('vr-ui').remove();

            // --- Three.js Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // ★カメラ映像を背景として表示する設定
            videoTexture = new THREE.VideoTexture(videoElement);
            scene.background = videoTexture; 

            // --- Physics ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);

            // --- Objects ---
            // Desk (物理判定あり、描画は半透明に)
            const deskMesh = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.05, 0.6), 
                new THREE.MeshStandardMaterial({ color: 0x333333, transparent: true, opacity: 0.5 })
            );
            deskMesh.position.set(0, 0.7, -0.5); // 少し低く
            scene.add(deskMesh);

            const deskBody = new CANNON.Body({ mass: 0 });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.6, 0.025, 0.3)));
            deskBody.position.set(0, 0.7, -0.5);
            world.addBody(deskBody);

            // Cube
            cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.1, 0.1), 
                new THREE.MeshStandardMaterial({ color: 0x4285F4 })
            );
            scene.add(cubeMesh);

            cubeBody = new CANNON.Body({ mass: 0.5 }); // 少し重く
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, 1.0, -0.5);
            world.addBody(cubeBody);

            // ★Hand Visuals & Physics (全21関節分)
            const jointGeo = new THREE.SphereGeometry(0.02); // 少し大きく
            const jointMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            
            for (let i = 0; i < 21; i++) {
                // 描画用メッシュ
                const jointMesh = new THREE.Mesh(jointGeo, jointMat);
                jointMesh.visible = false;
                scene.add(jointMesh);
                handJointMeshes.push(jointMesh);

                // ★物理用ボディ（質量0。アニメーションループで座標を強制同期させる）
                const jointBody = new CANNON.Body({ mass: 0, collisionFilterGroup: 2, collisionFilterMask: 1 });
                jointBody.addShape(new CANNON.Sphere(0.02));
                world.addBody(jointBody);
                handJointBodies.push(jointBody);
            }

            // Light
            scene.add(new THREE.DirectionalLight(0xffffff, 1.0));
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            // --- MediaPipe Hands Setup ---
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1, // 負荷軽減のため1本
                modelComplexity: 1,
                minDetectionConfidence: 0.7, // 精度重視
                minTrackingConfidence: 0.7
            });

            hands.onResults(onResults);

            // ★外カメラを指定してCameraUtilsを起動
            const cameraPipe = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 1280, // 解像度を少し高く
                height: 720,
                facingMode: 'environment' // ★外カメラを指定
            });
            cameraPipe.start();

            // --- Animation Loop ---
            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                
                // カメラ映像を毎フレーム更新
                if (videoTexture) videoTexture.needsUpdate = true;

                renderer.render(scene, camera);
            });
        }

        // --- 3D Hand Tracking Processing ---
        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                landmarks.forEach((point, i) => {
                    // ★座標変換：MediaPipe(0~1) -> Three.js(メートル)
                    // Z座標（点とカメラの距離）も利用して3D化
                    const x = (point.x - 0.5) * 2.0; 
                    const y = (0.5 - point.y) * 2.0 + 1.0; 
                    const z = (point.z) * 1.0 - 0.6; // ★MediaPipeのZをスケーリング

                    // メッシュの座標を更新
                    handJointMeshes[i].position.set(x, y, z);
                    handJointMeshes[i].visible = true;

                    // ★物理ボディの座標も同期させることで、キューブに触れるようになる
                    handJointBodies[i].position.set(x, y, z);
                });
            } else {
                // 手が写っていない時は非表示、物理判定も遠くにやる
                handJointMeshes.forEach(j => j.visible = false);
                handJointBodies.forEach(b => b.position.set(0, -10, 0));
            }
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
