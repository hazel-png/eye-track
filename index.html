<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spatial Hands Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #000; z-index: 2000; transition: opacity 0.8s;
        }
        .ios-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 40px; text-align: center; color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .start-btn {
            background: #fff; color: #000; border: none; padding: 15px 40px;
            border-radius: 30px; font-size: 18px; font-weight: 600; cursor: pointer;
        }
        #input_video { display: none; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="ios-card">
            <h1 style="font-weight: 200;">Spatial Studio</h1>
            <p style="opacity: 0.6; margin-bottom: 20px;">手をかざしてシステムを起動</p>
            <button class="start-btn" id="start-btn">VRを開始</button>
        </div>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, calibSphere;
        let isHandActive = false, calibComplete = false, isCalibrating = false;
        let maxReachZ = 0.15, currentRawZ = 0;
        const fingers = [];

        function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

        async function init() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').remove(), 800);

            // --- Scene Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // --- Physics ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);

            // ガイド球
            calibSphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.07, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0, emissive: 0xffffff })
            );
            calibSphere.position.set(0, 1.25, -0.45);
            scene.add(calibSphere);

            // キューブ
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.12), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            cubeMesh.visible = false;
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.5 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.06, 0.06, 0.06)));
            cubeBody.position.set(0, 1.6, -0.6);
            world.addBody(cubeBody);
            
            cubeBody.addEventListener("collide", (e) => vibrate(15));
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            // 指の点
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.012), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(0.012));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            // --- MediaPipe ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) {
                    if (isHandActive) {
                        isHandActive = false;
                        fingers.forEach(f => f.mesh.material.opacity = 0);
                        calibSphere.material.opacity = 0;
                    }
                    return;
                }

                if (!isHandActive) {
                    isHandActive = true;
                    vibrate(10);
                    fingers.forEach(f => f.mesh.material.opacity = 0.8);
                    if (!calibComplete) calibSphere.material.opacity = 0.3;
                }

                const landmarks = results.multiHandLandmarks[0];
                currentRawZ = landmarks[0].z;
                const xrCamera = renderer.xr.getCamera(camera);

                landmarks.forEach((point, i) => {
                    const zBase = calibComplete ? Math.pow(Math.abs(point.z) / maxReachZ, 0.8) * 3.5 : Math.abs(point.z) * 5.0;
                    const _v = new THREE.Vector3((point.x - 0.5) * 2.5, -(point.y - 0.5) * 2.5, -zBase - 0.4);
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    fingers[i].body.position.lerp(new CANNON.Vec3(_v.x, _v.y, _v.z), 0.4);
                    fingers[i].mesh.position.copy(fingers[i].body.position);
                });

                if (!calibComplete && !isCalibrating) {
                    if (fingers[8].mesh.position.distanceTo(calibSphere.position) < 0.12) {
                        isCalibrating = true;
                        vibrate([20, 30, 20]);
                        calibSphere.material.color.set(0x00ff00);
                        setTimeout(() => {
                            maxReachZ = Math.abs(currentRawZ);
                            calibComplete = true;
                            calibSphere.visible = false;
                            cubeMesh.visible = true;
                        }, 2000);
                    }
                }
            });

            const cameraUtils = new Camera(document.getElementById('input_video'), {
                onFrame: async () => { await hands.send({ image: document.getElementById('input_video') }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cameraUtils.start();

            // --- エラー回避型レンダリングループ ---
            renderer.setAnimationLoop(() => {
                // VRセッションがアクティブ、かつ準備完了の時だけ実行
                if (renderer.xr.isPresenting) {
                    try {
                        world.step(1/60);
                        if (calibComplete) {
                            cubeMesh.position.copy(cubeBody.position);
                            cubeMesh.quaternion.copy(cubeBody.quaternion);
                        }
                        renderer.render(scene, camera);
                    } catch (err) {
                        // updateRenderState エラーが出る瞬間は描画をスキップ
                    }
                }
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
