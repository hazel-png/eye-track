<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Spatial Studio - Calibrated Reach</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        video { display: none; }
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.9); z-index: 2000;
        }
        #info-ui {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 25px; background: rgba(0,0,0,0.7); color: white;
            border-radius: 30px; z-index: 1000; text-align: center; pointer-events: none;
            font-size: 1.2rem; display: none;
        }
        .btn {
            background: #4285F4; color: white; border: none; padding: 15px 30px;
            border-radius: 8px; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="start-overlay">
        <button class="btn" id="start-btn">Start Life-Size Mode</button>
    </div>
    <div id="info-ui">Initializing...</div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        // --- Configuration ---
        const SCALE_CONFIG = {
            handSpread: 1.15,
            handVertical: 1.15,
            handDepth: 1.3, // Initial value, will be calibrated
            zOffset: -0.1, 
            fingerRadius: 0.012,
            isCalibrated: false,
            reachThreshold: 0.95 // How "stretched" the arm should be to trigger calib
        };

        let scene, camera, renderer, world, cubeMesh, cubeBody, infoUI;
        const fingers = [];
        const _v = new THREE.Vector3();
        const dt = 1/60;

        async function init() {
            document.getElementById('start-overlay').remove();
            infoUI = document.getElementById('info-ui');
            infoUI.style.display = 'block';
            infoUI.innerText = "PLEASE STRETCH YOUR ARM FORWARD STRAIGHT";

            // Scene Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // Physics World
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            
            const handMat = new CANNON.Material("handMat");
            const objectMat = new CANNON.Material("objectMat");
            const contactMat = new CANNON.ContactMaterial(handMat, objectMat, {
                friction: 1.0, restitution: 0.0, contactEquationStiffness: 1e7
            });
            world.addContactMaterial(contactMat);

            // Layout
            const DESK_Z = -0.3;
            const DESK_Y = 1.0;

            const deskMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.6), new THREE.MeshStandardMaterial({ color: 0x444444 }));
            deskMesh.position.set(0, DESK_Y, DESK_Z);
            scene.add(deskMesh);

            const deskBody = new CANNON.Body({ mass: 0, material: objectMat });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.6, 0.025, 0.3)));
            deskBody.position.copy(deskMesh.position);
            world.addBody(deskBody);

            // Target Cube
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.06), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.2, material: objectMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.03, 0.03, 0.03)));
            cubeBody.position.set(0, DESK_Y + 0.2, DESK_Z);
            world.addBody(cubeBody);

            // Physics Fingers
            const fingerGeo = new THREE.SphereGeometry(SCALE_CONFIG.fingerRadius, 8, 8);
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fingerGeo, new THREE.MeshBasicMaterial({ color: 0x00ffcc }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, material: handMat, collisionFilterGroup: 2 });
                body.addShape(new CANNON.Sphere(SCALE_CONFIG.fingerRadius));
                body.type = CANNON.Body.KINEMATIC;
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            // Hand Tracking + Calibration Logic
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const xrCamera = renderer.xr.getCamera(camera);
                const landmarks = results.multiHandLandmarks[0];

                // 1. Calibration Logic (Detecting straight arm)
                if (!SCALE_CONFIG.isCalibrated) {
                    // Check distance between wrist (0) and middle finger tip (12) in 2D normalized space
                    const dx = landmarks[12].x - landmarks[0].x;
                    const dy = landmarks[12].y - landmarks[0].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    // If the hand looks "small" and high up, it's likely far/stretched
                    if (landmarks[0].z < -0.1) { 
                        SCALE_CONFIG.handDepth = Math.abs(1.0 / landmarks[0].z) * 0.15;
                        SCALE_CONFIG.isCalibrated = true;
                        infoUI.innerText = "CALIBRATION COMPLETE!";
                        setTimeout(() => infoUI.style.opacity = '0', 2000);
                    }
                }

                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    
                    // 2. Mapping with Angle/Position Limits
                    // Limit X to reachable sides, Y to not go below desk too far, Z to not go behind head
                    let rawX = (point.x - 0.5) * SCALE_CONFIG.handSpread;
                    let rawY = -(point.y - 0.5) * SCALE_CONFIG.handVertical;
                    let rawZ = -point.z * SCALE_CONFIG.handDepth + SCALE_CONFIG.zOffset;

                    // Apply constraints (Joint-like limits)
                    rawZ = Math.max(-0.8, Math.min(0.1, rawZ)); // Prevent hand from going too far back
                    rawY = Math.max(-0.5, rawY); // Prevent hand from going through the floor/body too deep

                    _v.set(rawX, rawY, rawZ);
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    
                    const nextPos = new CANNON.Vec3(_v.x, _v.y, _v.z);
                    f.body.velocity.set(
                        (nextPos.x - f.body.position.x) / dt,
                        (nextPos.y - f.body.position.y) / dt,
                        (nextPos.z - f.body.position.z) / dt
                    );
                    f.body.position.copy(nextPos);
                    f.mesh.position.copy(f.body.position);
                });
            });

            const video = document.getElementById('input_video');
            const cameraUtils = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cameraUtils.start();

            renderer.setAnimationLoop(() => {
                world.step(dt);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
