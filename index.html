<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definitive Spatial Engine | 6DoF & Stable Tracking</title>
    <style>
        :root { --accent: #00f2ff; --bg: #05050a; --glass: rgba(10, 10, 25, 0.85); }
        body { margin: 0; background: var(--bg); color: var(--accent); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        #container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: flex; flex-direction: column; 
            justify-content: space-between; padding: 40px; box-sizing: border-box; 
        }

        #status-panel { 
            background: var(--glass); backdrop-filter: blur(10px); padding: 20px; 
            border-left: 3px solid var(--accent); font-size: 12px; letter-spacing: 1px;
            pointer-events: none; border-radius: 0 10px 10px 0; width: fit-content;
        }

        .ui-bottom { 
            display: flex; justify-content: center; align-items: center; gap: 30px; 
            pointer-events: auto; background: var(--glass); backdrop-filter: blur(20px);
            padding: 25px 50px; border-radius: 100px; border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn { 
            cursor: pointer; padding: 12px 35px; background: transparent; 
            border: 2px solid var(--accent); color: var(--accent); border-radius: 30px; 
            font-weight: bold; transition: all 0.3s ease; text-transform: uppercase;
        }
        .btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }

        #webcam { display: none; }
        .stat-val { color: #fff; font-family: monospace; margin-left: 8px; }
    </style>
</head>
<body>

    <div id="container"></div>
    <video id="webcam" autoplay playsinline></video>

    <div id="status-panel">
        <div style="margin-bottom: 5px; opacity: 0.6;">SYSTEM 6DOF STABILIZED</div>
        <div>TRACKING: <span id="track-stat" class="stat-val">INITIALIZING...</span></div>
        <div>POSITION: <span id="pos-stat" class="stat-val">0.0, 0.0, 0.0</span></div>
        <div>ROTATION: <span id="rot-stat" class="stat-val">0.0, 0.0</span></div>
    </div>

    <div id="overlay">
        <div style="text-align: center;">
            <h1 style="letter-spacing: 15px; margin: 0; font-weight: 200; text-shadow: 0 0 15px var(--accent);">SPATIAL CORE</h1>
            <p style="color: rgba(0, 242, 255, 0.5); font-size: 11px; margin-top: 10px;">CENTROID-BASED HEAD TRACKING ENABLED</p>
        </div>

        <div class="ui-bottom">
            <label class="btn">
                Load Audio
                <input type="file" id="fileInput" accept="audio/*" style="display:none;">
            </label>
            <button id="playBtn" class="btn" disabled>Start Engine</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DragControls } from 'three/addons/controls/DragControls.js';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let scene, camera, renderer, audio, listener, headGroup, coreMesh, faceLandmarker;
        let filterNode, reverbNode, analyser;
        const video = document.getElementById('webcam');

        // トラッキング安定化設定
        const LERP_FACTOR = 0.06; // 滑らかさの調整
        const indices = [10, 152, 234, 454, 1, 33, 263]; // 重心計算用の代表点

        async function init() {
            // --- Scene Setup ---
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x05050a, 0.015);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('container').appendChild(renderer.domElement);

            const grid = new THREE.GridHelper(200, 50, 0x00f2ff, 0x050515);
            grid.material.opacity = 0.3;
            grid.material.transparent = true;
            scene.add(grid);

            // --- Listener (Head) Setup ---
            headGroup = new THREE.Group();
            const headBox = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 1.5, 1),
                new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true })
            );
            headGroup.add(headBox);
            scene.add(headGroup);

            listener = new THREE.AudioListener();
            headGroup.add(listener);

            // --- Sound Core Setup ---
            const geometry = new THREE.IcosahedronGeometry(1.8, 1);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x00f2ff, wireframe: true, 
                emissive: 0x00f2ff, emissiveIntensity: 2 
            });
            coreMesh = new THREE.Mesh(geometry, material);
            coreMesh.position.set(0, 3, -8);
            scene.add(coreMesh);
            
            const pointLight = new THREE.PointLight(0x00f2ff, 60, 50);
            coreMesh.add(pointLight);
            scene.add(new THREE.AmbientLight(0x111122));

            // --- Audio Graph (Reverb + Filter) ---
            audio = new THREE.PositionalAudio(listener);
            audio.setRefDistance(4);
            coreMesh.add(audio);

            const ctx = listener.context;
            filterNode = ctx.createBiquadFilter();
            filterNode.type = 'lowpass';

            // 擬似リバーブ（空間の広がり）
            reverbNode = ctx.createDelay();
            reverbNode.delayTime.value = 0.12; 
            const feedback = ctx.createGain();
            feedback.gain.value = 0.35;
            
            reverbNode.connect(feedback);
            feedback.connect(reverbNode);

            audio.panner.disconnect();
            audio.panner.connect(filterNode);
            filterNode.connect(ctx.destination); // Direct
            filterNode.connect(reverbNode);      // to Reverb
            reverbNode.connect(ctx.destination); // Mix

            analyser = new THREE.AudioAnalyser(audio, 128);

            // --- Controls ---
            const orbit = new OrbitControls(camera, renderer.domElement);
            orbit.enableDamping = true;
            
            const drag = new DragControls([coreMesh], camera, renderer.domElement);
            drag.addEventListener('dragstart', () => orbit.enabled = false);
            drag.addEventListener('dragend', () => orbit.enabled = true);

            await setupTracking();
            animate();
        }

        async function setupTracking() {
            try {
                const resolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(resolver, {
                    baseOptions: { 
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO", numFaces: 1
                });
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadeddata = () => {
                    document.getElementById('track-stat').innerText = "ACTIVE";
                    predict();
                };
            } catch (err) {
                document.getElementById('track-stat').innerText = "ERROR / NO CAM";
                console.error(err);
            }
        }

        function predict() {
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const lm = results.faceLandmarks[0];

                    // --- 重心計算による安定化位置トラッキング ---
                    let cX = 0, cY = 0, cZ = 0;
                    indices.forEach(i => { cX += lm[i].x; cY += lm[i].y; cZ += lm[i].z; });
                    cX /= indices.length; cY /= indices.length;

                    const faceWidth = Math.sqrt(Math.pow(lm[454].x - lm[234].x, 2) + Math.pow(lm[454].y - lm[234].y, 2));

                    // 目標値の算出
                    const tX = (cX - 0.5) * -35;
                    const tY = (0.5 - cY) * 20 + 2;
                    const tZ = (0.18 / faceWidth) * 15;

                    // 滑らかな追従 (LERP)
                    headGroup.position.x += (tX - headGroup.position.x) * LERP_FACTOR;
                    headGroup.position.y += (tY - headGroup.position.y) * LERP_FACTOR;
                    headGroup.position.z += (tZ - headGroup.position.z) * LERP_FACTOR;

                    // --- 向きトラッキング (重心に対する鼻のズレ) ---
                    const yaw = (lm[1].x - cX) * 5;
                    const pitch = (lm[1].y - cY) * 5;
                    headGroup.rotation.y += (-yaw - headGroup.rotation.y) * LERP_FACTOR;
                    headGroup.rotation.x += (pitch - headGroup.rotation.x) * LERP_FACTOR;

                    document.getElementById('pos-stat').innerText = `${headGroup.position.x.toFixed(1)}, ${headGroup.position.y.toFixed(1)}, ${headGroup.position.z.toFixed(1)}`;
                    document.getElementById('rot-stat').innerText = `${pitch.toFixed(2)}, ${yaw.toFixed(2)}`;
                }
            }
            requestAnimationFrame(predict);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;

            if (audio?.isPlaying) {
                const level = analyser.getAverageFrequency() / 255;
                coreMesh.scale.setScalar(1 + level * 1.5);
                coreMesh.rotation.y += 0.01 + level * 0.1;
                
                // リスナーと音源の距離に応じたフィルタリング
                const dist = headGroup.position.distanceTo(coreMesh.position);
                const cutoff = Math.max(200, 20000 - dist * 900);
                filterNode.frequency.setTargetAtTime(cutoff, audio.context.currentTime, 0.1);
            }

            coreMesh.position.y += Math.sin(time) * 0.005;
            renderer.render(scene, camera);
        }

        // --- UI Logic ---
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            new THREE.AudioLoader().load(URL.createObjectURL(file), (buf) => {
                audio.setBuffer(buf);
                audio.setLoop(true);
                document.getElementById('playBtn').disabled = false;
                document.getElementById('playBtn').innerText = "Start Engine";
            });
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            if (audio.context.state === 'suspended') audio.context.resume();
            if (audio.isPlaying) {
                audio.pause();
                document.getElementById('playBtn').innerText = "Resume";
            } else {
                audio.play();
                document.getElementById('playBtn').innerText = "Stop";
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
