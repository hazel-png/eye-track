<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Auto-Start Physics VR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: sans-serif; z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="loading">カメラ起動中... 手をかざしてください</div>
    <video id="input_video"></video>

    <script>
        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const jointMeshes = [], jointBodies = [];

        async function init() {
            // --- 1. Three.js 初期化 ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 2, 1);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // --- 2. Cannon.js 物理初期化 ---
            world = new CANNON.World();
            world.gravity.set(0, -9.82, 0);

            const material = new CANNON.Material({ friction: 1.0, restitution: 0 });

            // 3Dオブジェクト（キューブ）
            const size = 0.1;
            cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(size*2, size*2, size*2),
                new THREE.MeshStandardMaterial({ color: 0x00ffaa })
            );
            scene.add(cubeMesh);

            cubeBody = new CANNON.Body({ mass: 0.2, material: material });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(size, size, size)));
            cubeBody.position.set(0, 1.5, -0.5);
            cubeBody.angularDamping = 0.5;
            world.addBody(cubeBody);

            // 指の関節（21個）
            const jGeo = new THREE.SphereGeometry(0.02, 8, 8);
            const jMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(jGeo, jMat);
                scene.add(mesh);
                jointMeshes.push(mesh);

                const body = new CANNON.Body({ mass: 0, material: material });
                body.addShape(new CANNON.Sphere(0.02));
                world.addBody(body);
                jointBodies.push(body);
            }

            // 摩擦設定
            const contact = new CANNON.ContactMaterial(material, material, { friction: 2.0, restitution: 0 });
            world.addContactMaterial(contact);

            // --- 3. MediaPipe 初期化 ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

            hands.onResults((results) => {
                document.getElementById('loading').style.display = 'none';
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    lm.forEach((point, i) => {
                        const v = new THREE.Vector3(
                            (point.x - 0.5) * 1.5, 
                            -(point.y - 0.5) * 1.2, 
                            -point.z * 3 - 0.5
                        ).applyQuaternion(camera.quaternion).add(camera.position);

                        jointBodies[i].position.copy(v);
                        jointMeshes[i].position.copy(v);
                    });
                }
            });

            const videoElement = document.getElementById('input_video');
            const cam = new Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                width: 640, height: 480, facingMode: "environment"
            });
            cam.start();

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            world.step(1/60);
            cubeMesh.position.copy(cubeBody.position);
            cubeMesh.quaternion.copy(cubeBody.quaternion);

            const w = window.innerWidth, h = window.innerHeight;
            renderer.setScissorTest(true);
            renderer.setScissor(0, 0, w/2, h); renderer.setViewport(0, 0, w/2, h); renderer.render(scene, camera);
            renderer.setScissor(w/2, 0, w/2, h); renderer.setViewport(w/2, 0, w/2, h); renderer.render(scene, camera);
        }

        // ページ読み込み時に自動開始（iOS等の場合は一度画面タップが必要な場合があります）
        window.onload = () => {
            init().catch(err => {
                console.error(err);
                document.getElementById('loading').innerHTML = "エラー: カメラを許可してください";
            });
        };
    </script>
</body>
</html>
