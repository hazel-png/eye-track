<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spatial Hands - Vision Pro Style</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #000; z-index: 2000; transition: opacity 1s;
        }
        .start-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(30px);
            padding: 40px; border-radius: 40px; text-align: center; color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .ios-btn {
            background: #fff; color: #000; border: none; padding: 15px 40px;
            border-radius: 30px; font-size: 18px; font-weight: 600; cursor: pointer;
        }
        #input_video { display: none; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="start-card">
            <h1 style="font-weight: 300; letter-spacing: 2px;">Spatial Studio</h1>
            <p style="opacity: 0.6; margin-bottom: 30px;">手を前にかざして開始します</p>
            <button class="ios-btn" id="start-btn">入室する</button>
        </div>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, calibSphere;
        let isHandActive = false, calibComplete = false;
        let maxReachZ = 0.15;
        const fingers = [];

        function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

        async function init() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').remove(), 1000);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // キャリブレーションガイド（最初は非表示）
            const sphereGeo = new THREE.SphereGeometry(0.06, 32, 32);
            const sphereMat = new THREE.MeshStandardMaterial({ 
                color: 0xffffff, transparent: true, opacity: 0, emissive: 0xffffff, emissiveIntensity: 0.5 
            });
            calibSphere = new THREE.Mesh(sphereGeo, sphereMat);
            calibSphere.position.set(0, 1.2, -0.4);
            scene.add(calibSphere);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            // 指のパーツ（Vision Proのようなクリーンな白い点）
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.012), 
                    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 })
                );
                scene.add(mesh);
                fingers.push(mesh);
            }

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

            hands.onResults((results) => {
                const xrCamera = renderer.xr.getCamera(camera);
                
                if (!results.multiHandLandmarks?.length) {
                    // 手が消えたらフェードアウト
                    if (isHandActive) {
                        isHandActive = false;
                        fingers.forEach(f => f.material.opacity = 0);
                        if (!calibComplete) calibSphere.material.opacity = 0;
                    }
                    return;
                }

                // 【Vision Pro風】手を認識した瞬間の演出
                if (!isHandActive) {
                    isHandActive = true;
                    vibrate(10); // 軽い「カチッ」という感触
                    fingers.forEach(f => f.material.opacity = 0.8);
                    if (!calibComplete) calibSphere.material.opacity = 0.3;
                }

                const landmarks = results.multiHandLandmarks[0];
                landmarks.forEach((point, i) => {
                    // 奥行き感度をVision Pro風に深く設定
                    const zPos = -point.z * 5.0 - 0.4; 
                    const _v = new THREE.Vector3((point.x - 0.5) * 2.5, -(point.y - 0.5) * 2.5, zPos);
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    fingers[i].position.lerp(_v, 0.4); // 滑らかな追従
                });

                // キャリブレーション判定
                if (!calibComplete) {
                    const dist = fingers[8].position.distanceTo(calibSphere.position);
                    if (dist < 0.12) {
                        startSpatialCalibration(landmarks[0].z);
                    }
                }
            });

            const cameraUtils = new Camera(document.getElementById('input_video'), {
                onFrame: async () => { await hands.send({ image: document.getElementById('input_video') }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cameraUtils.start();

            renderer.setAnimationLoop(() => renderer.render(scene, camera));
        }

        function startSpatialCalibration(zValue) {
            calibComplete = true; // 二重発動防止
            vibrate([20, 50, 20]); // 成功の鼓動
            calibSphere.material.color.set(0x00ff00);
            
            // 空間が広がるようなアニメーション
            let tl = 0;
            const anim = setInterval(() => {
                tl += 0.05;
                calibSphere.scale.set(1 + tl*2, 1 + tl*2, 1 + tl*2);
                calibSphere.material.opacity = 0.3 - (tl * 0.3);
                if (tl >= 1) {
                    clearInterval(anim);
                    calibSphere.visible = false;
                    maxReachZ = Math.abs(zValue);
                    console.log("Calibrated:", maxReachZ);
                }
            }, 30);
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
