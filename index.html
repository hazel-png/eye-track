<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Fixed Rendering - Stable VR Hands</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r150/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
    </style>
</head>
<body>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.150.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        let instrMesh, calibRing;
        let isCalibrated = false, calibCount = 0, referenceZ = 0;
        let lastStableZ = 0;

        const tipMeshes = [], tipBodies = [];
        const CONFIG = {
            spread: 1.8, vertical: 1.5,
            zOffset: -0.25,
            lerp: 0.35,
            modelComplex: 0,
            vWidth: 640, vHeight: 360
        };

        const _v = new THREE.Vector3();

        function createTextCanvas(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = '#00ffcc';
            ctx.textAlign = 'center';
            ctx.fillText(text, 256, 80);
            return new THREE.CanvasTexture(canvas);
        }

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.add(new THREE.GridHelper(20, 20, 0x333333, 0x111111));

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            scene.add(new THREE.AmbientLight(0xffffff, 1.0)); // Brightened light

            // UI
            instrMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(0.5, 0.12),
                new THREE.MeshBasicMaterial({ map: createTextCanvas("EXTEND ARM FULLY"), transparent: true })
            );
            instrMesh.position.set(0, 1.4, -0.7);
            scene.add(instrMesh);

            calibRing = new THREE.Mesh(
                new THREE.TorusGeometry(0.06, 0.002, 8, 32),
                new THREE.MeshBasicMaterial({ color: 0x00ffcc })
            );
            calibRing.position.set(0, 1.2, -0.7);
            scene.add(calibRing);

            // Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0xff00ff }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.2 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, 1.5, -0.4);
            world.addBody(cubeBody);

            const jGeo = new THREE.SphereGeometry(0.012, 8, 4);
            for (let i = 0; i < 21; i++) {
                const m = new THREE.Mesh(jGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
                scene.add(m);
                tipMeshes.push(m);
                const b = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                b.addShape(new CANNON.Sphere(0.012));
                world.addBody(b);
                tipBodies.push(b);
            }

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ 
                maxNumHands: 1, 
                modelComplexity: CONFIG.modelComplex, 
                minDetectionConfidence: 0.7, 
                minTrackingConfidence: 0.7 
            });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const lm = results.multiHandLandmarks[0];
                const xrCamera = renderer.xr.getCamera(camera);
                const palmAvgZ = (lm[5].z + lm[9].z + lm[13].z + lm[17].z) * 0.25;

                if (!isCalibrated && renderer.xr.isPresenting) {
                    if (Math.abs(lm[0].x - 0.5) < 0.2) {
                        calibCount++;
                        referenceZ = Math.max(referenceZ, Math.abs(palmAvgZ));
                        if (calibCount > 50) {
                            isCalibrated = true;
                            instrMesh.visible = calibRing.visible = false;
                        }
                    }
                    return;
                }

                if (isCalibrated) {
                    const depthScale = 0.85 / referenceZ;
                    let targetZ = -palmAvgZ * depthScale;
                    if (lastStableZ === 0) lastStableZ = targetZ;
                    targetZ = lastStableZ + (targetZ - lastStableZ) * CONFIG.lerp;
                    lastStableZ = targetZ;

                    lm.forEach((point, i) => {
                        const pCorr = 1.0 - (point.z * 0.4);
                        _v.set(
                            (point.x - 0.5) * CONFIG.spread * pCorr,
                            -(point.y - 0.5) * CONFIG.vertical * pCorr,
                            targetZ + (point.z - palmAvgZ) * depthScale + CONFIG.zOffset
                        );
                        _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        tipBodies[i].position.lerp(new CANNON.Vec3(_v.x, _v.y, _v.z), CONFIG.lerp, tipBodies[i].position);
                        tipMeshes[i].position.copy(tipBodies[i].position);
                    });
                }
            });

            const videoElement = document.getElementById('input_video');
            // Use MediaPipe's Camera utility for a dedicated requestAnimationFrame loop
            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { 
                    await hands.send({ image: videoElement }); 
                },
                facingMode: "environment", 
                width: CONFIG.vWidth, 
                height: CONFIG.vHeight
            });
            cameraUtils.start();

            // Isolated Render Loop
            renderer.setAnimationLoop(() => {
                if (isCalibrated) {
                    world.step(1/60);
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }

        init();
    </script>
</body>
</html>
