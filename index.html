<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3DoF Spatial Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        /* 背面のカメラ映像 */
        #video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2;
        }
        /* 白いカバー効果 */
        #white-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: brightness(1.1);
            pointer-events: none; z-index: -1;
        }
        #start-screen {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            background: white; z-index: 100;
        }
        .btn {
            background: #4285F4; color: white; border: none; padding: 20px 40px;
            border-radius: 50px; font-size: 18px; font-weight: bold;
        }
    </style>
</head>
<body>
    <video id="video-container" autoplay playsinline></video>
    <div id="white-overlay"></div>
    <div id="start-screen">
        <button class="btn" id="start-btn">同期を開始（ジャイロ使用）</button>
    </div>

    <script>
        let scene, camera, renderer;

        async function init() {
            document.getElementById('start-screen').remove();

            // 1. カメラ映像の開始
            const video = document.getElementById('video-container');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;

            // 2. Three.js セットアップ
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 仮想世界のオブジェクト
            const grid = new THREE.GridHelper(10, 20, 0x888888, 0x444444);
            grid.position.y = -1.5; // 足元にグリッド
            scene.add(grid);

            const cube = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshNormalMaterial());
            cube.position.set(0, 0, -3); // 正面3mに箱
            scene.add(cube);

            // 3. ジャイロセンサーの同期 (iOS対応のためリクエストが必要)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') window.addEventListener('deviceorientation', handleOrientation);
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            function handleOrientation(event) {
                // スマホの回転をカメラに反映
                const alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0; // z
                const beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0;   // x
                const gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0; // y

                const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
                camera.quaternion.setFromEuler(euler);
            }

            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();
        }

        document.getElementById('start-btn').onclick = init;
    </script>
</body>
</html>
