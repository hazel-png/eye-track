<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Spatial Studio - Real World AR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        /* 背景を透過させるための重要な設定 */
        body { margin: 0; overflow: hidden; background-color: transparent; font-family: sans-serif; }
        video { display: none; }
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.9); z-index: 2000;
        }
        .btn {
            background: #4285F4; color: white; border: none; padding: 20px 40px;
            border-radius: 30px; font-size: 18px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <button class="btn" id="start-btn">現実世界で開始 (AR)</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        // --- 設定値（等身大スケール） ---
        const CONFIG = {
            handSpread: 1.15,
            handVertical: 1.15,
            handDepth: 1.3,
            zOffset: -0.2,
            fingerRadius: 0.015,
            deskHeight: 1.45 // 顔の高さに合わせる
        };

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const fingers = [];
        const _v = new THREE.Vector3();

        async function initAR() {
            // UIを消去
            document.getElementById('ui-overlay').style.display = 'none';

            // --- Three.js Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            
            // rendererのalpha: trueとsetClearAlpha(0)が現実を映す鍵
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.setClearAlpha(0); 
            document.body.appendChild(renderer.domElement);

            // --- Physics Setup ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const mat = new CANNON.Material();
            world.addContactMaterial(new CANNON.ContactMaterial(mat, mat, { friction: 0.7, restitution: 0.1 }));

            // --- 仮想オブジェクト (AR空間) ---
            // 机（半透明にして現実と馴染ませる）
            const deskGeo = new THREE.BoxGeometry(0.8, 0.02, 0.4);
            const deskMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
            const deskMesh = new THREE.Mesh(deskGeo, deskMat);
            deskMesh.position.set(0, CONFIG.deskHeight, -0.5);
            scene.add(deskMesh);

            const deskBody = new CANNON.Body({ mass: 0, material: mat });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.4, 0.01, 0.2)));
            deskBody.position.copy(deskMesh.position);
            world.addBody(deskBody);

            // 青いキューブ
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.3, material: mat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, CONFIG.deskHeight + 0.3, -0.5);
            world.addBody(cubeBody);

            // 指のモデル
            const fingerGeo = new THREE.SphereGeometry(CONFIG.fingerRadius, 16, 16);
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fingerGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0 });
                body.addShape(new CANNON.Sphere(CONFIG.fingerRadius));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            // --- WebXR AR Session ---
            try {
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['local-floor']
                });
                renderer.xr.setSession(session);
            } catch (e) {
                alert("ARを開始できませんでした。HTTPS接続と対応デバイスを確認してください。");
                return;
            }

            // --- Hand Tracking (MediaPipe) ---
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const xrCamera = renderer.xr.getCamera(camera);
                const landmarks = results.multiHandLandmarks[0];

                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    _v.set(
                        (point.x - 0.5) * CONFIG.handSpread, 
                        -(point.y - 0.5) * CONFIG.handVertical, 
                        -point.z * CONFIG.handDepth + CONFIG.zOffset
                    );
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    f.body.position.set(_v.x, _v.y, _v.z);
                    f.mesh.position.copy(f.body.position);
                });
            });

            const video = document.getElementById('input_video');
            const cameraHelper = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            });
            cameraHelper.start();

            // --- Render Loop ---
            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', initAR);
    </script>
</body>
</html>
