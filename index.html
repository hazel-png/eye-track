<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simple VR Desk with Hand Tracking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #vr-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #000; z-index: 2000;
        }
        .btn { background: #fff; color: #000; border: none; padding: 20px 40px; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="vr-ui"><button class="btn" id="start-btn">START VR</button></div>

    <script type="module">
        // XRHandModelFactoryをインポートして手の見た目を自動生成
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';
        import { XRHandModelFactory } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/XRHandModelFactory.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, deskGroup;
        const handModels = [];

        function init() {
            const ui = document.getElementById('vr-ui');
            if(ui) ui.remove();

            // --- Three.js Setup ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // WebXRのハンドトラッキング機能を有効化してボタン作成
            document.body.appendChild(VRButton.createButton(renderer));

            // --- Hand Tracking Setup ---
            const handModelFactory = new XRHandModelFactory();

            // 左手・右手のコントローラー（ハンド）を取得
            for (let i = 0; i < 2; i++) {
                const controller = renderer.xr.getController(i);
                scene.add(controller);

                const hand = renderer.xr.getHand(i);
                // 手のモデル（指の関節など）を追加
                hand.add(handModelFactory.createHandModel(hand, "boxes")); // "spheres" や "boxes" が指定可能
                scene.add(hand);
                handModels.push(hand);
            }

            // --- Physics ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);

            // --- Objects ---
            deskGroup = new THREE.Group();
            const deskMesh = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.05, 0.6), 
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            deskMesh.position.set(0, 0.8, -0.5);
            deskGroup.add(deskMesh);
            scene.add(deskGroup);

            const deskBody = new CANNON.Body({ mass: 0 });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.6, 0.025, 0.3)));
            deskBody.position.set(0, 0.8, -0.5);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.08, 0.08, 0.08), 
                new THREE.MeshStandardMaterial({ color: 0x4285F4 })
            );
            scene.add(cubeMesh);

            cubeBody = new CANNON.Body({ mass: 0.2 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.04, 0.04, 0.04)));
            cubeBody.position.set(0, 1.2, -0.5);
            world.addBody(cubeBody);

            // Light
            const light = new THREE.DirectionalLight(0xffffff, 1.0);
            light.position.set(1, 2, 1);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            // --- Animation Loop ---
            renderer.setAnimationLoop(() => {
                if (!renderer.xr.isPresenting) return;
                
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
