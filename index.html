<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Physics of Sound - Fixed</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --cyan: #00f2ff; }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column;
            align-items: center; min-height: 100vh; touch-action: none;
        }
        .ui-panel {
            margin-top: 20px; background: #0a0a0a; border: 1px solid #222;
            padding: 20px; border-radius: 20px; box-shadow: 0 0 40px rgba(0,0,0,1);
            width: 320px;
        }
        .grid {
            position: relative; width: 100%; height: 300px; background: #050505;
            border: 1px solid #333; overflow: hidden; margin: 10px 0; border-radius: 10px;
        }
        .mesh {
            position: absolute; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(212,175,55,0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(212,175,55,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .node {
            position: absolute; width: 18px; height: 18px; background: var(--gold);
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--gold); z-index: 10; pointer-events: none;
        }
        .head {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            background: var(--cyan); border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--cyan);
        }
        .status { font-family: monospace; font-size: 0.65rem; color: var(--gold); margin-bottom: 10px; text-align: center;}
        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        button, .upload-label {
            font-size: 0.7rem; border: 1px solid #444; color: #ccc;
            padding: 10px; border-radius: 5px; cursor: pointer; background: #111;
            text-align: center; display: block;
        }
        .upload-label:hover { border-color: var(--gold); color: white; }
    </style>
</head>
<body>

<div class="ui-panel">
    <div class="status" id="readout">SYSTEM: READY - LOAD AUDIO</div>
    
    <div class="grid" id="gridXZ">
        <div class="mesh"></div>
        <div class="head"></div>
        <div id="nodeXZ" class="node" style="top:50%; left:50%;"></div>
    </div>

    <div class="grid" id="gridY" style="height: 120px;">
        <div class="mesh"></div>
        <div class="head"></div>
        <div id="nodeY" class="node" style="top:50%; left:50%;"></div>
    </div>

    <div class="controls">
        <label class="upload-label" for="file">LOAD MASTER SOURCE</label>
        <input type="file" id="file" hidden accept="audio/*">
        <button onclick="resetPos()">RESET POSITION</button>
    </div>
</div>

<script>
    let audioCtx, panner, source, mainFilter, rearFilter, reverbNode;
    let coord = { x: 0, y: 0, z: 0 };
    let isInitialized = false;

    // --- 音響エンジンの初期化 ---
    async function setupAudio(file) {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        // 再初期化に備えて既存のソースを停止
        if (source) source.stop();

        // 1. Panner (HRTF)
        panner = audioCtx.createPanner();
        panner.panningModel = 'HRTF';
        panner.distanceModel = 'inverse';

        // 2. Main Filter (空気吸収)
        mainFilter = audioCtx.createBiquadFilter();
        mainFilter.type = 'lowpass';

        // 3. Rear Filter (遮蔽)
        rearFilter = audioCtx.createBiquadFilter();
        rearFilter.type = 'peaking';
        rearFilter.frequency.value = 10000;
        rearFilter.Q.value = 1;

        // 4. Reverb (物理合成)
        reverbNode = audioCtx.createConvolver();
        const duration = 1.5;
        const rate = audioCtx.sampleRate;
        const length = rate * duration;
        const impulse = audioCtx.createBuffer(2, length, rate);
        for (let i = 0; i < 2; i++) {
            let channelData = impulse.getChannelData(i);
            for (let j = 0; j < length; j++) {
                channelData[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, 2);
            }
        }
        reverbNode.buffer = impulse;

        const buffer = await file.arrayBuffer();
        const audioData = await audioCtx.decodeAudioData(buffer);
        
        source = audioCtx.createBufferSource();
        source.buffer = audioData;
        source.loop = true;

        const reverbGain = audioCtx.createGain();
        reverbGain.gain.value = 0.12;

        source.connect(mainFilter);
        mainFilter.connect(rearFilter);
        rearFilter.connect(panner);
        panner.connect(audioCtx.destination);

        source.connect(reverbNode);
        reverbNode.connect(reverbGain);
        reverbGain.connect(audioCtx.destination);

        source.start();
        isInitialized = true;
        render();
    }

    // --- ループ処理 ---
    function render() {
        if (!isInitialized || !panner) return;
        
        const now = audioCtx.currentTime;
        const scale = 25; // 空間の広さ
        
        const rx = coord.x * scale;
        const ry = coord.y * scale;
        const rz = coord.z * scale;

        // 音源位置の更新 (ドップラー効果のための追従)
        panner.positionX.setTargetAtTime(rx, now, 0.05);
        panner.positionY.setTargetAtTime(ry, now, 0.05);
        panner.positionZ.setTargetAtTime(rz, now, 0.05);

        // 物理シミュレーション：距離による高域遮断
        const dist = Math.sqrt(rx*rx + ry*ry + rz*rz);
        mainFilter.frequency.setTargetAtTime(Math.max(1500, 20000 - dist * 600), now, 0.1);

        // 物理シミュレーション：背後への回り込み（10kHzの減衰）
        const rearIntensity = Math.max(0, Math.min(1, rz / 10)); 
        rearFilter.gain.setTargetAtTime(rearIntensity * -18, now, 0.1);

        // UIの座標同期（全グリッドの黄色い丸を動かす）
        document.getElementById('nodeXZ').style.left = ((coord.x + 1) / 2 * 100) + '%';
        document.getElementById('nodeXZ').style.top = ((coord.z + 1) / 2 * 100) + '%';
        document.getElementById('nodeY').style.left = ((coord.x + 1) / 2 * 100) + '%';
        document.getElementById('nodeY').style.top = ((-coord.y + 1) / 2 * 100) + '%';
        
        document.getElementById('readout').innerText = `X:${rx.toFixed(1)} Y:${ry.toFixed(1)} Z:${rz.toFixed(1)} | PHYS: ACTIVE`;
        requestAnimationFrame(render);
    }

    // --- 入力イベント (スマホ対応強化) ---
    function handleInput(gridId, type) {
        const grid = document.getElementById(gridId);
        let active = false;

        const updateCoord = (e) => {
            if (!active) return;
            const r = grid.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            const nx = (t.clientX - r.left) / r.width * 2 - 1;
            const ny = (t.clientY - r.top) / r.height * 2 - 1;

            coord.x = Math.max(-1, Math.min(1, nx));
            if (type === 'XZ') {
                coord.z = Math.max(-1, Math.min(1, ny));
            } else {
                coord.y = -Math.max(-1, Math.min(1, ny));
            }
        };

        const onStart = (e) => {
            active = true;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            updateCoord(e);
        };

        grid.addEventListener('mousedown', onStart);
        grid.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, { passive: false });
        
        window.addEventListener('mousemove', updateCoord);
        window.addEventListener('touchmove', (e) => { if(active) e.preventDefault(); updateCoord(e); }, { passive: false });
        
        window.addEventListener('mouseup', () => active = false);
        window.addEventListener('touchend', () => active = false);
    }

    handleInput('gridXZ', 'XZ');
    handleInput('gridY', 'Y');

    document.getElementById('file').onchange = (e) => {
        if (e.target.files[0]) setupAudio(e.target.files[0]);
    };

    function resetPos() {
        coord = { x: 0, y: 0, z: 0 };
    }
</script>
</body>
</html>
