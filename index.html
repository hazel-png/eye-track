<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Hand Tracker - Reach Calibration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        video { display: none; }
        #vr-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #fff; z-index: 2000;
        }
        .btn { background: #1a73e8; color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="vr-ui">
        <button class="btn" id="start-btn">Confirm Camera & Start VR</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, deskGroup, videoTexture;
        let calibRing, isCalibrated = false;
        let calibCount = 0;
        let maxReachZ = 0;
        let instructionText;

        const SCALE_CONFIG = { handSpread: 1.5, handVertical: 1.5, handDepth: 3.5, zOffset: -0.2, fingerRadius: 0.015 };
        const fingers = [];
        const _v = new THREE.Vector3();
        const dt = 1/60;

        function createTextCanvas(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 128;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 32px sans-serif';
            ctx.fillStyle = 'black';
            ctx.textAlign = 'center';
            ctx.fillText(text, 256, 70);
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        async function init() {
            document.getElementById('vr-ui').style.display = 'none';

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // --- Correct Aspect Ratio Monitor ---
            const video = document.getElementById('input_video');
            videoTexture = new THREE.VideoTexture(video);
            
            // Get actual video aspect ratio
            const videoAspect = video.videoWidth / video.videoHeight || 16/9;
            const monitorHeight = 0.25;
            const monitorGeo = new THREE.PlaneGeometry(monitorHeight * videoAspect, monitorHeight);
            const monitorMat = new THREE.MeshBasicMaterial({ map: videoTexture });
            const monitor = new THREE.Mesh(monitorGeo, monitorMat);
            monitor.position.set(0, 0.8, -0.6);
            scene.add(monitor);

            // Instructions Overlay
            const instrGeo = new THREE.PlaneGeometry(0.4, 0.1);
            const instrMat = new THREE.MeshBasicMaterial({ map: createTextCanvas("Extend arm fully to calibrate"), transparent: true });
            instructionText = new THREE.Mesh(instrGeo, instrMat);
            instructionText.position.set(0, 1.0, -0.6);
            scene.add(instructionText);

            // Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const handMat = new CANNON.Material();
            const objectMat = new CANNON.Material();
            world.addContactMaterial(new CANNON.ContactMaterial(handMat, objectMat, { friction: 1.0, restitution: 0.1 }));

            // Calibration Ring
            calibRing = new THREE.Mesh(
                new THREE.TorusGeometry(0.08, 0.008, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0x1a73e8 })
            );
            calibRing.position.set(0, 0.8, -0.59); 
            scene.add(calibRing);

            // Desk & Cube
            deskGroup = new THREE.Group();
            const deskMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.6), new THREE.MeshStandardMaterial({ color: 0x888888 }));
            deskMesh.position.set(0, 0.7, -0.5);
            deskGroup.add(deskMesh);
            scene.add(deskGroup);
            deskGroup.visible = false;

            const deskBody = new CANNON.Body({ mass: 0, material: objectMat });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.6, 0.025, 0.3)));
            deskBody.position.set(0, 0.7, -0.5);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeMesh.visible = false;
            cubeBody = new CANNON.Body({ mass: 0.2, material: objectMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.04, 0.04, 0.04)));
            cubeBody.position.set(0, 1.0, -0.5);
            world.addBody(cubeBody);

            // Fingers
            const fingerMat = new THREE.MeshStandardMaterial({ color: 0x39ff14 });
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(SCALE_CONFIG.fingerRadius, 16, 16), fingerMat);
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, material: handMat, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(SCALE_CONFIG.fingerRadius));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                
                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0];
                const xrCamera = renderer.xr.getCamera(camera);

                if (!isCalibrated && renderer.xr.isPresenting) {
                    // Check if hand is roughly centered in camera view
                    const inTarget = Math.abs(wrist.x - 0.5) < 0.25 && Math.abs(wrist.y - 0.5) < 0.25;
                    
                    if (inTarget) {
                        calibCount++;
                        // Capture the furthest Z (closest to camera, largest absolute value in Mediapipe)
                        maxReachZ = Math.max(maxReachZ, Math.abs(wrist.z));
                        
                        const progress = Math.min(calibCount / 60, 1);
                        calibRing.material.color.lerpColors(new THREE.Color(0x1a73e8), new THREE.Color(0x39ff14), progress);
                        
                        if (calibCount > 60) {
                            // Normalize: set reach to roughly 0.7m (arm length) based on maxReachZ
                            SCALE_CONFIG.handDepth = 0.7 / (maxReachZ || 0.1);
                            isCalibrated = true;
                            calibRing.visible = false;
                            monitor.visible = false;
                            instructionText.visible = false;
                            deskGroup.visible = true;
                            cubeMesh.visible = true;
                        }
                    } else {
                        calibCount = 0;
                        calibRing.material.color.set(0x1a73e8);
                    }
                }

                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    _v.set(
                        (point.x - 0.5) * SCALE_CONFIG.handSpread, 
                        -(point.y - 0.5) * SCALE_CONFIG.handVertical, 
                        -point.z * SCALE_CONFIG.handDepth + SCALE_CONFIG.zOffset
                    );
                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    f.body.position.copy(new CANNON.Vec3(_v.x, _v.y, _v.z));
                    f.mesh.position.copy(f.body.position);
                });
            });

            new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                width: 1280, height: 720
            }).start();

            renderer.setAnimationLoop(() => {
                if (isCalibrated) {
                    world.step(dt);
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
