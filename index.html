<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Spatial Studio - Head & Hand Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #fff; z-index: 2000;
        }
        .btn { padding: 15px 30px; background: #4285F4; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="overlay"><button class="btn" id="start-btn">頭部同期モードを開始</button></div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        const CONFIG = {
            handScale: 1.1,
            headScale: 0.8, // 頭の移動感度（1.0で等倍）
            smoothing: 0.2,
            deskY: 1.5
        };

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const fingers = [];
        const _vHand = new THREE.Vector3();
        const _vHead = new THREE.Vector3();

        async function init() {
            document.getElementById('overlay').remove();

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            // 初期位置を机の前に設定
            camera.position.set(0, 1.6, 0.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const mat = new CANNON.Material();
            world.addContactMaterial(new CANNON.ContactMaterial(mat, mat, { friction: 0.6 }));

            // Objects
            const desk = new THREE.Mesh(new THREE.BoxGeometry(1, 0.05, 0.5), new THREE.MeshStandardMaterial({ color: 0xeeeeee }));
            desk.position.set(0, CONFIG.deskY, -0.3);
            scene.add(desk);
            const deskBody = new CANNON.Body({ mass: 0, material: mat });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.025, 0.25)));
            deskBody.position.copy(desk.position);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0x4285F4 }));
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.3, material: mat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, CONFIG.deskY + 0.2, -0.3);
            world.addBody(cubeBody);

            // Fingers
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, material: mat });
                body.addShape(new CANNON.Sphere(0.015));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            // Tracking (Hands + pseudo Head Tracking)
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                
                // 手の座標更新
                const landmarks = results.multiHandLandmarks[0];
                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    _vHand.set((point.x - 0.5) * CONFIG.handScale, -(point.y - 0.5) * CONFIG.handScale, -point.z * CONFIG.handScale);
                    // カメラの現在位置からの相対座標にする
                    f.body.position.copy(camera.position).add(_vHand.add(new THREE.Vector3(0, 0, -0.4)));
                    f.mesh.position.copy(f.body.position);
                });

                // 頭の位置同期（簡易的な実装：手の奥行きや位置の変化から顔の揺れをシミュレート、または手の基準点を使用）
                // 本来はFaceMesh併用が理想ですが、Handのみで実装する場合、カメラの位置をわずかにオフセットさせます
                const wrist = landmarks[0];
                const headX = (wrist.x - 0.5) * CONFIG.headScale;
                const headY = 1.6 - (wrist.y - 0.5) * CONFIG.headScale * 0.2; // 上下動を抑えめに
                
                // カメラ位置を滑らかに更新（LERP）
                camera.position.x += (headX - camera.position.x) * CONFIG.smoothing;
                camera.position.y += (headY - camera.position.y) * CONFIG.smoothing;
            });

            const video = document.getElementById('input_video');
            new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            }).start();

            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
