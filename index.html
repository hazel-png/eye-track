<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hybrid 6DoF + Hand Tracking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        #log { position: fixed; bottom: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); font-size: 10px; pointer-events: none; }
        #overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: white; z-index: 1000; }
    </style>
</head>
<body>
    <div id="log">Status: Waiting...</div>
    <div id="overlay"><button id="start-btn" style="padding:20px;">共存モードに挑戦</button></div>
    <video id="input_video" playsinline></video>

    <script type="module">
        let scene, camera, renderer, world, cubeMesh, cubeBody;
        let xrActive = false;
        const fingers = [];
        const _v = new THREE.Vector3();
        const log = (msg) => document.getElementById('log').innerText = "Status: " + msg;

        async function init() {
            // 1. 基本セットアップ
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Physics (キューブ)
            world = new CANNON.World(); world.gravity.set(0, -9.8, 0);
            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshNormalMaterial());
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.5 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, 1.4, -0.5);
            world.addBody(cubeBody);

            // 指のダミー
            for(let i=0; i<21; i++) {
                const m = new THREE.Mesh(new THREE.SphereGeometry(0.015), new THREE.MeshBasicMaterial({color:0xffffff}));
                scene.add(m);
                const b = new CANNON.Body({mass:0});
                b.addShape(new CANNON.Sphere(0.015));
                world.addBody(b);
                fingers.push({mesh:m, body:b});
            }

            // 2. WebXR (6DoF) の起動
            try {
                const session = await navigator.xr.requestSession('immersive-ar', { requiredFeatures: ['local-floor'] });
                await renderer.xr.setSession(session);
                xrActive = true;
                document.getElementById('overlay').remove();
                log("XR Active. Waiting for Hand Sync...");
            } catch (e) {
                alert("WebXR失敗: " + e.message); return;
            }

            // 3. MediaPipe (3秒遅らせて起動)
            setTimeout(async () => {
                log("Starting Hands...");
                const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
                hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

                hands.onResults((results) => {
                    if (!results.multiHandLandmarks?.length) return;
                    const xrCamera = renderer.xr.getCamera(camera);
                    results.multiHandLandmarks[0].forEach((p, i) => {
                        _v.set((p.x-0.5)*1.2, -(p.y-0.5)*1.2, -p.z*1.2 - 0.2);
                        _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        fingers[i].body.position.set(_v.x, _v.y, _v.z);
                        fingers[i].mesh.position.copy(fingers[i].body.position);
                    });
                });

                const video = document.getElementById('input_video');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    video.srcObject = stream;
                    const cam = new Camera(video, { onFrame: async () => { await hands.send({ image: video }); } });
                    cam.start();
                    log("Both Synced! (Good Luck)");
                } catch(e) {
                    log("Hand Camera Blocked by WebXR");
                }
            }, 3000);

            renderer.setAnimationLoop(() => {
                if(!xrActive) return;
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').onclick = init;
    </script>
</body>
</html>
