<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fixed AR Spatial Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; }
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }
        .start-btn {
            padding: 20px 40px; font-size: 18px; background: #4285F4;
            color: white; border: none; border-radius: 30px;
            pointer-events: auto; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <button class="start-btn" id="start-ar-btn">ARを開始（現実を映す）</button>
    </div>

    <script type="module">
        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const fingers = [];

        async function activateAR() {
            // UIを隠す
            document.getElementById('ui-layer').style.display = 'none';

            // --- 1. Scene & Camera ---
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // --- 2. Renderer (ここが重要) ---
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.setClearAlpha(0); // 背景を完全に透明に
            document.body.appendChild(renderer.domElement);

            // --- 3. Light ---
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            // --- 4. Physics ---
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);

            // --- 5. Virtual Objects (顔の高さに配置) ---
            const deskH = 1.4; // 1.4m (顔の高さ付近)
            
            // 机
            const deskMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 0.02, 0.3),
                new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 })
            );
            deskMesh.position.set(0, deskH, -0.5);
            scene.add(deskMesh);

            const deskBody = new CANNON.Body({ mass: 0 });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.3, 0.01, 0.15)));
            deskBody.position.copy(deskMesh.position);
            world.addBody(deskBody);

            // キューブ
            cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.1, 0.1),
                new THREE.MeshStandardMaterial({ color: 0x4285F4 })
            );
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.5 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.05, 0.05, 0.05)));
            cubeBody.position.set(0, deskH + 0.5, -0.5);
            world.addBody(cubeBody);

            // --- 6. WebXR AR Session Start ---
            const sessionInit = { requiredFeatures: ['local-floor'] };
            try {
                const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                renderer.xr.setSession(session);
            } catch (e) {
                console.error("ARセッションの開始に失敗:", e);
                alert("ARを開始できませんでした。HTTPS接続か、対応デバイスか確認してください。");
                return;
            }

            // --- 7. Main Loop ---
            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-ar-btn').addEventListener('click', activateAR);
    </script>
</body>
</html>
