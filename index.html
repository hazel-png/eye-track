<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spatial Computing Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; }
        video { display: none; }
        
        /* iPhone風 Splash Screen */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2c2c2e 0%, #000000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; color: white; transition: opacity 0.8s ease;
        }
        .apple-logo { font-size: 60px; margin-bottom: 20px; font-weight: 100; }
        .mode-text { letter-spacing: 2px; text-transform: uppercase; font-size: 12px; opacity: 0.6; margin-bottom: 40px; }
        
        .start-btn {
            padding: 18px 60px; border-radius: 40px; background: #ffffff; color: #000000;
            font-weight: 600; font-size: 16px; cursor: pointer; border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.3s;
        }
        .start-btn:hover { transform: scale(1.05); background: #f2f2f7; }
        
        /* WebXRボタンを隠して自作ボタンで制御するためのハック */
        #XRButton { display: none !important; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="apple-logo"></div>
        <div class="mode-text">Spatial Computing Mode</div>
        <button class="start-btn" id="start-xr">Enter</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';
        import { VRButton } from 'https://cdn.skypack.dev/three@0.150.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody;
        const tipMeshes = [], tipBodies = [];

        async function init() {
            // --- 1. Three.js Setup ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            
            // 高級感のある薄いグリッド
            const grid = new THREE.GridHelper(50, 50, 0x222222, 0x111111);
            scene.add(grid);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // VR開始ボタンの隠し設置
            const vrBtnElement = VRButton.createButton(renderer);
            vrBtnElement.id = "XRButton";
            document.body.appendChild(vrBtnElement);

            // --- 2. Cannon.js (Physics) ---
            // Cannonはグローバル定義されるため、ここでも new CANNON でOK
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const pMat = new CANNON.Material({ friction: 4.0 });

            const groundBody = new CANNON.Body({ mass: 0, material: pMat });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);

            // iPhoneカラーのキューブ
            cubeMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.2), 
                new THREE.MeshStandardMaterial({ color: 0x1c1c1e, metalness: 0.8, roughness: 0.2 })
            );
            scene.add(cubeMesh);
            cubeBody = new CANNON.Body({ mass: 0.2, material: pMat });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.1, 0.1, 0.1)));
            cubeBody.position.set(0, 1.5, -0.8);
            world.addBody(cubeBody);

            // 指先21点
            const jGeo = new THREE.SphereGeometry(0.012, 16, 16);
            for (let i = 0; i < 21; i++) {
                const m = new THREE.Mesh(jGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 }));
                scene.add(m);
                tipMeshes.push(m);
                const b = new CANNON.Body({ mass: 0, material: pMat });
                b.addShape(new CANNON.Sphere(0.012));
                b.collisionFilterGroup = 1;
                b.collisionFilterMask = 2 | 0xFF;
                world.addBody(b);
                tipBodies.push(b);
            }

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.PointLight(0xffffff, 1.5);
            light.position.set(2, 5, 2);
            scene.add(light);

            // --- 3. UI Panel (Control Center) ---
            createUI(THREE);

            // --- 4. Camera & Hand Tracking ---
            const videoElement = document.getElementById('input_video');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: 640, height: 480 }
            });
            videoElement.srcObject = stream;
            videoElement.play();

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    const xrCamera = renderer.xr.getCamera(camera);
                    lm.forEach((point, i) => {
                        const v = new THREE.Vector3(
                            (point.x - 0.5) * 2.0, 
                            -(point.y - 0.5) * 1.5, 
                            -point.z * 3.0 - 0.8
                        ).applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        tipBodies[i].position.copy(v);
                        tipMeshes[i].position.copy(v);
                    });
                }
            });

            // メインループ
            renderer.setAnimationLoop(() => {
                world.step(1/60);
                cubeMesh.position.copy(cubeBody.position);
                cubeMesh.quaternion.copy(cubeBody.quaternion);
                hands.send({ image: videoElement });
                renderer.render(scene, camera);
            });
        }

        function createUI(THREE) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.beginPath();
            ctx.roundRect(0, 0, 512, 256, 40);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.stroke();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 40px sans-serif';
            ctx.fillText('Spatial Center', 60, 90);
            ctx.font = '24px sans-serif';
            ctx.fillText(' Intelligence Active', 60, 160);
            
            const texture = new THREE.CanvasTexture(canvas);
            const plane = new THREE.Mesh(
                new THREE.PlaneGeometry(0.8, 0.4),
                new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide })
            );
            plane.position.set(1.0, 2.0, -1.5);
            plane.rotation.y = -0.4;
            scene.add(plane);
        }

        // 開始ボタン
        document.getElementById('start-xr').addEventListener('click', async () => {
            const overlay = document.getElementById('overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.remove(), 800);
            
            await init();
            // 自動的にXRセッションを開始
            const xrBtn = document.getElementById('XRButton');
            if (xrBtn) xrBtn.click();
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
</body>
</html>
