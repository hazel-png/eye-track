<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Titan VR: Maximum Reach Spatial Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        video { display: none; }
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #fff; z-index: 2000;
        }
        .btn {
            background: #1a73e8; color: white; border: none; padding: 20px 50px;
            border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div id="setup-screen">
        <button class="btn" id="start-btn">ENTER VR STUDIO</button>
    </div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, deskGroup;
        let calibRing, isCalibrated = false;
        let calibFrames = 0, minZObserved = 1.0; 

        const CONFIG = {
            handSpread: 1.6,
            handVertical: 1.6,
            handDepth: 4.5,     // Will be auto-calculated
            zOffset: -0.3,      // Base offset from camera
            smoothing: 0.12,    // Lower = smoother
            maxArmLength: 0.7   // Standard human arm length in meters
        };

        const fingers = [];
        const _v = new THREE.Vector3();
        const dt = 1/60;

        async function init() {
            document.getElementById('setup-screen').remove();

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.8, 0);
            const handMat = new CANNON.Material("hand");
            const objMat = new CANNON.Material("obj");
            world.addContactMaterial(new CANNON.ContactMaterial(handMat, objMat, { friction: 0.5, restitution: 0.1 }));

            // Calibration Ring
            const ringGeo = new THREE.TorusGeometry(0.15, 0.01, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x4285F4, transparent: true, opacity: 0.8 });
            calibRing = new THREE.Mesh(ringGeo, ringMat);
            calibRing.position.set(0, 1.3, -0.6); 
            scene.add(calibRing);

            // Studio Assets
            deskGroup = new THREE.Group();
            const desk = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.05, 0.8), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            desk.position.set(0, 0.9, -0.6);
            deskGroup.add(desk);
            scene.add(deskGroup);
            deskGroup.visible = false;

            const deskBody = new CANNON.Body({ mass: 0 });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.75, 0.025, 0.4)));
            deskBody.position.set(0, 0.9, -0.6);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), new THREE.MeshStandardMaterial({ color: 0x1a73e8 }));
            scene.add(cubeMesh);
            cubeMesh.visible = false;

            cubeBody = new CANNON.Body({ mass: 0.5, material: objMat, linearDamping: 0.5 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.04, 0.04, 0.04)));
            cubeBody.position.set(0, 1.2, -0.6);
            world.addBody(cubeBody);

            // High-fidelity Fingers
            const fMat = new THREE.MeshStandardMaterial({ color: 0x39ff14, emissive: 0x39ff14, emissiveIntensity: 0.4 });
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.015, 16, 16), fMat);
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, material: handMat, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(0.015));
                world.addBody(body);
                fingers.push({ mesh, body, lastPos: new THREE.Vector3() });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 1.0));

            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                const wrist = landmarks[0];
                const xrCamera = renderer.xr.getCamera(camera);

                // --- SMART CALIBRATION ---
                // Instruction: Stretch your arm fully toward the ring
                if (!isCalibrated && renderer.xr.isPresenting) {
                    const isCentered = Math.abs(wrist.x - 0.5) < 0.2 && Math.abs(wrist.y - 0.5) < 0.2;
                    if (isCentered) {
                        calibFrames++;
                        // Capture the minimum Z (furthest point)
                        if (wrist.z < minZObserved) minZObserved = wrist.z;
                        
                        const p = calibFrames / 90;
                        calibRing.material.color.lerp(new THREE.Color(0x39ff14), 0.1);
                        calibRing.scale.setScalar(1 + Math.sin(Date.now() * 0.01) * 0.1);

                        if (calibFrames > 90) {
                            // Map the max extension to physical arm length
                            CONFIG.handDepth = CONFIG.maxArmLength / Math.abs(minZObserved || 0.1);
                            isCalibrated = true;
                            calibRing.visible = false;
                            deskGroup.visible = true;
                            cubeMesh.visible = true;
                        }
                    } else {
                        calibFrames = 0;
                        calibRing.material.color.set(0x4285F4);
                    }
                }

                // --- ANATOMICAL POSITIONING ---
                landmarks.forEach((point, i) => {
                    const f = fingers[i];
                    
                    // Depth is now calculated relative to your maximum reach
                    const dynamicZ = (point.z / minZObserved) * -CONFIG.maxArmLength + CONFIG.zOffset;

                    _v.set(
                        (point.x - 0.5) * CONFIG.handSpread,
                        -(point.y - 0.5) * CONFIG.handVertical,
                        dynamicZ
                    );

                    _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                    
                    // Vision Pro-style EMA Smoothing
                    f.lastPos.lerp(_v, CONFIG.smoothing);
                    f.body.position.copy(f.lastPos);
                    f.mesh.position.copy(f.lastPos);
                });
            });

            const video = document.getElementById('input_video');
            new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 1280, height: 720
            }).start();

            renderer.setAnimationLoop(() => {
                if (isCalibrated) {
                    world.step(dt);
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
