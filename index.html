<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Precision Gaze Focus with Calibration</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'SF Pro Display', system-ui, sans-serif; color: white; }
    canvas#three-canvas { display: block; width: 100vw; height: 100vh; }
    
    #gaze-cursor {
      position: absolute; width: 24px; height: 24px;
      border: 2px solid #fff; border-radius: 50%;
      pointer-events: none; transform: translate(-50%, -50%);
      z-index: 100; transition: transform 0.04s linear;
      box-shadow: 0 0 15px rgba(255,255,255,0.5);
    }

    #ui-layer {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 1000;
    }

    #calibration-ui {
      background: rgba(0,0,0,0.85); padding: 30px; border-radius: 20px;
      text-align: center; border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(20px); width: 400px;
    }

    .target-dot {
      width: 15px; height: 15px; background: #00ffff; border-radius: 50%;
      margin: 20px auto; box-shadow: 0 0 20px #00ffff;
    }

    #status-bar {
      position: absolute; top: 20px; left: 20px; font-size: 11px;
      font-family: monospace; background: rgba(0,0,0,0.5); padding: 10px;
      border-radius: 5px; pointer-events: none;
    }

    kbd {
      background: #444; padding: 2px 6px; border-radius: 4px; font-family: sans-serif;
    }

    #webcam-hidden { display: none; }
  </style>
</head>
<body>

<div id="ui-layer">
  <div id="calibration-ui">
    <h2>CALIBRATION</h2>
    <p>Look directly at the cyan dot below and stay still.</p>
    <div class="target-dot"></div>
    <p>Press <kbd>SPACE</kbd> to set baseline</p>
  </div>
</div>

<div id="status-bar">
  GAZE_STATE: <span id="st-gaze">OFFLINE</span><br>
  OFFSET: <span id="st-off">0.00</span>
</div>

<div id="gaze-cursor"></div>
<video id="webcam-hidden" autoplay playsinline></video>
<canvas id="three-canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/",
    "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/vision_bundle.js"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9";

  // --- ENGINE SETTINGS ---
  const SETTINGS = {
    gazeSmooth: 0.15,
    focusSmooth: 0.08,
    camZ: 30
  };

  let scene, camera, renderer, composer, bokehPass;
  let faceLandmarker, video;
  let lastVideoTime = -1;
  
  // Calibration State
  let isCalibrated = false;
  let baseGaze = { x: 0.5, y: 0.5 };
  let smoothGaze = { x: 0.5, y: 0.5 };
  let currentFocus = 20;

  async function init() {
    // 1. Three.js setup
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050508);

    camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = SETTINGS.camZ;

    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    // Create random cubes
    const geo = new THREE.BoxGeometry(2, 2, 2);
    for(let i=0; i<40; i++) {
      const mat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*30, (Math.random()-0.5)*40);
      scene.add(mesh);
    }
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(10, 10, 10);
    scene.add(light);

    // Bokeh Pass
    composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    bokehPass = new BokehPass(scene, camera, { focus: 20, aperture: 0.02, maxblur: 0.02 });
    composer.addPass(bokehPass);

    // 2. MediaPipe Initialization
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
      runningMode: "VIDEO", numFaces: 1
    });

    video = document.getElementById('webcam-hidden');
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      animate();
    };

    // 3. Calibration Input
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') calibrate();
    });
  }

  function calibrate() {
    isCalibrated = true;
    document.getElementById('calibration-ui').style.display = 'none';
    document.getElementById('ui-layer').style.display = 'none';
  }

  function updateLogic(landmarks) {
    const irisL = landmarks[468]; 
    const irisR = landmarks[473];
    if (!irisL || !irisR) return;

    // Averages positions from both eyes for higher accuracy
    const rawX = (irisL.x + irisR.x) / 2;
    const rawY = (irisL.y + irisR.y) / 2;

    if (!isCalibrated) {
        // While calibrating, update the baseline
        baseGaze.x = rawX;
        baseGaze.y = rawY;
        return;
    }

    // Calculate delta relative to baseline
    // Sensitivity multiplier (Adjust 2.5 to change how much eye movement moves cursor)
    const deltaX = (rawX - baseGaze.x) * 2.5; 
    const deltaY = (rawY - baseGaze.y) * 2.5;

    // Apply smoothing
    smoothGaze.x += ( (0.5 + deltaX) - smoothGaze.x ) * SETTINGS.gazeSmooth;
    smoothGaze.y += ( (0.5 + deltaY) - smoothGaze.y ) * SETTINGS.gazeSmooth;

    // Update Cursor (Mirrored logic)
    const screenX = (1 - smoothGaze.x) * window.innerWidth;
    const screenY = smoothGaze.y * window.innerHeight;
    document.getElementById('gaze-cursor').style.left = `${screenX}px`;
    document.getElementById('gaze-cursor').style.top = `${screenY}px`;

    // Raycast focus
    const raycaster = new THREE.Raycaster();
    const ndcX = ((1 - smoothGaze.x) * 2) - 1;
    const ndcY = -(smoothGaze.y * 2) + 1;
    raycaster.setFromCamera({ x: ndcX, y: ndcY }, camera);
    
    const hits = raycaster.intersectObjects(scene.children);
    let targetD = 20;
    if (hits.length > 0) targetD = hits[0].distance;

    currentFocus += (targetD - currentFocus) * SETTINGS.focusSmooth;
    bokehPass.uniforms.focus.value = currentFocus;

    // Debug UI
    document.getElementById('st-gaze').innerText = "TRACKING";
    document.getElementById('st-off').innerText = `X:${deltaX.toFixed(2)} Y:${deltaY.toFixed(2)}`;
  }

  function animate() {
    requestAnimationFrame(animate);
    if (video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      const res = faceLandmarker.detectForVideo(video, performance.now());
      if (res.faceLandmarks && res.faceLandmarks[0]) {
        updateLogic(res.faceLandmarks[0]);
      }
    }
    composer.render();
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });

  init();
</script>
</body>
</html>
