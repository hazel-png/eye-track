<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Spatial View | Physics Based</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #container { position: absolute; inset: 0; }
        #hud { 
            position: absolute; top: 20px; left: 20px; color: #00f2ff; 
            background: rgba(0, 5, 20, 0.85); padding: 15px; border: 1px solid #00f2ff;
            pointer-events: none; z-index: 100; font-size: 11px;
        }
        #webcam { display: none; }
        .label { color: #888; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="hud">
        <div style="font-weight: bold; border-bottom: 1px solid #004455; padding-bottom: 5px; margin-bottom: 10px;">PHYSICS-BASED TRACKING</div>
        <div><span class="label">LATENCY:</span><span id="stat-latency">--</span>ms</div>
        <div><span class="label">JITTER:</span>ACTIVE</div>
        <div style="margin-top: 10px; color: #ff00f2; font-size: 9px;">※物理慣性と生体ノイズを適用中</div>
    </div>
    <div id="container"></div>
    <video id="webcam" autoplay playsinline></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        let scene, camera, renderer, faceLandmarker;
        const video = document.getElementById('webcam');

        // --- 物理シミュレーション設定 ---
        const physics = {
            pos: new THREE.Vector3(0, 0, 15),
            vel: new THREE.Vector3(0, 0, 0),
            rot: new THREE.Vector2(0, 0),
            rotVel: new THREE.Vector2(0, 0),
            
            targetPos: new THREE.Vector3(0, 0, 15),
            targetRot: new THREE.Vector2(0, 0),

            // パラメータ
            stiffness: 0.2, // バネの強さ（高いと硬い）
            damping: 0.7,   // 減衰（低いと重厚感が出る）
            jitter: 0.0015  // 生体ノイズ
        };

        async function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x00050a, 0.03);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            // 空間の構築
            const grid = new THREE.GridHelper(200, 40, 0x00f2ff, 0x001122);
            grid.position.y = -8;
            scene.add(grid);

            // 浮遊する構造体
            const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            for (let i = 0; i < 100; i++) {
                const material = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set((Math.random()-0.5)*60, (Math.random()-0.5)*40, (Math.random()-0.5)*60);
                scene.add(cube);
            }

            await setupTracking();
            animate();
        }

        async function setupTracking() {
            try {
                const res = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(res, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO", numFaces: 1
                });

                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    predict();
                };
            } catch (e) {
                console.error(e);
            }
        }

        function predict() {
            const startTime = performance.now();
            if (faceLandmarker && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, startTime);
                if (results.faceLandmarks?.[0]) {
                    const lm = results.faceLandmarks[0];
                    const headX = (lm[234].x + lm[454].x) / 2;
                    const headY = (lm[234].y + lm[454].y) / 2;
                    const faceWidth = Math.abs(lm[454].x - lm[234].x);

                    // ターゲット位置を更新
                    physics.targetPos.x = (0.5 - headX) * 30;
                    physics.targetPos.y = (0.5 - headY) * 20;
                    physics.targetPos.z = (0.15 / faceWidth) * 12 + 5;

                    // ターゲット回転（見回し）を更新
                    physics.targetRot.y = (lm[1].x - headX) * 6;
                    physics.targetRot.x = (headY - lm[1].y) * 5;
                }
            }
            document.getElementById('stat-latency').innerText = (performance.now() - startTime).toFixed(1);
            requestAnimationFrame(predict);
        }

        function animate() {
            requestAnimationFrame(animate);

            // --- 位置のバネ物理計算 ---
            let forceP = new THREE.Vector3().subVectors(physics.targetPos, physics.pos).multiplyScalar(physics.stiffness);
            physics.vel.add(forceP).multiplyScalar(physics.damping);
            physics.pos.add(physics.vel);

            // --- 回転のバネ物理計算 ---
            let forceR = new THREE.Vector2().subVectors(physics.targetRot, physics.rot).multiplyScalar(physics.stiffness);
            physics.rotVel.add(forceR).multiplyScalar(physics.damping);
            physics.rot.add(physics.rotVel);

            // --- 生体ノイズ (Jitter) ---
            const jitterX = (Math.random() - 0.5) * physics.jitter;
            const jitterY = (Math.random() - 0.5) * physics.jitter;

            // カメラに物理挙動を反映
            camera.position.copy(physics.pos);
            camera.rotation.set(
                physics.rot.x + jitterX,
                physics.rot.y + jitterY,
                0,
                'XYZ'
            );

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
