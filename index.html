<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>High-Precision Lightweight Hand Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        video { display: none; }
        #vr-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #fff; z-index: 2000;
        }
        .btn { background: #1a73e8; color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="vr-ui"><button class="btn" id="start-btn">START VR</button></div>
    <video id="input_video" playsinline></video>

    <script type="module">
        import { VRButton } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/webxr/VRButton.js';

        let scene, camera, renderer, world, cubeMesh, cubeBody, deskGroup;
        let calibRing, instrMesh;
        let isCalibrated = false, calibCount = 0, referenceZ = 0;

        const CONFIG = {
            spread: 1.8, vertical: 1.8, zBase: -0.3,
            lerp: 0.3, // スムージング係数
            radius: 0.012
        };

        const fingers = [];
        const _v = new THREE.Vector3();

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.font = 'bold 44px sans-serif';
            ctx.fillStyle = '#00ffcc';
            ctx.textAlign = 'center';
            ctx.fillText(text, 256, 80);
            return new THREE.CanvasTexture(canvas);
        }

        async function init() {
            document.getElementById('vr-ui').style.display = 'none';

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
            renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true }); // 軽量化のためantialiasオフ検討可
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // UI
            const instrGeo = new THREE.PlaneGeometry(0.5, 0.12);
            const instrMat = new THREE.MeshBasicMaterial({ map: createTextTexture("EXTEND ARM FULLY"), transparent: true });
            instrMesh = new THREE.Mesh(instrGeo, instrMat);
            instrMesh.position.set(0, 1.2, -0.6);
            scene.add(instrMesh);

            calibRing = new THREE.Mesh(
                new THREE.TorusGeometry(0.06, 0.002, 8, 48),
                new THREE.MeshBasicMaterial({ color: 0x00ffcc })
            );
            calibRing.position.set(0, 1.0, -0.6);
            scene.add(calibRing);

            // Physics (Lightweight)
            world = new CANNON.World();
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 5; // 計算回数を減らして高速化

            // Desk
            deskGroup = new THREE.Group();
            const deskMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 0.05, 0.5), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            deskMesh.position.set(0, 0.8, -0.4);
            deskGroup.add(deskMesh);
            scene.add(deskGroup);
            deskGroup.visible = false;

            const deskBody = new CANNON.Body({ mass: 0 });
            deskBody.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.025, 0.25)));
            deskBody.position.set(0, 0.8, -0.4);
            world.addBody(deskBody);

            cubeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.06), new THREE.MeshStandardMaterial({ color: 0x00ffcc }));
            scene.add(cubeMesh);
            cubeMesh.visible = false;
            cubeBody = new CANNON.Body({ mass: 0.1 });
            cubeBody.addShape(new CANNON.Box(new CANNON.Vec3(0.03, 0.03, 0.03)));
            cubeBody.position.set(0, 1.0, -0.3);
            world.addBody(cubeBody);

            // Fingers (Low Poly)
            const fGeo = new THREE.SphereGeometry(CONFIG.radius, 8, 5);
            const fMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for (let i = 0; i < 21; i++) {
                const mesh = new THREE.Mesh(fGeo, fMat);
                scene.add(mesh);
                const body = new CANNON.Body({ mass: 0, type: CANNON.Body.KINEMATIC });
                body.addShape(new CANNON.Sphere(CONFIG.radius));
                world.addBody(body);
                fingers.push({ mesh, body });
            }

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));

            const video = document.getElementById('input_video');
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((results) => {
                if (!results.multiHandLandmarks?.length) return;
                const landmarks = results.multiHandLandmarks[0];
                const palmZ = (landmarks[0].z + landmarks[9].z) * 0.5;
                const xrCamera = renderer.xr.getCamera(camera);

                if (!isCalibrated && renderer.xr.isPresenting) {
                    if (Math.abs(landmarks[0].x - 0.5) < 0.15) {
                        calibCount++;
                        referenceZ = Math.max(referenceZ, Math.abs(palmZ));
                        if (calibCount > 50) {
                            isCalibrated = true;
                            instrMesh.visible = calibRing.visible = false;
                            deskGroup.visible = cubeMesh.visible = true;
                        }
                    }
                }

                if (isCalibrated) {
                    const depthScale = 0.8 / referenceZ;
                    landmarks.forEach((point, i) => {
                        const f = fingers[i];
                        const pCorr = 1.0 - (point.z * 0.4); 
                        _v.set(
                            (point.x - 0.5) * CONFIG.spread * pCorr,
                            -(point.y - 0.5) * CONFIG.vertical * pCorr,
                            -point.z * depthScale + CONFIG.zBase
                        );
                        _v.applyQuaternion(xrCamera.quaternion).add(xrCamera.position);
                        
                        // 滑らかな移動 (Lerp)
                        f.body.position.x += (_v.x - f.body.position.x) * CONFIG.lerp;
                        f.body.position.y += (_v.y - f.body.position.y) * CONFIG.lerp;
                        f.body.position.z += (_v.z - f.body.position.z) * CONFIG.lerp;
                        f.mesh.position.copy(f.body.position);
                    });
                }
            });

            new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                facingMode: "environment", width: 640, height: 480 // 解像度を下げてトラッキング高速化
            }).start();

            renderer.setAnimationLoop(() => {
                if (isCalibrated) {
                    world.step(1/60);
                    cubeMesh.position.copy(cubeBody.position);
                    cubeMesh.quaternion.copy(cubeBody.quaternion);
                }
                renderer.render(scene, camera);
            });
        }
        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
